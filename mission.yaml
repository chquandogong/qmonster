mission:
  version: "1.8.12"
  title: "Qmonster v0.4.0 — Phase 4 shared-verification hardening v1.8.12"

  goal: |
    Qmonster is a Rust TUI that observes multiple AI CLI panes inside a
    tmux window (Claude main / Codex review / Gemini research / Qmonster
    monitor) and provides alerts, token-optimization recommendations,
    security/audit observability, and task observation under an
    Observe-first / Alert-first / Recommendation-first policy.

    Phase 0 (planning) produced the canonical docs, mission ledger, thin
    routers, Claude plan r1, Codex r1 cross-check, Gemini r1 research,
    and the Claude r2 final synthesis. Phase 1 (observe-first MVP)
    shipped: tmux polling, identity resolver with IdentityConfidence,
    per-provider adapters, pure policy engine with seven alert rules,
    in-memory EventSink, severity-aware desktop/bell notifications,
    ratatui dashboard with low-saturation palette + SourceKind badges,
    safety-precedence enforcement, subagent / zombie-pane / version-
    drift scenarios, audit-logged safety-override rejections, and an
    effect-abstraction path that dispatches on RequestedEffect (not on
    the recommendation list).

    Phase 1 gate remediation (v1.3.0) closed all Codex Phase-1 findings
    (metric/signal surfacing, safety-override audit, version-drift
    surfacing, effect dispatch, clippy hygiene) and aligned the
    mission/history/state docs with the true post-implementation state.

    Phase 2 (v1.4.0) shipped durable storage: SqliteAuditSink with
    type-level raw exclusion, raw tail archive with preview/full split,
    operator-triggered checkpoint snapshots to ~/.qmonster/snapshots/,
    retention sweep, and persistent cross-session version drift
    detection. Phase 2 gate remediation (v1.5.0) closed all three Codex
    Phase-2 findings (version-snapshot error handling, audit sink
    durability, storage-root precedence).

    Phase 3A (this revision, v1.6.0) ships the pure-policy layer —
    Round 1 of a two-round Phase 3. New advisory rules: A (log_storm
    advisory), B (code_exploration), C/C-crit (context_pressure /
    critical), D (verbose_review), F-nudge (quota_tight_nudge), G
    (repeated_cache_suggest). Cross-pane: G-11 concurrent-work rule
    detects same-path Main+Review concurrent work in concurrent.rs.
    PolicyGates struct threads quota_tight + identity-confidence gates
    through Engine::evaluate; Notify effect fires only for Severity >=
    Warning (Codex #3 closed). Aggressive variants (S3 guardrail) fire
    only when gates.quota_tight == true. Provider-flavored advisories
    suppressed on IdentityConfidence::Low|Unknown. Phase-1 test backfill
    for repeated_output/verbose_answer/error_hint (Gemini #1 closed).
    22 single-responsibility TDD commits; 152 lib + 12 integration tests.

    Phase 3A gate remediation (v1.6.1) closed three Codex findings:
    (1) dispatch_notify now filters by Severity >= Warning so Concern-
    severity recs no longer reach the desktop notifier even when a Warning
    rec co-exists in the same output; (2) alert_event now splits
    AuditEventKind::AlertFired (>= Warning) vs RecommendationEmitted
    (< Warning) so passive advisories are not wrongly labelled as alerts
    in the audit log; (3) VALIDATION.md and ARCHITECTURE.md updated to
    acknowledge the shipped same-current_path G-11 proxy and correctly
    defer file-level / git-branch-level detection to Phase 3B / 4+.
    154 lib + 15 integration tests; cargo clippy --all-targets -D
    warnings clean.

    Phase 3B (Round 2, v1.7.0) closes the two Gemini Round-2 deferrals.
    G-2: advisory rules in advisories.rs now carry suggested_command
    where an actionable CLI snippet exists — log_storm_advisory gets
    the tmux capture-pane archiving command, context_pressure_warning
    and context_pressure_critical get "/compact", quota_tight_nudge
    gets a config-edit comment; rules without a clean equivalent stay
    None (honest signal). G-7: Recommendation gains is_strong: bool;
    context_pressure_warning and context_pressure_critical are set
    is_strong = true; the alert queue renders strong recommendations in
    a dedicated slot between SystemNotices and CrossPaneFindings with
    prefix ">> CHECKPOINT:"; --once prints the same slot. Phase 3 is
    now complete.

    Phase 3B retry-remediation (v1.7.1) closes Gemini G-2 retry finding.
    Six additional suggested_command entries populated across alerts.rs
    (log_storm/archive-preview-suggested with tmux capture-pane command
    mirroring log_storm_advisory), advisories.rs (aggressive_log_storm,
    aggressive_context_pressure_warning, aggressive_context_pressure_critical,
    verbose_review, aggressive_verbose_review each get comment-form
    config-edit pointers to config/qmonster.toml or ~/.claude/settings.json),
    and concurrent.rs (CrossPaneFinding gets tmux select-pane hint).
    All remaining suggested_command: None sites in these three files now
    carry inline justification comments explaining why no runnable CLI
    command exists. Total suggested_command population: 10 rules (4 from
    v1.7.0 + 6 new in v1.7.1). Gemini G-2 retry finding closed.

    Phase 3B strong-rec command refinement (v1.7.2) closes a pre-signoff
    inconsistency on the two strong context-pressure recommendations.
    context_pressure_warning and context_pressure_critical had
    suggested_command = Some("/compact") — a bare destructive action —
    while their reason fields ("checkpoint first, archive large results,
    only then consider /compact" / "checkpoint + archive now; /compact
    after") and the CHECKPOINT slot UI premise both demand snapshot-first.
    Both rules now carry
    Some("# press 's' to snapshot first; then /compact"). The warning
    unit test switches from exact-string equality to substring
    containment on "snapshot" + "/compact"; a parallel critical-variant
    unit test (context_pressure_critical_suggests_snapshot_first) is
    added for symmetry; the integration test
    context_pressure_rec_is_marked_strong_end_to_end adopts the same
    substring contract so the strong-rec precondition cannot silently
    regress through Engine::evaluate + EffectRunner + ViewModel. UI-layer
    string refinement only; no policy behavior or severity changes.

    Phase 3B strong-rec contract cleanup (v1.7.3) closes the two Codex
    v1.7.2 review findings. Finding #1: the v1.7.2 value
    "# press 's' to snapshot first; then /compact" was not runnable on
    any single surface (shell comments out `#…`; `--once` has no key
    handler; renderers still prefixed it with `run:` promising copy-
    paste ergonomics the value couldn't deliver). Fix: introduce a
    structurally separate Recommendation.next_step: Option<String> for
    prose preconditions; revert suggested_command on the two strong
    recs to pure Some("/compact"); move the snapshot hint into
    next_step = Some("press 's' to snapshot … before /compact").
    Finding #2: the v1.7.2 substring tests would still have passed a
    regressed "/compact; snapshot later" string. Fix: assert_eq on
    suggested_command = Some("/compact") (exact), and lock render
    ordering via a new pub helper ui::alerts::format_strong_rec_body —
    shared between the TUI alert queue and --once — with unit tests
    that assert `next:` precedes `run:` in the rendered body and the
    `next:` segment is omitted when next_step is None, plus an
    integration test that calls the helper end-to-end on a live
    Engine::evaluate output. Field-level next/run separation makes the
    ordering contract inherent rather than string-substring-dependent.

    Phase 3B ledger normalization (v1.7.4) closes Codex v1.7.3 review
    finding #1. The live `done_when` list in mission.yaml contained
    two v1.7.2 statements that were superseded by v1.7.3 (the claim
    that suggested_command embeds the snapshot precondition, and the
    claim that tests enforce a substring contract). Both are no longer
    true of the shipped code after v1.7.3's field split. Fix: replace
    the two v1.7.2 done_when lines with a SUPERSEDED comment block
    that points future reviewers to the historical record in
    mission-history.yaml (change_sequence 11). mission.yaml and
    mission-history.yaml now tell the same current story without
    internal contradiction. No code or runtime change; ledger only.

    Phase 3B Gemini review artifact backfill (v1.7.5) closes Codex
    v1.7.4 review finding #1. The v1.7.4 CURRENT_STATE.md claimed a
    Gemini v1.7.3 `pass` verdict but stored the evidence only as a
    conversation-transcript reference, skipping the WORKFLOWS.md:56-58
    rule that every LLM sign-off must have (a) a narrative review
    under `.docs/<model>/` and (b) a structured mirror under
    `.mission/evals/`. Fix: write the missing Gemini v1.7.3 narrative
    at .docs/gemini/Qmonster-v0.4.0-2026-04-21-phase3b-strong-rec-
    cleanup-review.md, and the matching structured mirror at
    .mission/evals/Qmonster-v0.4.0-2026-04-21-phase3b-strong-rec-
    cleanup-gemini-review.result.yaml (the `-gemini-` suffix
    disambiguates from the already-present Codex mirror at
    .mission/evals/Qmonster-v0.4.0-2026-04-21-phase3b-strong-rec-
    cleanup-review.result.yaml). CURRENT_STATE.md gate-status table
    now cites both files. Ledger-only round; no code, test, or
    runtime change.

    Phase 3B Gemini review artifact template compliance (v1.7.6)
    closes Codex v1.7.5 review finding #1. The v1.7.5 backfill
    produced the Gemini v1.7.3 artifact pair at the correct locations,
    but the narrative review was missing the `## Scope-reduction
    suggestions` section required by docs/ai/REVIEW_GUIDE.md:77-95.
    Fix: add the missing section to
    .docs/gemini/Qmonster-v0.4.0-2026-04-21-phase3b-strong-rec-
    cleanup-review.md with two concrete bullets — one stating no
    additional reduction is needed this round (the next_step /
    suggested_command two-field split is right-sized) and one
    deferring a broader review of next_step adoption to Phase 4
    when the provider-profile recommender use cases crystallize.
    All eleven REVIEW_GUIDE.md required sections are now present in
    order in the Gemini review narrative. Docs-only round; no code,
    test, runtime, or ledger-structure change.

    Phase 4 opens (v1.8.0, this revision) — provider-profile
    recommender foundation. Phase 4 ships the Token-optimization
    layer-1 from ARCHITECTURE.md §231-249: pick the right CLI
    flags / settings per `(provider, role, situation)` using
    ProviderOfficial levers. P4-1 (this slice) introduces the pure
    data model (`src/domain/profile.rs`: `ProviderProfile` +
    `ProfileLever`) and the first rule (`src/policy/rules/profiles.rs`:
    `recommend_claude_default`) that fires a `Severity::Good` profile
    recommendation on a healthy Claude main pane, carrying three
    ProviderOfficial levers (`CLAUDE_CODE_FILE_READ_MAX_OUTPUT_TOKENS`,
    `BASH_MAX_OUTPUT_LENGTH`, `includeGitInstructions`) each with a
    per-lever citation. Engine::evaluate calls `eval_profiles` after
    advisories so profile recs flow through the same PaneReport →
    ViewModel path. Gates respected: provider ∈ {Claude}, role ∈
    {Main}, IdentityConfidence ≥ Medium, `!quota_tight`, no active
    alerts, `context_pressure < 0.75`. Profile name is
    `ProjectCanonical`; individual levers are `ProviderOfficial`.
    G-5 (auto-memory guide) and G-6 (side_effects population on
    high-compression profiles) are explicitly deferred to P4-2 /
    P4-3 respectively. 163 lib + 16 integration (up from 159 + 16;
    +4 new unit tests: 2 in domain/profile.rs locking the data
    shape, 2 in policy/rules/profiles.rs locking the rule + provider
    gate). clippy --all-targets -D warnings clean. First use of
    `Severity::Good` on a rule output — positive advisory, does not
    trigger the Notify gate.

    Phase 4 P4-1 remediation (v1.8.1, this revision) closes Codex's
    v1.8.0 review finding #1. Codex approved the direction but flagged
    that `recommend_claude_default` built a real `ProviderProfile`
    and then dropped it — only prose `reason` reached the operator;
    the three `ProviderOfficial` lever keys/values/citations never
    survived past `Recommendation` into `PaneReport` / `--once` / TUI.
    That made the "bundles three levers with citations" contract
    false in the live path. Fix: add `Recommendation.profile:
    Option<ProviderProfile>`, thread `profile: None` through every
    existing constructor (~27 sites across advisories.rs / alerts.rs /
    profiles.rs / ui/alerts.rs / notify/desktop.rs / recommendation.rs
    test fixtures), attach `Some(claude_default_profile())` in
    `recommend_claude_default`, and introduce one shared
    `pub fn ui::panels::format_profile_lines(rec) -> Vec<String>`
    renderer used by both the TUI per-pane panel and `--once` so
    per-lever `[PO] key = value — citation` rows become visible
    end-to-end. Three new tests lock the contract: unit-level in
    `policy/rules/profiles.rs` (rec.profile carries 3 ProviderOfficial
    levers with non-empty citations), unit-level in `ui/panels.rs`
    (renderer emits `[PC]` header + `[PO]` lever rows with key/
    value/citation visible; returns empty Vec when rec has no
    profile), and end-to-end in `tests/event_loop_integration.rs`
    (live `Engine::evaluate -> run_once -> PaneReport` output, when
    fed through `format_profile_lines`, yields 1 header + 3 lever
    rows with all four authority pieces — key + value + citation +
    SourceKind badge — visible; Notify is still not triggered
    because Severity::Good stays below the gate). Gemini's parallel
    v1.8.0 review gave `pass` (적극 승인) and the narrative + mirror
    artifact pair is now archived at
    `.docs/gemini/Qmonster-v0.4.0-2026-04-21-phase4-p4-1-review.md`
    and `.mission/evals/Qmonster-v0.4.0-2026-04-21-phase4-p4-1-gemini-review.result.yaml`
    per WORKFLOWS.md:56-58. `.mission/CURRENT_STATE.md:266` stale
    "nine required sections" + stale review range wording also
    corrected in this round. 166 lib + 17 integration (up from 163
    lib + 16 integration; +3 new tests). clippy clean. No policy
    behavior change — `Severity::Good` / `Notify` gate / profile fire
    conditions unchanged; only the payload visibility and renderer
    coverage move forward.

    Phase 4 P4-3 (v1.8.3) shipped the Gemini G-6
    side_effects population on the first aggressive-variant profile
    per VALIDATION.md:151-153. A new profile
    `claude-script-low-token` (ProjectCanonical bundle name) bundles
    eight ProviderOfficial levers — five low-token CLI flags
    (`--bare`, `--exclude-dynamic-system-prompt-sections`,
    `--strict-mcp-config`, `--disable-slash-commands`,
    `--no-session-persistence`) plus three high-risk env vars
    (`CLAUDE_CODE_DISABLE_AUTO_MEMORY`,
    `CLAUDE_CODE_DISABLE_CLAUDE_MDS`,
    `CLAUDE_AGENT_SDK_DISABLE_BUILTIN_AGENTS`). The three high-risk
    env vars are test-enforced to live in THIS profile only
    (VALIDATION.md:144-148 guard locked by
    `high_risk_claude_levers_are_gated_to_claude_script_low_token_only`).
    `ProviderProfile.side_effects` is populated 1:1 with the lever
    list — every lever has a corresponding operator-visible
    trade-off string (e.g. "--bare suppresses verbose status output
    — debugging detail may be harder to reconstruct";
    "CLAUDE_CODE_DISABLE_AUTO_MEMORY=1 disables provider auto-memory
    — state handoff MUST go through .mission/CURRENT_STATE.md or an
    MDR (aligns with Gemini G-5)"). The new rule
    `recommend_claude_script_low_token` is gated on
    `gates.quota_tight == true` + Claude main + IdentityConfidence
    >= Medium + no active alerts + low context pressure;
    `claude-default` and the aggressive variant are mutually
    exclusive by design (the default gates OFF on quota_tight).
    `ui::panels::format_profile_lines` is extended to emit a
    `side_effects (<n>):` header + `- <effect>` entries after the
    lever block when the profile's side_effects list is non-empty;
    empty lists (as in `claude-default`) cause the section to be
    omitted. Six new tests lock the contract: shape test on the
    aggressive profile (8 levers, 8 side_effects, Good severity,
    ProjectCanonical source); gate test (suppressed when
    !quota_tight, `claude-default` fires instead); high-risk-lever
    guard (default profile must NOT contain the 3 env vars;
    aggressive profile MUST contain them); renderer test (section
    appears when side_effects is non-empty, omitted when empty);
    end-to-end integration test (quota_tight scenario through
    run_once/PaneReport/format_profile_lines yields 18 lines — 1
    header + 8 lever rows + 1 side_effects header + 8 entries — with
    DISABLE_AUTO_MEMORY and "debugging detail" both visible; no
    Notify trigger because Severity::Good). 176 lib + 18 integration
    (up from 171 + 17; +5 lib + 1 integration). clippy clean. No
    policy behavior change for existing signals; new recs only
    surface on the previously-dormant quota_tight code path.

    Phase 4 P4-4 (v1.8.4) shipped the first non-Claude provider
    profile: `codex-default`. Pattern parity with
    `recommend_claude_default` — fires on Codex main at ≥ Medium
    confidence with no active alerts / high context pressure /
    quota-tight. Provider gates stay pure: a Codex pane never fires
    a `claude-*` profile and vice versa — the three rules coexist
    cleanly in `eval_profiles` via their own `provider == ...`
    guards. v1.8.4 test count: 179 lib + 18 integration (+3 new
    unit tests for positive fire, provider-gate suppression, and
    quota_tight reservation). clippy clean.

    Phase 4 P4-4 remediation (v1.8.5) closed two reviewer findings
    raised in parallel against v1.8.4: (a) Codex + Gemini both
    flagged as risk that `commit_attribution = "false"` contradicts
    Codex spec (key is a string; empty disables; "false" would
    parse as a truthy attribution string — opposite of intended
    behavior). Fix: `value: ""`. (b) Codex flagged as warning that
    `tool_output_token_limit = 30000`'s ProviderOfficial label was
    too strong — 30000 is Qmonster's parity choice, not a Codex-
    doc canonical default. Fix: source_kind ProviderOfficial →
    ProjectCanonical + citation rewrite. The positive-fire unit
    test was renamed to
    `recommend_codex_default_fires_with_honest_authority_labels_on_healthy_codex_main`
    and tightened with per-lever explicit value + source_kind
    assertions.

    Phase 4 P4-4 confirm-remediation (v1.8.6) closed
    the two Codex v1.8.5-confirm findings — prose drift that
    survived the v1.8.5 code-layer fix. Codex confirmed v1.8.5
    closed the lever-row + test pieces of the original findings,
    but flagged that two user-visible texts in
    `src/policy/rules/profiles.rs` still described the old uniform
    "3 ProviderOfficial levers" world: (1) the `reason` string at
    line 349 (emitted on every codex-default rec and surfaced to
    the operator via PaneReport / --once / TUI panel), and (2) the
    `recommend_codex_default` doc-comment at line 305 (still said
    the bundle is "three ProviderOfficial levers" and still
    mentioned `commit_attribution = false`). Gemini's parallel
    confirm gave pass — it treated the prose drift as acceptable —
    but Codex is right that the authoritative text next to the
    code should not contradict the v1.8.5 authority split. Fix:
    (1) rewrite the reason format! so it counts ProviderOfficial
    and ProjectCanonical levers explicitly — "apply N levers for a
    healthy-state baseline main-pane Codex session — M
    ProviderOfficial + K ProjectCanonical (see lever list below
    for per-lever citations)" — derived at runtime from
    `profile.levers[*].source_kind` so future authority changes
    auto-propagate; (2) rewrite the doc-comment to describe the
    honest split (two ProviderOfficial + one ProjectCanonical),
    the correct `commit_attribution = ""` value, and the Codex
    v1.8.4-review finding #2 rationale for the ProjectCanonical
    label on `tool_output_token_limit`. The positive-fire unit
    test is extended with one new assertion
    (`rec.reason.contains("ProjectCanonical")`) so the reason-
    summary honesty is locked at the test layer alongside the
    existing `contains("ProviderOfficial")` check. 179 lib + 18
    integration (unchanged test count; one existing test tightened
    in place with +1 assertion). clippy clean. No new rule, no
    render-helper change, no provider-gate change — prose + one
    derived-from-data reason + one new assertion.

    Phase 4 P4-5 (v1.8.7) shipped the Codex aggressive
    variant `codex-script-low-token` — Gemini G-6 parity for Codex
    mirroring `claude-script-low-token` from P4-3. `recommend_codex_
    script_low_token` fires a `Severity::Good` rec on healthy Codex
    main panes under operator-opted `gates.quota_tight == true` +
    IdentityConfidence of Medium or higher + no active alerts +
    low context pressure. The new profile bundles 7 levers drawn
    from VALIDATION.md:137-143 that were explicitly reserved away
    from `codex-default`: 1 ProjectCanonical
    (`model_auto_compact_token_limit = 100000` — Qmonster-chosen
    conservative threshold, same honesty pattern as
    `tool_output_token_limit = 30000` in codex-default) + 6
    ProviderOfficial (`[features].apps = false`,
    `[apps._default].enabled = false`, and four `codex exec` flags:
    `--json`, `--sandbox read-only`, `--ephemeral`, `--color never`).
    Each lever carries a Codex-docs citation;
    `ProviderProfile.side_effects` populated 1:1 with the lever
    list (G-6 contract) — seven full-sentence operator-visible
    trade-off strings including a cross-reference to Gemini G-5 on
    the auto-compaction row. Reason summary is derived from the
    lever source_kinds at runtime (same pattern as codex-default
    v1.8.6): "apply 7 levers ... — 6 ProviderOfficial + 1
    ProjectCanonical, with 7 operator-visible side effects (see
    list below)". `codex-default` and `codex-script-low-token` are
    mutually exclusive by design — `codex-default` has
    `if gates.quota_tight { return None; }` and the aggressive
    variant has `if !gates.quota_tight { return None; }`, same
    shape as the Claude pair. Provider gates stay pure across all
    four profiles: a Codex pane never sees `claude-*`, a Claude
    pane never sees `codex-*`. 183 lib + 18 integration (up from
    179 + 18; +4 new unit tests: shape with honest authority
    labels + 7 levers + 7 side_effects; gate off when !quota_tight
    with codex-default sanity check; provider-gate suppression on
    Claude pane with claude-script-low-token sanity check; explicit
    mutual-exclusion test toggling quota_tight and asserting
    exactly one of the two Codex profiles fires). clippy
    --all-targets -D warnings clean.

    Phase 4 P4-6 (v1.8.8) shipped the first
    non-Claude-non-Codex provider profile: `gemini-default`. Pattern
    parity with `recommend_claude_default` / `recommend_codex_default`
    — fires on Gemini main at IdentityConfidence of Medium or
    higher with no active alerts / high context pressure /
    quota-tight. The profile bundles 2 levers from the Gemini CLI
    surface, BOTH labeled `ProjectCanonical` because Gemini's
    documented config surface for explicit token-efficiency is
    narrower than Claude Code's or Codex's — we honestly flag each
    VALUE as a Qmonster pick rather than overclaim
    ProviderOfficial canonical defaults: (1) `--model =
    gemini-2.5-flash` (a lighter/cheaper model for routine healthy
    main-pane work; Gemini CLI docs describe --model but don't
    mandate a canonical default value), (2) `--yolo = unset`
    (recommend NOT setting --yolo on an interactive baseline per
    the safety-precedence constraint; the aggressive Gemini variant
    in P4-7 will reserve the auto-approval path for quota_tight-
    opted sessions). Each lever carries a citation that explains
    the "documented key, Qmonster-chosen value" split. The
    VALIDATION.md:149-150 constraint ("Gemini profile recs stay
    advisory; save_memory / Auto Memory is not treated as a state
    store") is NOT duplicated as a lever — it's already enforced
    by the separate `recommend_mdr_over_auto_memory` rule shipped
    in P4-2 (auto_memory.rs), which fires on any provider including
    Gemini under state-critical task types. Reason summary derives
    ProviderOfficial / ProjectCanonical counts at runtime (same
    pattern as the Claude and Codex baselines after v1.8.6
    remediation) — for gemini-default it reads "apply 2 levers ...
    — 0 ProviderOfficial + 2 ProjectCanonical ...". Provider gates
    stay pure across all five profile rules. 186 lib + 18
    integration (up from 183 + 18; +3 new unit tests: shape
    assertion of the 2-lever / 0 PO / 2 PC / empty side_effects
    contract with per-lever value + source_kind assertions;
    provider-gate suppression on Claude + Codex panes with
    claude-default and codex-default sanity checks; quota_tight
    suppression reserving the P4-7 path). clippy --all-targets -D
    warnings clean. No new RequestedEffect; no renderer change.

    Phase 4 P4-7 (v1.8.9) shipped the Gemini aggressive
    variant `gemini-script-low-token` — closes Gemini G-6 parity
    across all three providers and completes the 3×2 profile grid
    (Claude + Codex + Gemini × baseline + aggressive). Fires under
    operator-opted `gates.quota_tight == true` + Gemini main +
    IdentityConfidence of Medium or higher + healthy signals.
    Mutually exclusive with `recommend_gemini_default` via the
    shared quota_tight gate + an explicit mutual-exclusion test.
    The profile bundles 3 levers, all labeled `ProjectCanonical`
    (0 ProviderOfficial) — same honesty pattern as gemini-default
    because Gemini's documented token-efficiency surface is
    narrower than Claude Code's or Codex's: (1) `--yolo = enabled`
    (inverse of baseline's unset — auto-approval opt-in for
    scripted sessions), (2) `save_memory = disabled` (explicit
    off-switch aligned with VALIDATION.md:149-150 + Gemini G-5),
    (3) `--model = gemini-2.5-flash` (explicit reaffirmation so
    scripted sessions see the model choice in one place). Each
    lever carries a per-lever citation; `ProviderProfile.side_effects`
    populated 1:1 with the lever list (three full-sentence
    operator-visible trade-offs). The save_memory side_effect
    cross-references G-5 + `.mission/CURRENT_STATE.md` + MDR —
    same pattern Claude + Codex aggressive variants use,
    preserving architectural principle consistency across
    providers. Reason summary is derived at runtime from lever
    source_kinds (v1.8.6 pattern). 190 lib + 18 integration (up
    from 186 + 18; +4 new unit tests: shape with honest authority
    labels + 3 levers + 3 side_effects + G-5 cross-reference
    check; gate-off when !quota_tight with gemini-default sanity
    check; provider-gate suppression on Claude + Codex panes with
    claude-script-low-token + codex-script-low-token sanity
    checks; explicit mutual-exclusion test toggling quota_tight).
    clippy --all-targets -D warnings clean. No new RequestedEffect;
    no renderer change; existing format_profile_lines handles the
    new rec transitively.

    Phase 4 P4-7 remediation (v1.8.10) closed the
    two Codex v1.8.9 P4-7 review findings. Finding #1 (risk): the
    aggressive Gemini profile used `save_memory = disabled` as a
    lever, but Gemini CLI docs describe `save_memory` as a TOOL
    (invoked by the agent) and Auto Memory as a separate config
    key `experimental.autoMemory`. Disabling the Auto Memory
    feature requires setting the config key, not a phantom
    `save_memory` key. Fix: replace the lever with
    `experimental.autoMemory = false`. Because this is a
    documented-key + documented-value (Gemini CLI auto memory
    docs show the disable toggle explicitly), the lever's authority
    label graduates to `ProviderOfficial` — the bundle is now 1
    ProviderOfficial + 2 ProjectCanonical (from the prior honestly-
    conservative 0 PO + 3 PC). Side_effect + citation updated to
    cite the correct config key. The G-5 cross-reference ("state
    handoff MUST go through .mission/CURRENT_STATE.md or an MDR")
    is preserved. Finding #2 (warning): three prose locations in
    `src/policy/rules/profiles.rs` still described a pre-P4-7
    state — the module doc-comment (line 8) had a "P4-5 (aggressive
    Codex variant, tbd)" reference, the gemini-default `--yolo`
    lever comment said "aggressive variant in P4-7, tbd", and the
    `recommend_gemini_default_suppressed_when_quota_tight_on` test
    comment said the aggressive variant "will own the quota_tight
    path" as if pending. All three updated to reflect the shipped
    3×2 grid. The test that locks the aggressive bundle shape was
    also tightened: the old blanket 0-PO-3-PC assertion is split
    into explicit 1-PO-2-PC assertions, the per-lever source_kind
    assertion on `experimental.autoMemory` explicitly verifies
    `ProviderOfficial`, and the reason-summary assertion now
    requires BOTH `ProviderOfficial` and `ProjectCanonical` tokens
    (mirroring the codex-default v1.8.6 pattern). 190 lib + 18
    integration (unchanged test count — the existing positive-fire
    test was tightened in place with updated assertions). clippy
    --all-targets -D warnings clean. No policy-behavior change;
    the user-visible render output for the aggressive Gemini
    profile now reads "apply 3 levers ... — 1 ProviderOfficial
    + 2 ProjectCanonical ..." and the auto-memory lever row
    shows `[PO] experimental.autoMemory = false — Gemini CLI
    docs — auto memory: experimental.autoMemory config key ...`
    instead of the prior `[PC] save_memory = disabled`.

    Phase 4 P4-7 follow-up (v1.8.11, this revision) closes the
    single warning Codex returned in the v1.8.10 confirm review
    (6f5631e..7c9e951, approve-with-fixes). Codex confirmed the
    risk (finding #1 — save_memory surface) was fully closed and
    the stale-prose sweep (finding #2) had cleared three locations,
    but flagged that the v1.8.10 pass had missed two additional
    `gemini-script-low-token` comments that still over-claimed the
    bundle as "all ProjectCanonical" even though the implementation
    and tests now carry 1 ProviderOfficial + 2 ProjectCanonical.
    This revision rewrites both spots — the `recommend_gemini_
    script_low_token` function doc-comment (lines 762-776) and the
    `recommend_gemini_script_low_token_fires_on_quota_tight_with_
    honest_authority_labels_and_populated_side_effects` test
    comment (lines 1728-1733) — so every human-readable description
    of the aggressive Gemini bundle names the honest mixed-
    authority split (1 PO = experimental.autoMemory documented key
    + disable value; 2 PC = --yolo + --model Qmonster picks).
    `.mission/CURRENT_STATE.md` was also synced locally (reason-
    summary line + test-row "0 PO + 3 PC → 1 PO + 2 PC"), keeping
    the gitignored dev doc consistent with the tracked ledger.
    No code-behavior / test-assertion / render-output change —
    the positive-fire test already enforces 1-PO-2-PC since
    v1.8.10. 190 lib + 18 integration (unchanged). clippy --all-
    targets -D warnings clean. Codex v1.8.10 confirm finding
    closed; Codex v1.8.11 confirm2 (7c9e951..db98022) returned
    `approve` with no findings — Phase 4 is now fully gate-
    approved by both reviewers (Codex + Gemini). Canonical docs
    (PROJECT_BRIEF.md phase line, VALIDATION.md Phase-4 checkboxes,
    UI_MANUAL.md section 6 Provider Profile render format) synced
    to the shipped 3×2 grid state in the same round.

    Phase 4 P4-2 (v1.8.2) shipped the Gemini G-5
    auto-memory guide rule — the second Phase-4 slice. When the
    adapter-inferred task_type is `TaskType::Review` or
    `TaskType::SessionResume` (both classes of work that produce
    handoff-grade state that gets lost if stored only in a
    provider's machine-local memory), a new rule
    `recommend_mdr_over_auto_memory` in
    `src/policy/rules/auto_memory.rs` emits a `Severity::Concern`
    passive advisory (no Notify; positive routing guidance) with
    `next_step` pointing at the two canonical write targets:
    `.mission/CURRENT_STATE.md` or a new
    `.mission/decisions/MDR-XXX.md`. The rec carries
    `source_kind: ProjectCanonical` (this is a Qmonster
    architectural rule from mission.yaml constraints — "auto memory
    ... never the primary state store" — not a provider-doc fact).
    Respects KD-007 (Low-confidence panes suppress the rec because
    `task_type` inference is unreliable) and suppresses when the
    operator's attention is already on `waiting_for_input` or
    `permission_prompt`. Wired into `Engine::evaluate` after
    profiles so G-5 recs flow through the same PaneReport path.
    Five new unit tests cover positive fires (Review + SessionResume),
    negative narrow scope (Unknown / CodeExploration / LogTriage /
    Summary / Automation all suppressed), identity-confidence gate,
    and attention-redirect suppression. 171 lib + 17 integration
    (up from 166 + 17; +5 new tests). clippy clean. No new
    RequestedEffect; no effect-runner change. Closes Gemini G-5 for
    VALIDATION.md:154-156 Phase-4 check (auto-memory guidance).

