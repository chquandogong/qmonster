    TODO #1 — a new `parse_kind_inverts_as_str_for_every_variant`
    test in `src/store/audit.rs` iterates all 20 variants and
    asserts `parse_kind(kind.as_str()) == Some(kind)`; it also
    asserts `parse_kind("__RetiredKindFromV0.3__") == None` to
    pin the Option-return contract that makes older DB rows
    safe to read. Pairs with the domain-layer as_str contract
    to form a two-sided round-trip guarantee at the type-string
    layer (no SQLite needed). (4) Codex v1.10.4 optional TODO
    #2 — an explicit `assert_eq!(format!("{kind:?}"), *expected)`
    assertion inside the existing domain contract test locks
    `{:?}` ↔ Display parity so the Debug-equals-Display
    correspondence no longer depends on variant-naming
    convention. 246 lib + 6 drift + 22 integration = 274 tests
    (+1 net vs. v1.10.4 — the new parse_kind round-trip test;
