    Help p/d bullet split + first git tag (v1.10.7, this
    revision) closes two operator-reported UX gaps from v1.10.6.
    (1) Help indent was applied per `Line` via the new
    `HELP_DETAIL_INDENT`, but the `p` / `d` entries wrapped
    flush-left because the long description was one `Line` with
    a soft-wrap — wrapped continuation rows lost the indent.
    Fix: the `p` row is now a short summary followed by three
    bullet continuation `Line`s (one per actuation mode),
    prefixed with a new `HELP_CONTINUATION_PREFIX` = `"    · "`
    (4-space indent + bullet). Each bullet names the audit
    chain for its mode: Execute → `PromptSendAccepted →
    PromptSendCompleted or PromptSendFailed`; AutoSendOff →
    `PromptSendAccepted + PromptSendBlocked`; observe_only →
    `PromptSendBlocked` alone. The `d` row stays single-line
    since its text is short enough not to wrap. Audit-kind names
    still come from the v1.10.5 `AuditEventKind::Display`
    splicing (compile-time linkage preserved). (2) The footer
    version badge landed in v1.10.6 as a `git describe`
    delegation, but no git tags existed so it always rendered
    the short SHA (`e869792`, `7fd25c9`). This revision creates
    an annotated tag `v1.10.7` at the commit that ships this
    slice, which makes `git describe --tags --always --dirty`
    return `v1.10.7` at the tagged commit and
    `v1.10.7-N-g<short>` for subsequent commits. Build.rs
    rebuilds automatically when `.git/refs/tags/*` changes
    because `.git/HEAD` is already watched and any
    `git checkout v1.10.7` / `git describe` lookup reaches
    through the same ref tree. The
    `help_overlay_documents_p_and_d_prompt_send_actions` test
    is rewritten for the new multi-line shape: it still uses
    `entry_for("p")` for the summary row but asserts audit-kind
    tokens against the joined help text (which includes
    bullets), and adds a bullet-count assertion on
    `HELP_CONTINUATION_PREFIX` so a regression that silently
    drops the bullets fails here first. 248 lib + 6 drift + 22
    integration = 276 tests (unchanged vs. v1.10.6 — the two
    existing tests gain assertions but no new test bodies are
    added). clippy --all-targets -D warnings clean; cargo fmt
    clean. Layered on v1.10.6 UX polish (`7fd25c9`); everything
    below untouched.

    Bullet hanging indent (v1.10.8, this revision) closes the
    operator's follow-up on v1.10.7: the bullet continuation
    rows were indented to col 4 (HELP_CONTINUATION_PREFIX was
    `"    · "`), which visually read as only 2 chars more
    indent than the summary row at col 2 — not a clear nest.
    Fix: `HELP_CONTINUATION_PREFIX` is deepened from 4 spaces to
    20 spaces before the `· ` marker, so the bullet sits at
    column 20 (same column as the `:` in the summary row) and
    bullet text then starts at column 22 (the value column of
    the summary row). Result: bullets hang directly under the
    value of the `p` entry in classic hanging-indent style
    instead of looking like shallow top-level rows. A new unit
    test `help_continuation_prefix_hangs_bullet_under_value_
    column` computes the expected column offset from
    `HELP_DETAIL_INDENT` + `HELP_LABEL_WIDTH` + `": "` and
    asserts (a) the prefix consumes exactly that many chars
    before the bullet text begins, and (b) the `·` sits at
    the col-20 bullet position — so any future tweak to
    `HELP_DETAIL_INDENT` / `HELP_LABEL_WIDTH` /
    `HELP_CONTINUATION_PREFIX` that breaks alignment fails here
    before shipping. No content change — the three audit-chain
    bullets (Execute / AutoSendOff / observe_only) and the
    `p` summary text are unchanged. Also creates annotated tag
    `v1.10.8` at the commit that ships this slice, so
    `git describe --tags` returns `v1.10.8` and the footer
    badge renders the release label (continuing the v1.10.7
    per-ledger-version tagging convention). 249 lib + 6 drift
    + 22 integration = 277 tests (+1 net vs. v1.10.7); clippy
    --all-targets -D warnings clean; cargo fmt clean. Layered
    on v1.10.7 (`346fe27`); everything below untouched.

