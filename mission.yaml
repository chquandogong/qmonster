      type: automated
      description: "fresh clone에서 cargo clippy --all-targets -- -D warnings 성공"
      command: "cargo clippy --all-targets -- -D warnings"
      pass_criteria: "exit code 0"

    - name: "local_workflow_handoff_sanity"
      type: manual
      description: >
        `.mission/CURRENT_STATE.md` and `.docs/*` remain local-only
        operator workflow artifacts. They may exist locally and are
        still useful for handoff, but shared clone acceptance must not
        depend on them.

    - name: "official-vs-heuristic-labeling"
      type: manual
      description: >
        Spot-check the planning report and canonical docs: every
        provider-specific lever is labeled (official) with the referenced
        doc section, or (heuristic) when derived from community tools and
        posts. Numeric thresholds from community tools are marked
        (estimated).

    - name: "thin-router-byte-budget"
      type: manual
      description: >
        Reviewer confirms CLAUDE.md, AGENTS.md, GEMINI.md each contain
        only: (a) pointers to docs/ai/, (b) pointers to mission ledger,
        (c) pointers to working-doc directories, (d) one short block of
        provider-specific rules. No procedures. No architecture content.
        No decision records. No state.

