  constraints:
    - "Thin-router rule: CLAUDE.md, AGENTS.md, GEMINI.md must not contain giant always-loaded prompt content. Detailed procedures live in docs/ai/, .claude/rules/, .agents/skills/, .gemini/skills/."
    - "Layer separation: docs/ai/ = canonical (Git-tracked); .docs/ = raw working docs (gitignored); mission.yaml + mission-history.yaml + .mission/ = local contract/ledger (gitignored in single-user phase)."
    - "Auto memory (Claude MEMORY.md + topic files, Codex memories, Gemini save_memory / Auto Memory) is treated as local convenience only — never the primary state store."
    - "Day-end state goes to .mission/CURRENT_STATE.md, not to any memory file."
    - "No destructive automation is enabled by default. No auto /compact, /clear, /memory mutation, prompt injection, or provider reconfiguration."
    - "Default action mode = recommend_only. Allowed auto actions: notifications, raw archive. Disallowed auto actions: prompt-send, destructive mutations."
    - "Logging sensitivity default = balanced (minimal | balanced | forensic). Raw full tail goes to archive store, not the audit log."
    - "Refresh policy = manual_only. Qmonster surfaces 'refresh available' but never silently upgrades model/CLI/settings."
    - "Token optimization is an architectural pillar, not an add-on feature. It shapes the observe -> classify -> recommend -> archive -> checkpoint loop."
    - "Aggressive recommendations only surface when the user has opted into quota-tight mode."
    - "Official provider facts (Claude/Codex/Gemini docs) must be labeled distinctly from community heuristics (LinkedIn posts, RTK / Context Mode / Token Savior / Caveman / claude-token-efficient / token-optimizer-mcp) in every UI screen and every doc."
    - "Pane identity = {provider, instance, role, pane_id}. Repeated providers within one project window are allowed (e.g., claude:1:main, claude:2:review)."
    - "tmux: primary prefix stays Ctrl-b; Ctrl-g is secondary prefix. Pane title convention is '{provider}:{instance}:{role}'. One project = one window = four panes by default."
    - "Git tracking: .docs/, mission.yaml, mission-history.yaml, .mission/, .mission-spec/ stay gitignored in this single-user phase. Design must allow flipping mission.yaml, mission-history.yaml, .mission/decisions/, .mission/evals/, and docs/ai/ to tracked state when the team/CI phase begins."
    - "Implementation stack: Rust first (Ratatui/Crossterm). tmux integration via polling first, with the adapter shaped so control-mode can replace polling later. SQLite for archive/snapshot store."
    - "UI color rule: low-saturation palette (grey / navy / blue). Color is reserved for state transitions (good/warning/critical) and always accompanied by a numeric % or severity letter — never color-only."
    - "Source-of-number rule: every displayed metric must be labeled (official) if the provider reported it, or (estimated) if Qmonster derived it from tail/state/docs surface."
    - "SourceKind taxonomy (r2): Qmonster replaces the two-way official/estimated split with a four-way SourceKind = ProviderOfficial | ProjectCanonical | Heuristic | Estimated. Every metric, threshold, recommendation, and doc citation must carry one. ProviderOfficial requires a direct provider-doc citation. See docs/ai/ARCHITECTURE.md §SourceKind taxonomy."
    - "Safety precedence asymmetry (r2, resolves Codex C-6): env/CLI may only move actions.mode, allow_auto_prompt_send, allow_destructive_actions, and refresh.policy TOWARD safer behavior. Upward overrides are ignored at startup and logged as risk-severity audit events. Runtime code never toggles these flags."
    - "Runtime FS write boundary (r2, Codex CSF-1 + Gemini G-9): Qmonster runtime writes only within ~/.qmonster/ (default) or the operator-specified --root. Project-directory files (CURRENT_STATE.md, mission.yaml, mission-history.yaml, docs/ai/*, provider configs, source files) remain read-only to Qmonster across Phases 2-4."
    - "Runtime checkpoint location (r2, Codex C-4 + Gemini Doc-hierarchy): runtime snapshots go to ~/.qmonster/snapshots/. .mission/CURRENT_STATE.md is a day-end handoff document written by the human day-end routine — never by Qmonster runtime."
    - "Contract vs runtime split (r2, Codex CD-2): mission.yaml defines the design envelope and approval gates. Runtime actuation flags (actions.mode, allow_auto_*) live in config/qmonster.example.toml. Do not duplicate runtime flags into mission.yaml."
    - "Audit-log isolation (r2, Codex CSF-2 + Gemini G-8): the audit-log writer cannot accept raw bytes. Type-level enforcement, not comment-level. Raw tails live only in ~/.qmonster/archive/."
    - "Identity-before-adapters pipeline (r2, Codex C-3): tmux::RawPaneSnapshot -> domain::IdentityResolver -> adapters::ProviderParser -> domain::SignalSet -> policy::Engine -> app::EffectRunner -> ui::ViewModel. adapters/ never performs identity inference."
    - "IdentityConfidence gate (r2, Codex C-7): panes with IdentityConfidence::Low or Unknown suppress provider-specific recommendations. Basic alerts still fire."

