    Audit-vocab compile-time safety cleanup (v1.10.4, this
    revision) closes the compatible Codex v1.10.2 §9 + Gemini
    v1.10.2 #10 forward-watch TODOs in a single small domain-
    layer refactor. Both reviewers converged on the same concern
    from different angles — Codex wanted a `store/audit` string-
    contract test locking the kind_to_str vocabulary; Gemini
    wanted `Display`/`AsRef<str>` on `AuditEventKind` for
    compile-time safety. The cleanest fix does both. Changes:
    (1) `src/domain/audit.rs` — `AuditEventKind` gains
    `pub const fn as_str(&self) -> &'static str` with an
    exhaustive match over all 20 current variants (14 pre-Phase-5
    + 3 P5-1 proposal-lifecycle + 3 P5-3 terminal-outcome). The
    `const` qualifier lets the method serve as a compile-time
    source of truth, and the exhaustive match means adding a new
    variant without extending this match is a compile-time error.
    (2) `src/domain/audit.rs` — `impl AsRef<str> for
    AuditEventKind` and `impl std::fmt::Display for
    AuditEventKind`, both delegating to `as_str`, so callers can
    choose the ergonomic form they prefer without introducing
    drift. (3) `src/store/audit.rs::kind_to_str` becomes a
    one-line delegate (`k.as_str()`), preserving the existing
    `SqliteAuditSink::record` call site shape while removing the
    duplicated match arms that previously lived in this file;
    adding a new variant is now a single-location change in the
    domain module. (4) New domain-layer contract test
    `audit_event_kind_as_str_contract_locks_every_variant_string`
    iterates a table of all 20 `(AuditEventKind, &str)` pairs and
    verifies `as_str`, `Display`, and `AsRef<str>` all agree with
    the expected canonical form. 245 lib + 6 drift + 22
    integration = 273 tests pass (+1 net vs. v1.10.3 baseline);
    clippy --all-targets -D warnings clean; cargo fmt clean.
    Scope boundary: `src/ui/dashboard.rs` is deliberately NOT
    touched in this slice — the existing `help_overlay_documents_
    p_and_d_prompt_send_actions` test already catches token
    drift, and rewriting the help prose to splice `as_str()` at
