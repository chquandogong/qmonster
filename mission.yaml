  evals:
    - name: "mission-schema-valid"
      type: automated
      description: "mission.yaml passes mission-spec validator."
      command: 'node -e "import(''yaml'').then(async ({parse}) => { const {readFileSync} = await import(''node:fs''); const {validateMission} = await import(''/home/chquan/.claude/plugins/cache/mission-spec/mission-spec/1.16.15/dist/schema/validator.js''); const r = validateMission(parse(readFileSync(''mission.yaml'',''utf-8''))); if (r.valid) { console.log(''mission.yaml: VALID''); } else { console.error(''INVALID:'', r.errors.join('', '')); process.exit(1); } })"'
      pass_criteria: "exit code 0 and stdout contains 'mission.yaml: VALID'"

    - name: "docs-hierarchy-sanity"
      type: manual
      description: >
        docs/ai/ contains 5 non-placeholder canonical files; .mission/
        contains CURRENT_STATE.md filled with real content; .docs/claude/
        contains the r1 planning report; CLAUDE.md, AGENTS.md, GEMINI.md
        each stay ≤ ~60 lines and only route to canonical docs and the
        mission ledger.

    - name: "official-vs-heuristic-labeling"
      type: manual
      description: >
        Spot-check the planning report and canonical docs: every
        provider-specific lever is labeled (official) with the referenced
        doc section, or (heuristic) when derived from community tools and
        posts. Numeric thresholds from community tools are marked
        (estimated).

    - name: "thin-router-byte-budget"
      type: manual
      description: >
        Reviewer confirms CLAUDE.md, AGENTS.md, GEMINI.md each contain
        only: (a) pointers to docs/ai/, (b) pointers to mission ledger,
        (c) pointers to working-doc directories, (d) one short block of
        provider-specific rules. No procedures. No architecture content.
        No decision records. No state.

    - name: "no-premature-code"
      type: automated
      description: "Rust source must still compile to the placeholder bootstrap — no implementation added yet."
      command: "cargo check --quiet"
      pass_criteria: "exit code 0"

    - name: "cross-check-handoff-ready"
      type: manual
      description: >
        All four cross-check input files exist before Codex round: mission.yaml,
        mission-history.yaml, .mission/CURRENT_STATE.md, docs/ai/*.md,
        .docs/claude/Qmonster-v0.4.0-2026-04-20-claude-plan-r1.md. The
        planning report ends with an explicit Codex TODO list and an
        explicit Gemini TODO list so reviewers know what to look at.

