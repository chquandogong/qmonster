      Claude pressure metrics per pane so CTX and both quota windows are
      shown together after operator refresh.
      v1.16.53 fixes Codex quota semantics by treating bottom-status
      `5h N%` and `weekly N%` as remaining quota, then inverting them
      into Qmonster pressure badges (`100 - N`) before policy/UI use.
      v1.16.54 fixes two live TUI keyboard regressions: one-shot Claude
      runtime refresh captures are merged before the live tail so cursor
      detection stays stable after `u`, and `c` / `C` clears all system
      notices, including Good recovery/success notices, before any
      dashboard selection handling can intercept the key. The npm package
      semver is now aligned with the ledger tag as `qmonster@1.16.54`.
      v1.16.55 completes Phase C C3 by adding `codex-review` and
      `gemini-policy-review` as role-gated provider-profile
      recommendations for healthy review panes. These profiles stay
      `Severity::Good`, carry structured profile payloads and
      source-labeled levers, and remain independent of the main-pane
      `quota_tight` baseline/aggressive switch.
      v1.16.56 narrows the `code-exploration` advisory so output volume
      alone no longer fires the graph/symbol recommendation on healthy
      Main panes.
      v1.16.57 fixes two live operator findings: Gemini `thinking...`
      progress markers suppress stale-IDLE fallback, and active-pane
      Claude runtime refresh stops sending defensive `Escape`.
      v1.16.58 restores `u` on active/uncertain Claude panes by sending
      only `/stats` without any pre/post `Escape`, and keeps Gemini
      live-prompt panes active while recent tail history is still
      changing.
      v1.16.59 restores the operator-requested Claude runtime cycle
      across active and idle states: `/status`, `/usage`, `/stats`, one
      command per `u` keypress, captured first and then closed with
      `Escape`.
      v1.17.0 opens Phase D D1 with opt-in cross-window concurrent-work
      correlation. v1.17.1 replaces Claude slash-command refresh with
      live statusline parsing for CTX/5h/7d/model/effort/path/permission
      mode and makes Claude `u` force-poll only with no provider input.
    note: >
