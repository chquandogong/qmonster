      severity: "warning"
      title: "the structured provider profile is created, but the runtime path drops it before any operator-visible surface"
      references:
        - "src/policy/rules/profiles.rs:73-89"
        - "src/domain/recommendation.rs:28-50"
        - "src/main.rs:231-238"
        - "src/ui/panels.rs:57-63"
        - "mission.yaml:284-286"
      detail: >
        `recommend_claude_default()` constructs a `ProviderProfile`
        with three `ProviderOfficial` levers and per-lever citations,
        but `Recommendation` has no field to carry that bundle. The
        live output path therefore degrades the profile into a prose
        `reason` string; lever keys, values, citations, and source-kind
        labels never reach `PaneReport`, `--once`, or the TUI.
      resolution: >
        Add a structured profile payload to the recommendation/output
        path, render the profile name plus each lever's key/value/
        citation/source-kind on at least one live surface, and add one
        end-to-end regression test that proves the payload survives
        `Engine::evaluate -> run_once -> render/format`.
  notes:
