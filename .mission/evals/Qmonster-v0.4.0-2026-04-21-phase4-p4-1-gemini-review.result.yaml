    - name: "Policy rule + engine wiring (profiles.rs + engine.rs)"
      status: "pass"
      notes: >
        recommend_claude_default fires ONLY on healthy Claude main
        panes — no waiting_for_input / permission_prompt / log_storm /
        error_hint / high context_pressure / quota_tight. Defensive
        early-returns are tightly scoped and prevent noise. Engine
        wiring places eval_profiles after advisories with the same
        Vec<Recommendation> shape — no pipeline disruption.
    - name: "Severity::Good first use — positive advisory"
      status: "pass"
      notes: >
        Very appropriate. Severity enum's PartialOrd gives
        Severity::Good < Severity::Warning, so the existing
        `any_urgent = recs.iter().any(|r| r.severity >= Severity::Warning)`
        gate in policy/engine.rs keeps RequestedEffect::Notify from
        firing on profile recs. Passive advisory semantics as designed.
    - name: "Authority split: ProjectCanonical profile name vs ProviderOfficial levers"
      status: "pass"
      notes: >
        Conceptually perfect separation. claude-default is our project's
        abstraction (ProjectCanonical); CLAUDE_CODE_FILE_READ_MAX_OUTPUT_TOKENS=25000
        is a provider-docs fact (ProviderOfficial). Suggested UI
        hierarchy: [PC] badge next to profile name, [PO] badge + citation
        per lever row.
    - name: "suggested_command: None with justification"
      status: "pass"
      notes: >
        Follows the v1.7.x "empty-command sees a stated reason" rule.
        Profile application is multi-key settings-editing across
        ~/.claude/settings.json + env vars — not one shell line. The
        Phase-5 "manual prompt-send helper" roadmap pointer is a good
        design decision.
