  - change_id: "qmonster-v1.16.26-control-mode-reconnect-hardening"
    semantic_version: "1.16.26"
    change_sequence: 108
    date: "2026-04-27"
    author: "Codex (GPT-5)"
    contributors:
      - "Operator directive: continue Phase C C2 and close each work item with commit/push/tag"
    change_type: "fix"
    motivation_type: "Phase C C2 control-mode tmux adapter hardening"
    persistence: "permanent"
    intent: >
      Reduce long-running TUI risk for the opt-in control-mode transport by
      recovering from client lifecycle failures without masking real tmux
      command errors.
    intent_ko: >
      opt-in control-mode transportΉζα ΉηξΉΜεΆ░Ε TUI ΉΜνΊΨΚ ΈουΉΛνΊΒυΈξ╝ ΈΓχΉ╢ΦΆ╕░ ΉεΕΊΧ┤,
      ΉΜνΉιε tmux command ΉανΈξαΈΛΦ ΉΙρΆ╕░ΉπΑ ΉΧΛΉε╝Έσ┤ΉΕε client lifecycle failureΈπΝ
      Έ│╡Ά╡υΊΧεΈΜν.
    decision: >
      Detect transport-level control-mode failures (`%exit`, control-mode EOF,
      and broken pipe), reconnect the control-mode client once, and retry the
      same command. Ordinary command-level tmux failures such as bad targets are
      returned unchanged.
    decision_ko: >
      `%exit`, control-mode EOF, broken pipe Ά░βΉζΑ transport-level failureΈξ╝
      Ά░ΡΉπΑΊΧαΈσ┤ control-mode clientΈξ╝ ΊΧε Έ▓Ι ΉηυΉΩ░Ά▓░ΊΧαΆ│ι Ά░βΉζΑ commandΈξ╝ ΉηυΉΜεΈΠΕΊΧεΈΜν.
      bad target Ά░βΉζΑ Ήζ╝Έ░α command-level tmux failureΈΛΦ Έ│ΑΆ▓╜ ΉΩΗΉζ┤ Έ░αΊβαΊΧεΈΜν.
    triggered_by: "Follow-up hardening after v1.16.25 introduced the opt-in control-mode source."
    issue_or_context: >
      A persistent control-mode client can exit or lose its pipe during a long
      TUI session. Without a reconnect path, the opt-in transport would surface
      repeated polling failures until restart.
    changes:
      added:
        - "src/tmux/control_mode.rs: transport-error classifier and reconnect-once retry"
        - "src/tmux/control_mode.rs: regression test that transport errors are distinct from command errors"
      modified:
        - "README / ARCHITECTURE / PROJECT_BRIEF / mission ledger updated for v1.16.26"
      removed: []
    changed_sections:
      - "src/tmux/control_mode.rs"
      - "README.md"
      - "docs/ai/ARCHITECTURE.md"
      - "docs/ai/PROJECT_BRIEF.md"
      - "mission.yaml"
      - "mission-history.yaml"
    done_when_delta:
      added:
        - "control-mode transport reconnects once on lifecycle failures"
        - "command-level tmux failures remain caller-visible and are not retried as lifecycle faults"
      modified:
        - "control-mode unit tests increase by one"
      removed: []
    impact_scope:
      code: "opt-in control_mode transport only; default polling behavior unchanged"
      tests: "577 total passed έΑΦ 517 lib + 0 main + 36 event_loop + 18 false_positive + 6 idle_state + 0 sim; additional manual smoke: control-mode --once against live tmux session"
      ledger: "1 new timeline entry (sequence 108); meta bump"
      review_gate: "cargo fmt --check, git diff --check, cargo test --all-targets, cargo clippy --all-targets -- -D warnings, control-mode --once smoke, and ./scripts/verify-shared.sh pass. Shared verification uses the lite ledger fallback because mission-spec is not installed locally."
      follow_up_carryover: "Continue C2 with parity checks and additional live-source validation before considering default switch."
