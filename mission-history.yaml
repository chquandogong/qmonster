      under the value of the `p` entry in standard hanging-
      indent style. A new unit test
      `help_continuation_prefix_hangs_bullet_under_value_column`
      computes the expected column offset from
      `HELP_DETAIL_INDENT + HELP_LABEL_WIDTH + ": "` and asserts
      (a) the prefix consumes exactly that many chars before the
      bullet text begins and (b) the `¬∑` sits at the col-20
      bullet position. Any future change to
      `HELP_DETAIL_INDENT` / `HELP_LABEL_WIDTH` /
      `HELP_CONTINUATION_PREFIX` that breaks the alignment fails
      here before shipping. No content change ‚Äî the three
      audit-chain bullets (Execute / AutoSendOff / observe_only)
      and the `p` summary text are unchanged.
      Post-commit git operation: create annotated tag `v1.10.8`
      at HEAD and push. Build.rs re-runs on the new tag
      (rerun-if-changed on `.git/HEAD` + currently-checked-out
      ref), so a fresh build renders `v1.10.8` in the footer.
    decision_ko: >
      `HELP_CONTINUATION_PREFIX`Î•º 4-spaceÏóêÏÑú 20-space + `¬∑ `Î°ú
      Î≥ÄÍ≤Ω. `¬∑` ÎßàÏª§Í∞Ä col 20(HELP_DETAIL_INDENT(2) +
      HELP_LABEL_WIDTH(18))Ïóê ÏúÑÏπò ‚Äî summary ÌñâÏùò `:`ÏôÄ Í∞ôÏùÄ col.
