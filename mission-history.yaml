  - change_id: "phase-3a-gate-remediation"
    semantic_version: "1.6.1"
    change_sequence: 8
    date: "2026-04-21"
    author: "Claude Code (claude:1:main, Sonnet 4.6)"
    contributors:
      - "Codex (codex:1:review, Phase-3A gate-open cross-check)"
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "fix"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close all three Codex Phase-3A findings (all warnings) so the
      Phase-3B gate can open without contract regressions. Finding #1:
      Notify dispatch leaked Concern-severity recs when a Warning rec
      co-existed. Finding #2: alert_event used AlertFired for every rec
      regardless of severity. Finding #3: canonical docs described the
      G-11 concurrent-work rule in terms of a stricter trigger (same file
      or git branch) that was not yet shipped, while the actual
      implementation uses a same-current_path proxy.
    intent_ko: >
      Codex Phase-3A 지적 3건(모두 warning)을 닫고 Phase-3B 게이트를 열
      수 있게 정리한다. 지적 #1: Warning rec가 함께 있을 때 dispatch_notify
      가 Concern-severity rec에도 알림을 보내는 누출. 지적 #2: alert_event
      가 severity에 무관하게 AlertFired를 사용. 지적 #3: canonical 문서가
      실제 구현(same-current_path 프록시)이 아닌 미래 계획(same file/git
      branch)으로 G-11 규칙을 설명.
    decision: >
      (1) dispatch_notify now filters recs by r.severity >= Severity::Warning
      before calling the rate limiter and notifier — Concern-severity recs
      no longer reach the desktop backend even when the Notify effect was
      requested by the engine due to a co-existing Warning rec. Regression
