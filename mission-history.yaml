  - change_id: "v1.15.3-claude-status-capture-escape"
    semantic_version: "1.15.3"
    change_sequence: 59
    date: "2026-04-25"
    author: "Codex (codex:review, GPT-5)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) ‚Äî production finding: Claude `/status` remains fullscreen and blocks the next command"
    change_type: "patch"
    motivation_type: "operator-usage-finding"
    persistence: "permanent"
    intent: >
      Preserve Claude `/status` runtime-fact parsing without leaving the
      Claude fullscreen status surface open. The operator needs Qmonster
      to capture the status output and then send Escape so the pane can
      accept the next slash command immediately.
    decision: >
      After any Claude `/status` runtime-refresh send, Qmonster captures
      the selected pane tail, stores it in an in-memory one-shot parser
      overlay keyed by pane id, then sends `Escape`. The next poll merges
      that captured tail into the parser input once and consumes it, so
      runtime facts can be parsed even though the fullscreen surface has
      already been closed. Raw captured output remains in memory only and
      is not written to audit events.
    triggered_by: "Operator request on 2026-04-25: Claude `/status` keeps the screen open; capture output and send Escape after execution."
    issue_or_context: >
      v1.15.1 fixed batched command delivery by cycling Claude fullscreen
      surfaces one command per `u`, but `/status` still remained on
      screen after the send. That made the next runtime-refresh command
      depend on a later pre-send Escape and could leave the operator in a
      blocked fullscreen UI between refreshes.
    changes:
      added:
        - "src/app/bootstrap.rs::runtime_refresh_tail_overlays one-shot in-memory captured-tail store"
        - "src/app/event_loop.rs::merge_runtime_refresh_tail parser overlay consumption"
        - "src/main.rs::send_runtime_refresh_commands helper that captures Claude `/status` then sends `Escape`"
        - "2 regression tests covering capture‚ÜíEscape send order and one-shot parser overlay consumption"
      modified:
        - "README.md + docs/ai/{ARCHITECTURE,PROJECT_BRIEF,UI_MANUAL,VALIDATION}.md (Claude status-capture contract and 434-test evidence)"
        - "mission.yaml + mission-history.yaml (v1.15.3 ledger sync)"
      removed: []
    changed_sections:
