      contract to `store/audit::kind_to_str` and the Gemini
      v1.10.2 TODO on `Display`/`AsRef<str>` for AuditEventKind
      are compatible future-watch items; both are deferred to a
      non-blocking cleanup round.
    decision_ko: >
