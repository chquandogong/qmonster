  - change_id: "v1.15.16-per-provider-cost-threshold-config"
    semantic_version: "1.15.16"
    change_sequence: 72
    date: "2026-04-27"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) — 'threshold 등 provider별 값 설정 메뉴 + 권장 default'"
    change_type: "feature"
    motivation_type: "operator-configurability"
    persistence: "permanent"
    intent: >
      Lift the v1.15.14 hardcoded `COST_PRESSURE_*_USD` constants into
      operator-configurable thresholds with optional per-provider
      overrides. Provider pricing tiers are not uniform (Claude Sonnet/Opus
      meaningfully more expensive per 1M tokens than gpt-5.4 or Gemini
      Pro), so a single pair of thresholds cannot serve every operator's
      budget bands.
    decision: >
      Add `[cost]` TOML section with top-level `warning_usd` /
      `critical_usd` plus optional `[cost.claude]` / `[cost.codex]` /
      `[cost.gemini]` per-provider overrides. PolicyGates gains
      `cost_warning_usd` / `cost_critical_usd` fields that
      `from_config_and_identity` resolves per-pane (provider override
      if set, else top-level default). Advisory rules read
      `gates.cost_warning_usd` / `gates.cost_critical_usd` instead of
      module-level constants. Recommended defaults track 2026-04-27
      pricing-tier expectations (operator can tune freely):
      default $5/$20 (Codex `gpt-5.4` baseline; matches the v1.15.14
      hardcoded values), Claude $10/$30 (higher tier), Gemini $3/$10
      (lower tier). Codex slot defaults to None so it falls through to
      the top-level pair without redundant config.
    triggered_by: "Operator instruction (2026-04-27): 'threshold 등 provider별 값 설정 메뉴를 추가 해주고, default 값을 추천해줘'."
    issue_or_context: >
      v1.15.14 introduced cost_pressure_warning ($5) and
      cost_pressure_critical ($20) as bake-in constants. The Slice 3
      housekeeping pattern explicitly anticipated config lift-out —
      the constants were placed as `COST_PRESSURE_*_USD` so a future
      `[cost]` section could replace them without touching the rule
      semantics. Operators with different pricing tiers (e.g. Claude
      Sonnet $3/M input + $15/M output → typical heavy session costs
      around $60) need higher bands or the warning fires every session.
    changes:
      added:
