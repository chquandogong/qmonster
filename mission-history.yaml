        - "Gemini idle titles like `◇  Ready (mission-spec)` resolve to Provider::Gemini / IdentityConfidence::Medium"
        - "Bare braille glyph or bare `◇` without `Ready (` stay Provider::Unknown (honesty)"
      modified: []
      removed: []
    impact_scope:
