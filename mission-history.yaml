      non-empty citation; ProviderProfile carries ProjectCanonical
      name with ProviderOfficial levers inside, empty side_effects).
      (2) src/policy/rules/profiles.rs (new):
      `eval_profiles(id, signals, gates) -> Vec<Recommendation>`
      mirrors eval_advisories' shape. `recommend_claude_default` is
