  - change_id: "v1.14.1-codex-cursor-fix"
    semantic_version: "1.14.1"
    change_sequence: 55
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Sonnet 4.6)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "remediation"
    motivation_type: "production-smoke-test-finding"
    persistence: "permanent"
    intent: >
      Fix codex_idle_cursor unreachable-on-real-tails bug analogous to v1.14.0 T15 Gemini fix.
      Bottom-status-line was always last; cursor scan must skip it.
    decision: >
      Skip the bottom-status-line (anchored on `Context ` + ` ┬╖ ` + `% used`) when scanning
      from end, then check the first substantive line above for `έΑ║ ` cursor. New
      is_codex_bottom_status_line helper uses the same structural anchor as
      parse_codex_status_line. Degrades gracefully if Codex changes the anchor
      (non-matching line is not skipped; falls back to existing last-line behavior).
    triggered_by: "v1.14.0 production smoke test 2026-04-25 έΑΦ Codex pane showed Stale fallback instead of WorkComplete, indicating cursor detector unreachable"
    issue_or_context: >
      v1.14.0 smoke test against running Codex pane (qmonster:0.1) showed
      `έΠ╕ IDLE (?) ┬╖ 10s` (Stale fallback) instead of `έΠ╣ IDLE (done)`.
      Root cause: codex_idle_cursor checked `last non-empty line starts with "έΑ║ "`,
      but real Codex tails always render the bottom-status-line BELOW the cursor,
      so the cursor is never the actual last non-empty line in production.
      Unlike Gemini's "Type your message" placeholder (unique to idle), Codex's `έΑ║`
      glyph also appears in scrollback (previous user messages), so blanket
      "scan all lines" would over-fire. The structural bottom-status-line skip
      is the safe approach.
    changes:
      modified:
        - "src/adapters/codex.rs (codex_idle_cursor + is_codex_bottom_status_line)"
        - "tests/fixtures/real/codex_idle_cursor.txt"
