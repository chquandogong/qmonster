      the hardcoded `0.75..0.85` literals. Recommended defaults are
      uniform 0.75/0.85 across all providers because the workflow
      remediation (/compact + checkpoint snapshot, or quota pacing) is
      identical regardless of which CLI emitted the metric вҖ” the
