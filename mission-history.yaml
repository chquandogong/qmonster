    change_type: "feature"
    motivation_type: "operator-configurability"
    persistence: "permanent"
    intent: >
      Apply the v1.15.16 per-provider-config pattern to the remaining
      hardcoded advisory thresholds. context_pressure and quota_pressure
      were still keyed on `0.75..0.85` literals embedded in the rule
      body; the operator's instruction was to lift them out the same
      way CostConfig was, so that any future provider-specific tuning
      can land in TOML rather than code.
    decision: >
      Add `[context]` and `[quota]` TOML sections with top-level
      `warning_pct` / `critical_pct` (fraction in 0..=1.0, not %) plus
      optional `[context.claude]` / `[context.codex]` / `[context.gemini]`
      and `[quota.claude]` / `[quota.codex]` / `[quota.gemini]`
      per-provider overrides. PolicyGates gains four new f32 fields
      (`context_warning_pct`, `context_critical_pct`, `quota_warning_pct`,
      `quota_critical_pct`) that `from_config_and_identity` resolves
      per-pane (provider override if set, else top-level default). The
      four advisory rules вАФ `context_pressure_warning`,
      `context_pressure_critical`, `quota_pressure_warning`,
      `quota_pressure_critical` вАФ read directly from gates instead of
      the hardcoded `0.75..0.85` literals. Recommended defaults are
      uniform 0.75/0.85 across all providers because the workflow
      remediation (/compact + checkpoint snapshot, or quota pacing) is
      identical regardless of which CLI emitted the metric вАФ the
      override slots exist so a provider whose pressure sensor is
      consistently noisy can be calibrated without code change. Today
      only Gemini's v0.39 status table populates `quota_pressure`, so
      Claude/Codex `[quota.<provider>]` slots are commented-out scaffolding
      until a future provider exposes a quota fraction. ContextConfig
      and QuotaConfig share `PressureProviderConfig` because the units
      are identical (f32 fraction); CostConfig keeps its own
      CostProviderConfig because USD thresholds are f64.
