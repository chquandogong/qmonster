    motivation_type: "implementation"
    persistence: "permanent"
    intent: >
      Phase 3B closes the two Gemini Round-2 deferrals (G-2 and G-7).
      G-2: populate suggested_command on advisory rules where a real,
      copy-pasteable CLI snippet exists. G-7: add Recommendation.is_strong
      flag and render strong recommendations in a dedicated alert-queue
      slot with ">> CHECKPOINT:" prefix, positioned between SystemNotices
      and CrossPaneFindings.
    intent_ko: >
      Phase 3B는 Gemini의 Round-2 유예 항목 두 건(G-2, G-7)을 완료한다.
      G-2: 실제 복사-붙여넣기 가능한 CLI 스니펫이 존재하는 advisory 규칙에
      suggested_command를 채운다. G-7: Recommendation.is_strong 필드를
      추가하고, strong recommendation을 SystemNotice와 CrossPaneFinding
      사이에 전용 슬롯에서 ">> CHECKPOINT:" 접두사로 렌더링한다.
    decision: >
      Option B selected for G-2 (provider-CLI commands, no new Qmonster
      subcommand debt): log_storm_advisory gets the tmux capture-pane
      archiving snippet, context_pressure_warning and
      context_pressure_critical get "/compact", quota_tight_nudge gets a
      config-edit comment-form hint; rules without a genuinely actionable
      command stay None (honest signal). Option B selected for G-7
      (dedicated slot): Recommendation gains is_strong: bool (default
      false); context_pressure_warning and context_pressure_critical are
      marked is_strong = true (aggressive variants stay false); collect_items
      in ui/alerts.rs rewritten to 4-section order: SystemNotice → strong
      recs (CHECKPOINT slot) → CrossPaneFindings → per-pane normal recs;
      main.rs --once prints the strong slot before the per-pane loop and
      excludes strong recs from the per-pane pass (no double-print).
    decision_ko: >
      G-2에는 Option B(provider-CLI 명령, 새 Qmonster 서브커맨드 채무 없음)를
      선택: log_storm_advisory에 tmux capture-pane 아카이빙 스니펫,
