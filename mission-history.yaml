      `help_continuation_prefix_hangs_bullet_under_value_column`Ïù¥
      `HELP_DETAIL_INDENT + HELP_LABEL_WIDTH + ": "`ÏóêÏÑú Í∏∞ÎåÄ
      column offsetÏùÑ Í≥ÑÏÇ∞Ìï¥ (a) prefixÍ∞Ä ÏÝïÌôïÌûà Í∑∏ Í∏∏Ïù¥ÎßåÌÅºÏùò
      charsÎ•º ÏÜåÎπÑ, (b) `¬∑`Í∞Ä col 20Ïùò bullet positionÏóê ÏúÑÏπòÌï®ÏùÑ
      Í≤ÄÏ¶ù. Ìñ•ÌõÑ ÏÉÅÏàò Î≥ÄÍ≤ΩÏù¥ ÏÝïÎÝ¨ÏùÑ Íπ®Ìä∏Î¶¨Î©¥ Ïó¨Í∏∞ÏÑú Î®ºÏÝÄ fail.
      ÎÇ¥Ïö©ÏùÄ Î∂àÎ≥Ä ‚Äî 3Í∞ú audit-chain bullet(Execute / AutoSendOff /
      observe_only) + `p` summary Î™®Îëê ÏúÝÏßÄ.
