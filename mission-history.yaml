  - change_id: "ux-polish-help-indent-and-footer-git-version"
    semantic_version: "1.10.6"
    change_sequence: 41
    date: "2026-04-23"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator έΑΦ requested two specific polishes: help overlay indentation + footer version badge from git instead of CARGO_PKG_VERSION)"
    change_type: "ux-polish"
    motivation_type: "operator-driven"
    persistence: "permanent"
    intent: >
      Two small operator-requested UX polishes on the TUI help
      overlay and footer version badge. No runtime, audit, gate,
      or actuation surface change.
    intent_ko: >
      Ήγ┤ΉαΒΉηΡΆ░Α ΉγΦΉ▓φΊΧε ΈΣΡ Ά░ΑΉπΑ TUI UX Ά░εΉΕι: help overlay ΈΥνΉΩυΉΥ░Ά╕░ΉβΑ
      footer Έ▓ΕΉιΕ Έ░░ΉπΑΈξ╝ git Ά╕░Έ░αΉε╝Έκε ΉιΕΊβα. Έθ░ΊΔΑΉηΕ ┬╖ audit ┬╖ gate ┬╖
      actuation ΊΣεΈσ┤ Έ│ΑΆ▓╜ ΉΩΗΉζΝ.
    decision: >
      (1) Help overlay indentation: a new HELP_DETAIL_INDENT
      constant (2 spaces) is prepended inside
      `ui::dashboard::help_detail_line` so every detail row nests
      visibly under its section header (`Controls` / `Source
      Labels` / `State Labels`). Section headers stay flush left
      by construction. Two tests updated/added:
      `help_detail_line_aligns_label_and_description` now asserts
      the indent is present; new
      `help_detail_line_indent_is_stable_across_rows` locks the
      indent across a sample of rows.
      (2) Footer version badge from git: new `build.rs` at the
      crate root captures `git describe --tags --always --dirty`
      at compile time and embeds it via
      `cargo:rustc-env=QMONSTER_GIT_VERSION=έΑο`, with
      `cargo:rerun-if-changed=.git/HEAD` plus the currently
      checked-out ref's file watched so the label refreshes when
      HEAD moves. `ui::dashboard::version_badge_label` reads
      `env!("QMONSTER_GIT_VERSION")` instead of
      `env!("CARGO_PKG_VERSION")`. Fallback for git-less builds
      (tarball, offline): `v{CARGO_PKG_VERSION}-nogit`. New test
      `version_badge_label_comes_from_build_embedded_git_version`
      locks the linkage.
    decision_ko: >
      (1) Help overlay ΈΥνΉΩυΉΥ░Ά╕░: `ui::dashboard::help_detail_line`
      ΈΓ┤Έ╢ΑΉΩΡ 2-space `HELP_DETAIL_INDENT` ΉΔΒΉΙαΈξ╝ prepend, ΈςρΈΥι
      detail ΊΨΚΉζ┤ ΉΕ╣ΉΖα ΊΩνΈΞΦ(`Controls` / `Source Labels` / `State
      Labels`) ΉΧΕΈηαΈκε ΉΜεΆ░ΒΉιΒΉε╝Έκε ΉνΣΉ▓σΈΡρ. ΉΕ╣ΉΖα ΊΩνΈΞΦΈΛΦ Ά╕░Έ│╕ΉιΒΉε╝Έκε
      flush left ΉειΉπΑ. ΊΖΝΉΛνΊΛ╕ 2Ά▒┤ Ή╢ΦΆ░Α/ΉΩΖΈΞ░Ήζ┤ΊΛ╕.
      (2) Footer Έ▓ΕΉιΕ Έ░░ΉπΑ: ΊΒυΈιΙΉζ┤ΊΛ╕ ΈμρΊΛ╕ΉΩΡ ΉΔΙ `build.rs`Έξ╝ ΈΣΡΉΨ┤
      `git describe --tags --always --dirty` Ά▓░Ά│╝Έξ╝ Ή╗┤ΊΝΝΉζ╝ ΉΜεΉιΡΉΩΡ
      `QMONSTER_GIT_VERSION` ΊβαΆ▓╜Έ│ΑΉΙαΈκε embed; `.git/HEAD` +
      ΊαΕΉηυ ref ΊΝΝΉζ╝ΉζΕ `rerun-if-changed`Έκε Ά░ΡΉΜεΊΧ┤ HEAD Ήζ┤ΈΠβ ΉΜε
      ΉηυΈ╣ΝΈΥε. `ui::dashboard::version_badge_label`Ήζ┤
      `env!("QMONSTER_GIT_VERSION")`ΈκεΈ╢ΑΊΕ░ Ά░ΤΉζΕ Ήζ╜ΉζΝ(Ά╕░Ήκ┤
