  - change_id: "qmonster-v1.15.18-settings-overlay"
    semantic_version: "1.15.18"
    change_sequence: 74
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) — '방금 업데이트 된 threshold 값 등 설정은 창을 띄워 default값을 수정, 변경할 수 있도록 해줘'"
    change_type: "feature"
    motivation_type: "operator-configurability"
    persistence: "permanent"
    intent: >
      The v1.15.16 / v1.15.17 lift-out work made cost / context / quota
      advisory thresholds operator-configurable, but the only edit
      surface was hand-editing `config/qmonster.toml` outside the TUI
      and restarting. The operator's instruction was to put a window
      inside the dashboard so the same defaults can be modified live,
      removing the round-trip through an external editor.
    decision: >
      Add a keyboard-driven settings overlay (`S` key from the main
      dashboard) that renders a centered modal listing the 24 numeric
      threshold fields (3 sections × 4 scopes × 2 bounds = cost /
      context / quota × default + claude + codex + gemini × warning +
      critical). State machine lives in a new `src/ui/settings.rs`
      module; rendering is driven from the same module so the dashboard
      only carries the focus-gate + the render-modal call. Edits apply
      to the in-memory `QmonsterConfig` immediately so the next policy
      pass sees them, with per-field validation on commit (cost ≥ 0;
      pct ∈ [0.0, 1.0]; warning < critical on the same row). `w`
      writes the full config back to the loaded TOML path via
      `toml::to_string_pretty` after a second-pass full-config validate.
      `c` clears a per-provider override (revert to section default).
      `Esc` cancels an in-flight edit; `Esc` again or `q` closes the
      overlay. The overlay is keyboard-only and swallows mouse events
      so a stray click underneath does not race with the modal. Save
      requires `--config PATH` to be set at startup; without one the
      status banner explains the precondition instead of silently
      failing. Saving via `to_string_pretty` is comment-lossy on the
      operator's source TOML — accepted tradeoff for this round; a
      future round can switch to `toml_edit` for format-preserving
      writes if operators ask.
    triggered_by: "Operator instruction (2026-04-25): '방금 업데이트 된 threshold 값 등 설정은 창을 띄워 default값을 수정, 변경할 수 있도록 해줘'."
    issue_or_context: >
      Operator-configurability is only useful if the surface is reachable
      from where the operator already is. After v1.15.17 the threshold
      defaults were configurable but practically frozen at the boot-time
      `--config PATH` parse — operators had to leave the dashboard,
      hand-edit TOML, and restart the binary just to retune a single
      value. The v1.15.18 overlay closes that loop.
    changes:
      added:
        - "src/ui/settings.rs (new module): Section / Scope / Bound enums + FieldId + SettingsOverlay state machine + render_settings_modal + 23 mutation-verified state-machine tests."
        - "src/app/bootstrap.rs::Context.config_path field + with_config_path builder so the runtime knows where to write back."
        - "src/main.rs: settings_overlay state, focus-gate update, render hook (modal + status banner + hint line), keyboard dispatch (Esc/q/↑↓←→/e/Enter/c/w/Backspace/digit input), `S` opens the overlay from the main dashboard, mouse-event swallow when overlay is open."
        - "src/ui/dashboard.rs: footer text gains `S settings` between `d dismiss` and `? help` (placement assertion in footer test); help overlay gains a new `S` row with the overlay description."
      modified:
        - "src/main.rs: Context::new + with_config_path threading at startup (uses cli.config when present)."
        - "src/ui/mod.rs: re-exports the new settings module."
      removed: []
    changed_sections:
      - "src/ui/settings.rs (state machine + render)"
      - "src/main.rs (event loop + render hook + key dispatch)"
      - "src/app/bootstrap.rs (config_path threading)"
      - "src/ui/dashboard.rs (footer + help overlay rows)"
    done_when_delta:
      added:
        - "Operator can press `S` from the dashboard to open a modal listing the live values of all 24 threshold fields"
        - "Operator can navigate with arrow keys, press `e` or Enter to edit a field, type a number, press Enter to commit, Esc to cancel"
        - "Operator can press `c` on a per-provider row to clear the override (revert to section default)"
        - "Operator can press `w` to write the in-memory config back to the loaded TOML path; status banner reports success or surfaces a validation / IO error"
        - "Footer + help overlay advertise the `S settings` key alongside the existing single-letter keys"
      modified: []
      removed: []
    impact_scope:
      code: "+~700 LoC (settings.rs ~480 with tests + ~70 in main.rs key dispatch + ~30 in dashboard footer/help + ~20 in bootstrap)"
      tests: "499 total — 425 lib + 14 main + 36 event_loop + 18 false_positive + 6 idle_state + 0 sim (was 476 at v1.15.17; +23 = the new settings state-machine suite)"
      ledger: "1 new timeline entry (sequence 74); meta bump"
      review_gate: "operator-configurability feature; confirm-archive remains closed; local fmt/test/clippy pass; mission-spec validation blocked locally because the binary is not installed."
      follow_up_carryover: "Save path uses `toml::to_string_pretty` which strips comments from the operator's source config on write. If operators report comment loss as friction, swap to `toml_edit` for format-preserving writes. Overlay does not currently expose non-threshold settings ([actions], [refresh], etc.) — adding those is mechanical work in the same state-machine pattern when an operator asks."
    breaking: false
