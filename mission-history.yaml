      windowΈξ╝ Ά░ΑΈκεΉπΑΈξ┤ΈΛΦ ΉηΣΉΩΖ Έ╢ΕΊΧιΉζΕ Ήζ╕ΉπΑΊΧαΈΠΕΈκζ ΊΧεΈΜν.
    decision: >
      Add `CrossPaneKind::CrossWindowConcurrentWork`, extend
      `PaneView` with a borrowed `window_label`, gate the new
      classification behind `[security] cross_window_findings = false`
      (default) + the existing path/branch + busy-pane filters, and
      surface the finding with a distinct `Cross-Window ┬╖ <anchor>`
      title in the alert queue. Same-window panes still emit the
      existing `ConcurrentMutatingWork` Warning. Cross-window panes
      emit `CrossWindowConcurrentWork` at `Severity::Concern`
      (informational; below the desktop-notify gate) so operators who
      legitimately keep the same repo open across windows are not
      bombarded.
    decision_ko: >
      `CrossPaneKind::CrossWindowConcurrentWork` Ή╢ΦΆ░Α, `PaneView`ΉΩΡ
      borrowed `window_label` ΊΧΕΈΥε Ή╢ΦΆ░Α, `[security]
      cross_window_findings = false` (default) gateΈξ╝ ΊΗ╡ΊΧε opt-in
      ΊβεΉΕ▒ΊβΦ, Ά╕░Ήκ┤ path/branch + busy-pane ΊΧΕΊΕ░ ΉειΉπΑ, alert queueΉΩΡΉΕε
      `Cross-Window ┬╖ <anchor>` titleΈκε Ά╡υΈ╢Ε ΊΣεΉΜε. Ά░βΉζΑ window ΈΓ┤
      panesΈΛΦ Ά╕░Ήκ┤ `ConcurrentMutatingWork` WarningΉζΕ Ά╖╕ΈΝΑΈκε Έ░εΊβΦΊΧαΆ│ι,
      cross-window panesΈΛΦ `Severity::Concern` (desktop notify gate
      Έψ╕Ή╢σΉκ▒)Ήε╝Έκε Έ░εΊβΦΊΧαΉΩυ ΉιΧΉΔΒΉιΒΉζ╕ ΈΠβΉζ╝ repo ΈΜνΉνΣ window ΉΓυΉγσ ΊΝρΊΕ┤ΉζΕ
