  - change_id: "phase-5-p5-3-tmux-send-keys-executor"
    semantic_version: "1.10.0"
    change_sequence: 35
    date: "2026-04-22"
    author: "Claude Code (claude:1:main, Sonnet 4.6)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "feature"
    motivation_type: "implementation"
    persistence: "permanent"
    intent: >
      Close Phase 5 P5-3 by landing the tmux send-keys executor behind
      a second gate (operator confirmation + allow_auto_prompt_send),
      adding three terminal-outcome audit kinds (Completed / Failed /
      Blocked), and introducing a stable proposal_id key for
      deterministic multi-proposal disambiguation. Two P5-3 design
      divergences were pre-resolved: DEFER structured slash_command
      field in AuditEvent (Codex position вАФ keep prose summary; schema
      cost not yet justified); ADOPT PromptSendBlocked for ObserveOnly
      accept-block (Gemini position вАФ distinguish operator intent from
      system restriction in forensics).
    intent_ko: >
      Phase 5 P5-3: tmux send-keys мЛ§нЦЙкЄ∞л•Љ лСР л≤ИмІЄ к≤МмЭінКЄ(мЪімШБмЮР нЩХмЭЄ
      + allow_auto_prompt_send) лТ§мЧР л∞∞мєШнХШк≥†, мДЄ к∞АмІА мҐЕлЛ® к≤∞к≥Љ
      audit мҐЕл•Ш(Completed / Failed / Blocked)л•Љ мґФк∞АнХШл©∞,
      лЛ§м§С proposal л™ЕнЩХнХЬ мД†нГЭмЭД мЬДнХЬ мХИм†Хм†БмЭЄ proposal_id нВ§л•Љ
      лПДмЮЕ. P5-3 мД§к≥Д мЭШк≤ђ м∞®мЭі лСР к±і мВђм†Д нХімЖМ: кµђм°∞нЩФ slash_command
      нХДлУЬ DEFER(Codex мЮЕмЮ• вАФ prose summary мЬ†мІА; мК§нВ§лІИ лєДмЪ© лѓЄм†ХлЛєнЩФ),
      PromptSendBlocked ADOPT(Gemini мЮЕмЮ• вАФ ObserveOnly м∞®лЛ® мЛЬлПДмЩА
      мЛЬмК§нЕЬ м†ЬнХЬмЭД forensicsмЧРмДЬ кµђлґД).
    decision: >
      (1) `PromptSendGate` enum (Blocked / AutoSendOff / Execute) +
      pure function `check_send_gate(mode, allow_auto_prompt_send)` in
      `src/main.rs`. Completely separate from `EffectRunner::permit`
      (display-layer filter only). (2) Full `p`/`d` handler rewrite:
      `Blocked` вЖТ emit `PromptSendBlocked` audit at Warning + Warning
      SystemNotice; `AutoSendOff` вЖТ emit `PromptSendAccepted` + notice
      (no tmux); `Execute` вЖТ emit `PromptSendAccepted`, call
      `ctx.source.send_keys(&target, &cmd)`, emit `PromptSendCompleted`
      on success or `PromptSendFailed` on error; `d` вЖТ emit
      `PromptSendRejected`. Proposal lookup sorts by `proposal_id` for
      deterministic selection. (3) Three new `AuditEventKind` variants
      вАФ `PromptSendCompleted`, `PromptSendFailed`, `PromptSendBlocked`
      вАФ wired into `kind_to_str` + `parse_kind` in `src/store/audit.rs`
      (SQLite round-trip safe). (4) `proposal_id: String` added to
      `RequestedEffect::PromptSendProposed`; format:
      `"{target_pane_id}:{slash_command}"`; engine producer sets it;
      all call sites updated. (5) `PaneSource::send_keys` added to
      trait + implemented on `PollingSource` (`tmux send-keys -t {id}
      {text} Enter`) and `FixtureSource` (no-op Ok(())).
    decision_ko: >
      (1) `PromptSendGate` мЧік±∞нШХ(Blocked / AutoSendOff / Execute) +
