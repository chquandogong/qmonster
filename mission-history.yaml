      Ship Phase 2 per final-r2.md §6.4: durable audit sink (SQLite)
      with type-level raw exclusion, raw tail archive with preview/full
      split, operator-triggered checkpoint snapshots to ~/.qmonster/
      snapshots/, retention sweep, and persistent cross-session version
      drift detection.
    intent_ko: >
      final-r2.md §6.4에 따라 Phase 2 출시: type-level raw 배제를 지닌
