  - change_id: "v1.15.7-s3-5-identity-title-fallback"
    semantic_version: "1.15.7"
    change_sequence: 63
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
