      Î≥µÍµ¨ÌïúÎã§.
    decision: >
      Detect transport-level control-mode failures (`%exit`, control-mode EOF,
      and broken pipe), reconnect the control-mode client once, and retry the
      same command. Ordinary command-level tmux failures such as bad targets are
      returned unchanged.
    decision_ko: >
      `%exit`, control-mode EOF, broken pipe Í∞ôÏùÄ transport-level failureÎ•º
      Í∞êÏßÄÌïòÎ©¥ control-mode clientÎ•º Ìïú Î≤à Ïû¨Ïó∞Í≤∞ÌïòÍ≥Ý Í∞ôÏùÄ commandÎ•º Ïû¨ÏãúÎèÑÌïúÎã§.
