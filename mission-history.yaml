  - change_id: "v1.15.7-s3-5-identity-title-fallback"
    semantic_version: "1.15.7"
    change_sequence: 63
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "feature"
    motivation_type: "backlog-resolution"
    persistence: "permanent"
    intent: >
      Close Slice 3 backlog item S3-5: identity resolver title
      fallback so Qmonster recognises real Claude Code working-state
      titles (`⠂ Analyze project ...`) and Gemini idle titles
      (`◇  Ready (project)`) even when the canonical
      `{provider}:{instance}:{role}` title is absent and the
      underlying `pane_current_command` is `node`.
    decision: >
      Extend `domain::identity::detect_provider_title` with two
      structurally-anchored fallback patterns. Claude: title leads
      with a Braille Pattern character (U+2800..=U+28FF) followed by
      ≥2 trailing whitespace-separated tokens (the activity
      description). Gemini: title contains both the diamond glyph
      `◇` and the literal `Ready (` opener. Both yield
      IdentityConfidence::Medium per the existing title-fallback
      tier. Codex's title-anchor question (real Codex titles like
      `Qmonster` carry no glyph and no provider word) stays deferred
      per the backlog; the existing `looks_like_codex_transcript`
      tail anchor still resolves Codex panes from their content.
    triggered_by: "Slice 3 backlog S3-5 (.docs/claude/Qmonster-v0.4.0-2026-04-25-claude-slice-3-backlog.md)."
    issue_or_context: >
      The previous resolver only matched substring `claude` /
      `codex` / `gemini` words. Real Claude Code working-state
      titles begin with a single braille spinner glyph followed by
      activity text; real Gemini idle titles use a diamond glyph and
      a `Ready (project-name)` form. Neither carries a provider word,
      so the resolver fell through to `pane_current_command`, found
      `node` (the executable running both Claude Code and Gemini
      under the hood), and returned Provider::Unknown.
    changes:
      added:
