      tests: "502 total έΑΦ 428 lib + 14 main + 36 event_loop + 18 false_positive + 6 idle_state + 0 sim (was 499 at v1.15.18; +3 = the new close-button hit-test tests)"
      ledger: "1 new timeline entry (sequence 75); meta bump"
