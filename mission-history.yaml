    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close both Codex v1.8.9 P4-7 review findings. Finding #1
      (risk): the aggressive Gemini bundle used `save_memory =
      disabled` as a config lever, but Gemini CLI docs describe
      save_memory as a TOOL invoked by the agent and Auto Memory
      as a separate configuration key `experimental.autoMemory`.
      The phantom lever would silently NOT disable Auto Memory
      when an operator applied the profile — the G-5 guarantee
      fails at the actual config surface. Finding #2 (warning):
      three prose locations in profiles.rs still described
      pre-P4-7 state (module doc-comment, gemini-default --yolo
      lever comment, and gemini-default suppression test
      comment). Fix both in one round; strengthen the positive-
      fire shape test so the corrected surface is locked.
    intent_ko: >
      Codex v1.8.9 P4-7 리뷰의 두 finding을 닫는다. #1 (risk):
      Gemini aggressive 번들이 config lever로 `save_memory =
      disabled`를 썼지만, Gemini CLI 문서는 save_memory를 agent
      가 호출하는 TOOL로 기술하고 Auto Memory는 별도 config key
      `experimental.autoMemory`로 분리. 허수 lever는 operator가
      profile 적용 시 실제로 Auto Memory를 끄지 못해 G-5 보장이
      실제 config surface에서 깨진다. #2 (warning): profiles.rs의
      3개 prose 위치(모듈 doc-comment, gemini-default --yolo
      lever 주석, gemini-default 억제 테스트 주석)에 pre-P4-7
      상태 잔존. 한 라운드에 둘 다 고치고, positive-fire shape
      테스트를 강화해 교정된 surface를 고정.
    decision: >
      (1) src/policy/rules/profiles.rs gemini_script_low_token_
      profile: lever key/value 교체 — `save_memory = disabled`
      → `experimental.autoMemory = false`. Gemini CLI 공식 문서
      (auto memory config) 기준으로 키와 disable 값 모두 문서화
      된 사실이므로 source_kind를 `ProviderOfficial`로 승격.
      citation 재작성 — 정확한 config 경로와 "distinct from the
      save_memory tool" 명시. side_effect 문자열도 `save_memory
      = disabled ...` → `experimental.autoMemory = false disables
      the Gemini Auto Memory feature ...`로 갱신. G-5 cross-
      reference (CURRENT_STATE.md + MDR) 유지.
      (2) 모듈 doc-comment (line 8) 재작성: "P4-5 (aggressive
      Codex variant)" 같은 pending 서술을 제거하고 3x2 grid
      완성 상태, cross-provider mutual exclusion 불변식, G-5/G-6
      cross-reference 패턴을 명시.
      (3) gemini-default `--yolo = unset` lever 주석: "(P4-7,
      tbd)" 제거, aggressive variant가 shipped 상태임을 명시.
      (4) gemini-default 억제 테스트 주석: aggressive variant를
      "will own the quota_tight path"가 아닌 "shipped, owns the
      quota_tight path"로 교체.
      (5) positive-fire shape 테스트 강화 — `po_count == 0 &&
      pc_count == 3` 블록을 `po_count == 1 && pc_count == 2`
      로 교체; `experimental.autoMemory`에 대한 per-lever
      assertion 추가 (값 `false` + source_kind `ProviderOfficial`);
      reason-summary assertion에 `ProviderOfficial` AND
      `ProjectCanonical` 둘 다 포함 여부 체크 (codex-default
      v1.8.6 패턴과 동일).
    decision_ko: >
      이 라운드는 Gemini aggressive profile의 실제 config surface
      를 정직화하고 3x2 grid 완성에 맞춰 주석/문구를 동기화.
      코드 한 lever + 3개 prose spot + 1개 강화된 테스트 =
      총 ~60 LOC 변경. 실행 정책/동작 변경 없음.
    triggered_by: >
      Codex v1.8.9 P4-7 review (.docs/codex/...phase4-p4-7-review.md
      + .mission/evals/...phase4-p4-7-review.result.yaml) —
      1 risk (save_memory surface mismatch vs Gemini CLI docs)
      + 1 warning (three stale-prose locations in profiles.rs
      describing pre-P4-7 state). Codex cross-checked against
      geminicli.com/docs/reference/configuration/, tools,
      auto memory, and model docs.
    issue_or_context: >
      v1.8.9 shipped `save_memory = disabled` in the aggressive
      Gemini bundle on the assumption (informed by the Claude /
      Codex aggressive variants' cross-provider pattern of
      explicit auto-memory disabling) that `save_memory` was a
      config key. Gemini CLI's actual documented surface shows
      save_memory is a TOOL and the Auto Memory feature is toggled
      by a distinct config key. Shipping the phantom key would
      leave the G-5 promise functionally broken at apply-time —
      the operator would apply the profile expecting Auto Memory
      off and get the default behavior. Fixing the surface brings
      the lever into alignment with Gemini docs, and the authority
      label graduates to ProviderOfficial because the documented
      key + documented value meets the PO bar. The three stale-
      prose spots are cosmetic but land in operator-facing doc-
      comments + test-layer comments, so closing them together
      with the risk fix keeps the file coherent.
