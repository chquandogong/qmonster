  - change_id: "phase-5-p5-1-opening-safer-actuation-scaffolding"
    semantic_version: "1.9.0"
    change_sequence: 31
    date: "2026-04-22"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator вҖ” approved scaffolding-first approach over a larger end-to-end P5-1 in the same slice)"
    change_type: "feature"
    motivation_type: "phase-opening"
    persistence: "permanent"
    intent: >
      Open Phase 5 (Safer Actuation) with a type-layer-only TDD
      scaffolding slice. Mirrors Phase-4 P4-1's v1.8.0 opening pattern:
      land the domain types + allow-list plumbing first, then grow the
      actual user-facing actuation and the first producing rule in
      later slices (P5-2+). This keeps the first Phase-5 commit
      auditable and reversible while establishing the data-shape
      contract reviewers can validate.
    intent_ko: >
      Phase 5 (Safer Actuation)лҘј type-layer м „мҡ© TDD мҠӨмәҗнҸҙл”© мҠ¬лқјмқҙмҠӨлЎң
      open. Phase-4 P4-1 v1.8.0 к°ңл°© нҢЁн„ҙмқ„ л”°лҘёлӢӨ: лҸ„л©”мқё нғҖмһ… + allow-
      list л°°м„ мқ„ лЁјм Җ лӮҙл Ө лҶ“кі , мӢӨм ң UI л°ңлҸҷ кІҪлЎңмҷҖ мІ« producing ruleмқҖ
      мқҙнӣ„ мҠ¬лқјмқҙмҠӨ(P5-2+)лЎң л¶„лҰ¬. мІ« Phase-5 м»Өл°Ӣмқ„ к°җмӮ¬н•ҳкё° мүҪкі 
      лҗҳлҸҢлҰ¬кё° мүҪкІҢ мң м§Җн•ҳл©ҙм„ң лҰ¬л·°м–ҙк°Җ кІҖмҰқн•  лҚ°мқҙн„°-лӘЁм–‘ кі„м•Ҫмқ„ лЁјм Җ
      мһ к·јлӢӨ.
    decision: >
      Land four things and NOTHING else in this slice: (1) new
      `RequestedEffect::PromptSendProposed { target_pane_id: String,
      slash_command: String }` variant, which forced the enum to
      drop its derived `Copy + PartialOrd + Ord + Hash` вҖ” the
      payload cannot cheaply participate in a total order. Authority
      ordering is now exposed via `RequestedEffect::authority_tier()
      -> u8` (Notify=0, ArchiveLocal=1, PromptSendProposed=2,
      SensitiveNotImplemented=3). (2) three new `AuditEventKind`s вҖ”
      `PromptSendProposed`, `PromptSendAccepted`, `PromptSendRejected`
      вҖ” wired through `src/store/audit.rs::kind_to_str` and
      `parse_kind` so SQLite round-trip cannot regress later even
      though `Accepted` / `Rejected` have no producing code path yet.
      (3) `EffectRunner::permit` signature change from
      `fn permit(&self, effect: RequestedEffect) -> bool` to
      `fn permit(&self, effect: &RequestedEffect) -> bool` (owned-
      to-borrowed, necessary for the payload-bearing variant).
      Behavior: `observe_only` blocks every variant including the
      proposal; `recommend_only` lets the proposal pass (display-
      layer effect, not actuation) regardless of
      `allow_auto_prompt_send` вҖ” that flag continues to gate the
      *real* tmux send-keys call that P5-2+ layers on top. (4)
      `app/event_loop.rs::deliver_effects` gains a
      `RequestedEffect::PromptSendProposed { .. } => continue` arm
      so the proposal surfaces via `PaneReport.effects` without any
      runtime side-effect firing in P5-1. No new rule emits the
      proposal yet; no TUI accept/reject UX; no `tmux send-keys`
      call. VALIDATION Phase-5 checkboxes stay unticked because
      they cover end-to-end behavior that requires P5-2+ surface
      work before they can be honestly ticked.
    decision_ko: >
      мқҙ мҠ¬лқјмқҙмҠӨм—җ м •нҷ•нһҲ л„Ө к°Җм§Җл§Ң нҸ¬н•Ё (к·ё мҷём—җлҠ” м•„л¬ҙкІғлҸ„ н•ҳм§Җ м•ҠмқҢ):
      (1) `RequestedEffect::PromptSendProposed { target_pane_id: String,
      slash_command: String }` мӢ к·ң variant. нҺҳмқҙлЎңл“ңк°Җ total orderм—җ
      м°ём—¬н•  мҲҳ м—ҶмңјлҜҖлЎң enumм—җм„ң нҢҢмғқ `Copy + PartialOrd + Ord + Hash`лҘј
      м ңкұ°; allow-list мҡ°м„ мҲңмң„лҠ” `RequestedEffect::authority_tier() ->
      u8` (Notify=0, ArchiveLocal=1, PromptSendProposed=2,
      SensitiveNotImplemented=3)лЎң л¶„лҰ¬. (2) 3к°ң мӢ к·ң `AuditEventKind`
      (`PromptSendProposed` / `PromptSendAccepted` / `PromptSendRejected`);
      `Accepted` / `Rejected`лҠ” P5-1м—җ producing кІҪлЎң м—Ҷм§Җл§Ң SQLite
      round-trip лҢҖм№ӯмқ„ м§ҖкёҲ мһ к·ёкё° мң„н•ҙ `kind_to_str` /
      `parse_kind`м—җ м–‘мӘҪ л“ұлЎқ. (3) `EffectRunner::permit`мқҳ мӢңк·ёлӢҲмІҳлҘј
      `permit(effect: RequestedEffect)` вҶ’ `permit(effect:
      &RequestedEffect)`лЎң (нҺҳмқҙлЎңл“ң variant л•Ңл¬ём—җ borrow н•„мҲҳ). лҸҷмһ‘:
      `observe_only`лҠ” proposal нҸ¬н•Ё лӘЁл‘җ м°ЁлӢЁ, `recommend_only`м—җм„ңлҠ”
      proposalмқҖ нҶөкіј (н‘ңмӢң-кі„мёө effectмқҙм§Җ actuation м•„лӢҳ); мқҙл•Ң
      `allow_auto_prompt_send` н”Ңлһҳк·ёлҠ” мқҙ кі„мёөмқ„ кІҢмқҙнҢ…н•ҳм§Җ м•Ҡкі ,
      P5-2+м—җм„ң м–№нһҲлҠ” мӢӨм ң `tmux send-keys` нҳём¶ңмқ„ кІҢмқҙнҢ…. (4)
      `app/event_loop.rs::deliver_effects`м—җ
      `RequestedEffect::PromptSendProposed { .. } => continue` arm
      м¶”к°Җ вҖ” proposalмқҖ `PaneReport.effects`лЎң UIм—җ л…ём¶ңлҗҳм§Җл§Ң P5-1м—җм„ң
      лҹ°нғҖмһ„ side-effectлҠ” л°ңмғқн•ҳм§Җ м•ҠмқҢ. м•„м§Ғ мқҙ proposalмқ„ emitн•ҳлҠ”
      rule м—ҶмқҢ; TUI accept/reject UX м—ҶмқҢ; `tmux send-keys` нҳём¶ң м—ҶмқҢ.
      VALIDATION Phase-5 мІҙнҒ¬л°•мҠӨлҠ” P5-2+ н‘ңл©ҙ мһ‘м—… м „к№Ңм§Җ м •м§Ғн•ҳкІҢ
      tickedлҗ  мҲҳ м—ҶмңјлҜҖлЎң л№„мӣҢ л‘ .
    triggered_by: "v1.8.14 follow-up: 'Open Phase 5 (Safer Actuation вҖ” manual prompt-send helper with user confirmation)'"
    issue_or_context: >
      Phase 4 closed fully gate-approved at v1.8.14 (Codex + Gemini
      both `approve` on v1.8.13 P4-8 wrap-up). VALIDATION.md Phase-5
      lists three checks: (a) manual prompt-send helper requires
      explicit user confirmation, (b) every actuation is audit-logged
      with approver/pane/command/outcome, (c) destructive actions
      remain outside automation. The existing code surface had only
      a `RequestedEffect::SensitiveNotImplemented` placeholder вҖ” no
      data types, no audit kinds, no allow-list routing for the
      actual prompt-send use case. Starting Phase 5 with a typed-
      scaffolding slice lets reviewers validate the contract before
      any `tmux send-keys` invocation exists in the tree.
    changes:
      added: []
      modified:
        - "src/domain/recommendation.rs"
        - "src/domain/audit.rs"
        - "src/store/audit.rs"
        - "src/app/effects.rs"
        - "src/app/event_loop.rs"
        - "mission.yaml"
        - "mission-history.yaml"
        - ".mission/CURRENT_STATE.md"
      removed: []
    changed_sections:
      - "domain::RequestedEffect вҖ” new PromptSendProposed payload variant; dropped derived Copy/PartialOrd/Ord/Hash; added authority_tier() method"
      - "domain::AuditEventKind вҖ” 3 new kinds (PromptSendProposed / Accepted / Rejected)"
      - "store::audit::{kind_to_str,parse_kind} вҖ” symmetric wiring for the 3 new kinds"
      - "app::EffectRunner::permit вҖ” signature change to &RequestedEffect + PromptSendProposed arm returning true in recommend_only"
      - "app::event_loop::deliver_effects вҖ” PromptSendProposed continue arm; UI surface via PaneReport.effects only"
    done_when_delta:
      added: []
      modified: []
      removed: []
    impact_scope:
      runtime: "type-layer only вҖ” no new rule emits PromptSendProposed yet; no tmux send-keys call; no TUI accept/reject UX. PaneReport.effects can now (in principle) carry a proposal but nothing produces one in this slice."
      verification: "cargo build + cargo test --all-targets (226 lib + 6 drift + 18 integration = 250 tests; +4 net vs. v1.8.14 baseline) + cargo clippy --all-targets -D warnings + cargo fmt --check all clean."
      docs: "mission.yaml narrative block + mission-history.yaml change_sequence 31 + evolution_summary.current_phase updated. VALIDATION.md Phase-5 checkboxes intentionally left unticked вҖ” they describe end-to-end behavior that P5-2+ surface work unlocks."
      ledger: "v1.9.0 layered on v1.8.14; v1.8.12 shared-verification contract + v1.8.13 P4-8 wrap-up + v1.8.14 confirm-archive all intact."
    breaking: false
