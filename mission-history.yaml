  - change_id: "phase-5-p5-2-first-producing-rule-and-tui-accept-reject-ux"
    semantic_version: "1.9.2"
    change_sequence: 33
    date: "2026-04-22"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator — approved the narrow P5-2 scope: first producer + confirmation UX only, no tmux send-keys)"
      - "Codex v1.9.0 confirm review — the scope-reduction guidance ('keep P5-2 equally narrow: one producer + confirmation UX before any executor path') directly shapes this slice"
      - "Gemini v1.9.0 confirm review — the UX TODO ('TUI accept button consults EffectRunner::permit; hide in ObserveOnly') is closed in this slice"
    change_type: "feature"
    motivation_type: "phase-progression"
    persistence: "permanent"
    intent: >
      Close the Phase-5 P5-2 slice: land the first producing rule
      that emits `RequestedEffect::PromptSendProposed` and the
      operator-facing accept/reject UX + audit emission, without
      introducing any `tmux send-keys` call. The executor path is
      deliberately held for P5-3 behind a separate gate per Codex
      v1.9.0 review TODO #1.
    intent_ko: >
      Phase-5 P5-2 슬라이스 마감: `RequestedEffect::PromptSendProposed`를
      emit 하는 첫 producer 룰과 operator-facing accept/reject UX +
      감사 이벤트 발행을 구현. `tmux send-keys` 호출은 Codex v1.9.0
      리뷰 TODO #1에 따라 별도 게이트 뒤 P5-3로 유보.
    decision: >
      (1) Engine producer in `policy::Engine::evaluate`: every
      `is_strong == true` rec whose `suggested_command` begins with
      `/` graduates to a `PromptSendProposed { target_pane_id,
      slash_command }` effect. Today that covers the two context-
      pressure strong recs (`context_pressure_warning` at ≥ 0.75
      pressure and `context_pressure_critical` at ≥ 0.85, both
      carrying `Some("/compact")`). The rule is pattern-based, not
      rec-list-based: any future strong rec with a slash command
      graduates automatically — no rule-by-rule wiring.
      (2) Shared UI helper `ui::alerts::format_prompt_send_proposal
      (target_pane_id, slash_command, accept_gated: bool)` used by
      both the interactive TUI and the `--once` headless path.
      `accept_gated == false` collapses the hint to `[d] dismiss
      only (send disabled)` closing Gemini v1.9.0 UX TODO.
      (3) `--once` (`main.rs::print_reports`) now prints pending
      proposals right after strong recs with a live
      `EffectRunner::new(config).permit(effect)` call supplying
      `accept_gated`; `print_reports` gains a `&QmonsterConfig`
      parameter.
      (4) TUI keybindings `p` / `d` added to the main-mode keypress
      handler: 'p' = record `AuditEventKind::PromptSendAccepted`
      (Warning severity) on the selected pane's first pending
      proposal, blocked with a Warning SystemNotice in
      `observe_only` per the permit gate; 'd' = record
      `PromptSendRejected` (Safe severity) and stays available in
      every mode. Both paths surface a confirmation SystemNotice;
      summary strings are structured metadata only ("<pane> <cmd>
      (acknowledged/dismissed by operator; P5-2 — no tmux
      send-keys)"), preserving the r2 audit-isolation rule.
      Selecting a pane without a pending proposal yields a Concern
      SystemNotice describing the no-op.
      Explicit non-goals for v1.9.2: no `tmux send-keys`, no
      second execution gate, no `PromptSendFailed` terminal
      outcome, no stable proposal key — all deferred to P5-3+ per
      the v1.9.1 follow-up list Codex design TODOs.
    decision_ko: >
      (1) `policy::Engine::evaluate`의 producer: `is_strong == true`이면서
      `suggested_command`이 `/`로 시작하는 모든 rec를
      `PromptSendProposed { target_pane_id, slash_command }` effect로
      승격. 현재는 두 개의 context-pressure strong rec
      (`context_pressure_warning` 0.75↑, `context_pressure_critical`
      0.85↑, 둘 다 `Some("/compact")`)에 해당. 패턴 기반이라 미래의
      strong rec + 슬래시 command는 별도 배선 없이 자동 승격.
      (2) 공유 UI 헬퍼 `ui::alerts::format_prompt_send_proposal(
      target_pane_id, slash_command, accept_gated)`. `accept_gated ==
      false`이면 hint가 `[d] dismiss only (send disabled)`로 축약 —
      Gemini v1.9.0 UX TODO 마감.
      (3) `--once`가 강-rec 다음에 pending proposal을 출력;
      `accept_gated`은 실시간 `EffectRunner::new(config)
      .permit(effect)` 결과 반영. `print_reports` 시그니처에
      `&QmonsterConfig` 추가.
      (4) TUI 키바인딩 `p` / `d` 추가: 'p' = 선택된 pane의 첫 pending
      proposal에 대해 `AuditEventKind::PromptSendAccepted` (Warning)
      기록; `observe_only` 모드에서는 permit 게이트 거부와 함께
      Warning SystemNotice로 차단됨. 'd' = `PromptSendRejected` (Safe)
      기록하며 모든 모드에서 가용. 양쪽 모두 확인 SystemNotice 표시;
      summary 문자열은 구조화 메타데이터만 유지 ("<pane> <cmd>
      (acknowledged/dismissed by operator; P5-2 — no tmux
      send-keys)") — r2 audit-isolation 규칙 준수. 선택 pane에
      pending proposal이 없으면 Concern SystemNotice로 no-op 설명.
      v1.9.2 명시적 비-목표: `tmux send-keys` 호출 없음, 두 번째
      execution gate 없음, `PromptSendFailed` terminal outcome 없음,
      stable proposal key 없음 — 모두 P5-3+로 유보 (v1.9.1 follow-up의
      Codex 설계 TODO 목록 참조).
