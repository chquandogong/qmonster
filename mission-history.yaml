      Close Slice 3 backlog item S3-5: identity resolver title
      fallback so Qmonster recognises real Claude Code working-state
      titles (`β†² Analyze project ...`) and Gemini idle titles
      (`β½΅  Ready (project)`) even when the canonical
      `{provider}:{instance}:{role}` title is absent and the
      underlying `pane_current_command` is `node`.
    decision: >
      Extend `domain::identity::detect_provider_title` with two
      structurally-anchored fallback patterns. Claude: title leads
      with a Braille Pattern character (U+2800..=U+28FF) followed by
      βâΞ2 trailing whitespace-separated tokens (the activity
      description). Gemini: title contains both the diamond glyph
      `β½΅` and the literal `Ready (` opener. Both yield
      IdentityConfidence::Medium per the existing title-fallback
      tier. Codex's title-anchor question (real Codex titles like
      `Qmonster` carry no glyph and no provider word) stays deferred
