    decision: >
      (1) src/policy/rules/profiles.rs: new
      `recommend_claude_script_low_token` rule gated on
      `gates.quota_tight == true` + Claude main + IdentityConfidence
      >= Medium + no active alerts + low context pressure. `eval_profiles`
      dispatcher calls it after `recommend_claude_default`. Mutual
      exclusion is inherent: `claude-default` has
      `if gates.quota_tight { return None; }` so only one of the
      two profiles ever fires per pane.
