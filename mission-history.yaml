        - "docs/ai/UI_MANUAL.md (`u`-key section rewrite to match cycling + active-safe split)"
        - "docs/ai/VALIDATION.md (test count 426 вЖТ 428)"
        - "mission.yaml (meta: version 1.15.0 вЖТ 1.15.1; title)"
        - "mission-history.yaml (sequence 57; meta: latest_version 1.15.1, total_revisions 56 вЖТ 57)"
