    change_type: "fix"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close every Codex Phase-1 gate finding (3 risks + 2 warnings +
      clippy) and align mission / history / CURRENT_STATE authority so
      the Phase-2 gate can open on stable ground.
    intent_ko: >
      Codex의 Phase-1 gate 리뷰 지적 5건(risk 3 + warning 2)과 clippy
      경고를 모두 닫고, mission/history/CURRENT_STATE의 권위 정합을
      복구해 Phase-2 게이트가 안정적으로 열리도록 정리한다.
    decision: >
      (1) Rewrote mission.yaml goal/done_when/execution_hints to match
      the Phase-1-shipped, Phase-2-pending state; bumped version 1.2.0
      -> 1.3.0. (2) Extended PaneReport with identity + signals +
      effects; UI panel renders signal chips + metric rows with
      SourceKind badges; --once prints them. (3) Buffered and audit-
      logged safety-override rejections through a new
      apply_override_with_audit helper; risk severity for forbidden
      upgrades, concern severity for unknown keys. (4) Introduced
      SystemNotice and route_version_drift; version drift surfaces as
      a warning-severity notice in the alert queue; startup snapshot
      uses a dedicated AuditEventKind::StartupVersionSnapshot. (5)
      Refactored deliver_effects to dispatch on out.effects via an
      EffectPermits snapshot; ArchiveLocal and SensitiveNotImplemented
      paths are explicit. (6) Cleaned clippy field_reassign_with_default
      across adapters/common.rs + all test sites; doc-lint fix +
      unused-mut fix. cargo clippy --all-targets -- -D warnings is
      clean.
    decision_ko: >
      (1) mission.yaml의 goal/done_when/execution_hints를 Phase 1
      출시 후 Phase 2 대기 상태로 재작성, version 1.3.0으로 bump.
      (2) PaneReport에 identity/signals/effects 추가, UI panel이
      signal chip과 MetricValue badge를 렌더링, --once 출력도 동일하게
