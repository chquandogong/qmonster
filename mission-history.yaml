        - "src/app/config.rs::PressureProviderConfig (warning_pct / critical_pct pair; shared between ContextConfig + QuotaConfig)"
        - "src/app/config.rs::ContextConfig::warning_for / critical_for / override_for resolution helpers"
        - "src/app/config.rs::QuotaConfig::warning_for / critical_for / override_for resolution helpers"
        - "src/app/config.rs::QmonsterConfig.context + .quota fields"
        - "src/policy/gates.rs::PolicyGates.context_warning_pct / context_critical_pct / quota_warning_pct / quota_critical_pct fields + Default impl + from_config_and_identity signature update (now takes &ContextConfig + &QuotaConfig)"
        - "config/qmonster.example.toml::[context] and [quota] sections with default + commented per-provider overrides + recommended-defaults rationale block"
