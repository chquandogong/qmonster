    decision: >
      PolicyGates struct introduced to carry quota_tight flag and
      identity-confidence context through Engine::evaluate without breaking
      the pure-function contract. PaneView<'a> uses borrowed &str
      current_path to avoid heap allocation in the cross-pane pass.
