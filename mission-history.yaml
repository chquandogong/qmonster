  - change_id: "v1.13.0-emergency-suppression"
    semantic_version: "1.13.0"
    change_sequence: 52
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "Claude Code (main pane) ŌĆö diagnosis, plan authoring, TDD execution"
    change_type: "emergency-fix"
    motivation_type: "operational-noise"
    persistence: "permanent"
    intent: >
      Eliminate the ~250,000/day false-positive RISK/Warning/Concern
      alerts that parse_common_signals had been emitting against the
      operator's running Claude Code v2.1.120 / Codex v0.122 / Gemini
      v0.39 panes, by capturing real-world tails as test fixtures and
      tightening four marker classes against them under TDD.
    decision: >
      Diagnostic phase (Phase 1 of systematic-debugging skill) revealed
      that PERMISSION_MARKERS, WAITING_MARKERS, log_storm fallback, and
      verbose_answer fallback all matched ordinary CLI UI text and prose
      content rather than the interactive prompts they were intended to
      detect. Audit DB measurement (2026-04-24..2026-04-25) showed:
      ~93K/day RISK permission-wait, ~33K/day Warning input-wait,
      ~55K/day Warning log_storm, ~127K/day Concern verbose-output ŌĆö
      saturating the alert queue and rendering Qmonster's central
      observe-first surface useless. Decision: ship a single-version
      emergency release (v1.13.0) that captures real fixtures, adds a
      regression test asserting no false positives on idle/status views,
      and tightens the four markers minimally. Confirm-archive
      (Codex+Gemini cross-check) deferred to Slice 3 plan because
      audit-DB volume was actively saturating local storage; emergency
      release skips one round of cross-check by design and the deferral
      is documented inline.
    triggered_by: "Operator report (chquan@dogu.xyz, 2026-04-24): 'claude code paneņŚÉņä£ ņé¼ņÜ®ņ×É ņ×ģļĀź/ĒīÉļŗ©ņØä ļīĆĻĖ░ĒĢśĻ│Ā ņ×łļŖö Ļ▓āņØä ņØ┤ļ▓żĒŖĖļĪ£ ļ¬╗ ļ│┤ņŚ¼ņŻ╝ļŖö Ļ▓ā Ļ░ÖĻ│Ā, claude/codex/gemini ņāüĒā£ ņĀĢļ│┤ļōżņØ┤ ņĀ£ļīĆļĪ£ ļ│┤ņŚ¼ņ¦ĆļŖö Ļ▓ā Ļ░Öņ¦ĆļŖö ņĢŖņŖĄļŗłļŗż.'"
