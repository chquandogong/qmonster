  - change_id: "v1.13.1-residual-suppression"
    semantic_version: "1.13.1"
    change_sequence: 53
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "Claude Code (main pane) вҖ” Phase 1 evidence, TDD execution"
    change_type: "emergency-fix"
    motivation_type: "operational-noise-residual"
    persistence: "permanent"
    intent: >
      Close the residual ~82,000 daily false-positive alerts that v1.13.0
      left unaddressed. Audit-DB measurement at 2026-04-25 06:07 UTC
      (43-min v1.13.0 settled run vs full-day v1.12.2 baseline) showed
      AlertFired/min dropped only 64.4% (vs вүҘ95% target) because two
      noise sources unmasked when the four v1.13.0-targeted classes went
      to ~0: error_hint substring matching on bash hook output and
      operator prose, and parse_context_pressure substring matching on
      quoted Codex status lines and `Tip ... plan usage` welcome text.
    decision: >
      Phase 1 systematic-debugging investigation confirmed both noise
      sources via tmux capture-pane against running panes:
      (a) ERROR_MARKERS = ["traceback","panic","exception","fatal",
          "error:","failed"] matched Claude's `Stop hook error: Failed
          with non-blocking status code` lines (5+ per poll) and operator
          prose discussing the markers themselves.
      (b) common.rs parse_context_pressure matched any line containing
          context|window|usage|compact + any percent. Claude prose
          quoting Codex's `Context 100% left` triggered it; Codex's own
          structured parser (parse_codex_status_line) requires a 4-tuple
          (context_pct, total, input, output) and fails out on idle
          panes (`0 in В· 0 out`), at which point common.rs's loose value
          remains in the SignalSet вҖ” that was the Codex `CTX 100%` UI
          that confused the operator.
      Patches: tighten ERROR_MARKERS to line-start structural patterns
      (traceback header, panicked at, error:/error[/fatal: prefixes,
      exception in thread); drop parse_context_pressure entirely from
      common.rs and parse_context_percent_claude from claude.rs;
      production now sources context_pressure exclusively from per-
      provider structured parsers; sentinel `parse_context_pressure_test_marker`
      kept for end-to-end integration tests with the deliberately
      narrow contiguous phrase `context window usage X%` that real CLI
      output never emits. 345 tests green (301 lib + 6 + 26 + 12).
    triggered_by: "v1.13.0 audit-DB measurement (-64.4% AlertFired vs вүҘ95% target) вҖ” systematic-debugging Phase 1 re-entry"
    issue_or_context: >
      The v1.13.0 plan explicitly listed ERROR_MARKERS tightening and
      per-provider context parsing as Slice 3 backlog (S3-1, plus an
      implicit error_hint cleanup not numbered). After v1.13.0 closed
      its 4 targeted classes 99-100%, the residual error_hint (~38K/day)
      and context_pressure-driven advisories (~44K/day for quota_tight
      + context_pressure_critical combined) became the new dominant
      noise, accounting for the 95%-target gap. Operator did not feel
      this in the immediate live --once smoke (only 1-2 alerts visible
      at any moment) because they refresh on screen but accumulate in
      audit-DB; the gap surfaced only via the 20-min cumulative measure.
    changes:
      added:
        - "tests/false_positive_regression.rs: 7 new assertions covering error_hint + context_pressure on existing fixtures (3 RED before patch, all green after)"
        - "src/adapters/common.rs::parse_context_pressure_test_marker вҖ” narrow synthetic-phrase sentinel for end-to-end policy integration tests"
      modified:
        - "src/adapters/common.rs: ERROR_MARKERS substring вҶ’ detect_error_hint() with line-start structural patterns (traceback (most recent / panicked at / error: / error[ / fatal: / fatal error: / panic: / exception in thread); parse_context_pressure removed (and dependent parse_first_percent); existing context_pressure_parsed_as_estimated test вҶ’ context_pressure_test_marker_matches_only_explicit_phrase + common_does_not_populate_context_pressure_on_prose"
        - "src/adapters/claude.rs: parse_context_percent_claude removed; existing claude_adapter_parses_claude_specific_percent test вҶ’ claude_adapter_does_not_populate_context_pressure_from_prose_v1_13_1"
        - "mission.yaml (meta: version 1.13.0 вҶ’ 1.13.1; title)"
        - "mission-history.yaml (sequence 53 added; meta: latest_version вҶ’ 1.13.1, total_revisions 52 вҶ’ 53)"
      removed:
        - "common.rs::parse_context_pressure (and parse_first_percent helper)"
        - "claude.rs::parse_context_percent_claude"
        - "common.rs::context_pressure_parsed_as_estimated test"
        - "claude.rs::claude_adapter_parses_claude_specific_percent test"
    changed_sections:
