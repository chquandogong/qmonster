      - "src/app/event_loop.rs::run_once_with_target parser input"
      - "src/app/bootstrap.rs::Context"
      - "docs/ai/UI_MANUAL.md::runtime facts section"
    done_when_delta:
      added:
        - "Claude `/status` output is captured before closing the fullscreen surface"
        - "Qmonster sends `Escape` after the capture so the pane is immediately ready for the next command"
        - "Captured `/status` output is parsed once on the next poll via an in-memory overlay"
      modified:
        - "The v1.15.1 pre-send Escape remains a defensive cleanup, but `/status` no longer depends on it for the normal next-command path"
      removed: []
    impact_scope:
      code: "+~110/-~20 LoC across main loop dispatch, app context, event-loop parser input, and tests"
      tests: "434 total ‚Äî 362 lib + 14 main + 34 event_loop + 18 false_positive + 6 idle_state + 0 sim (was 432 at v1.15.2; +2 tests)"
      ledger: "1 new timeline entry (sequence 59); meta bump"
      review_gate: "operator-driven runtime UX patch; local fmt/test/clippy pass."
      follow_up_carryover: "Slice 3 (S3-1..S3-5 per the backlog) and operator priorities remain queued."
    breaking: false
    risk: "low ‚Äî affects only operator-triggered runtime refresh; captured status text is one-shot in memory and not persisted to audit."
