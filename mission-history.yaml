    intent_ko: >
      v1.10.7 follow-up л§Ҳк°җ: bullet н–үмқҙ col 4лЎң л“Өм—¬м“°кё°лҗҳм–ҙ
      summary н–ү(col 2)ліҙлӢӨ кі мһ‘ 2м№ё мқҙлҸҷн•ң кІғмңјлЎң мқҪнһҳ вҖ”
      мӢңк°Ғм Ғ мӨ‘мІ©мқҙ м•Ҫн•Ё. Summary н–ү value м»¬лҹј м•„лһҳлЎң hanging
      indentмӢңмјң лӘ…нҷ•н•ҳкІҢ мӨ‘мІ©мӢңнӮЁлӢӨ.
    decision: >
      `HELP_CONTINUATION_PREFIX` deepened from 4 spaces to 20
      spaces before the `В· ` marker. This places the `В·` at
      column 20 (same column as the `:` of the summary row,
      since HELP_DETAIL_INDENT(2) + HELP_LABEL_WIDTH(18) = 20)
      and the bullet text then starts at column 22 вҖ” the value
      column of the summary row. Result: bullets hang directly
      under the value of the `p` entry in standard hanging-
      indent style. A new unit test
      `help_continuation_prefix_hangs_bullet_under_value_column`
      computes the expected column offset from
      `HELP_DETAIL_INDENT + HELP_LABEL_WIDTH + ": "` and asserts
      (a) the prefix consumes exactly that many chars before the
      bullet text begins and (b) the `В·` sits at the col-20
      bullet position. Any future change to
      `HELP_DETAIL_INDENT` / `HELP_LABEL_WIDTH` /
      `HELP_CONTINUATION_PREFIX` that breaks the alignment fails
      here before shipping. No content change вҖ” the three
      audit-chain bullets (Execute / AutoSendOff / observe_only)
      and the `p` summary text are unchanged.
      Post-commit git operation: create annotated tag `v1.10.8`
      at HEAD and push. Build.rs re-runs on the new tag
      (rerun-if-changed on `.git/HEAD` + currently-checked-out
      ref), so a fresh build renders `v1.10.8` in the footer.
    decision_ko: >
      `HELP_CONTINUATION_PREFIX`лҘј 4-spaceм—җм„ң 20-space + `В· `лЎң
      ліҖкІҪ. `В·` л§Ҳм»Өк°Җ col 20(HELP_DETAIL_INDENT(2) +
      HELP_LABEL_WIDTH(18))м—җ мң„м№ҳ вҖ” summary н–үмқҳ `:`мҷҖ к°ҷмқҖ col.
      Bullet н…ҚмҠӨнҠёлҠ” col 22л¶Җн„° мӢңмһ‘н•ҙ summary value column м•„лһҳлЎң
      hanging indent м •л ¬. мғҲ мң лӢӣ н…ҢмҠӨнҠё
      `help_continuation_prefix_hangs_bullet_under_value_column`мқҙ
      `HELP_DETAIL_INDENT + HELP_LABEL_WIDTH + ": "`м—җм„ң кё°лҢҖ
      column offsetмқ„ кі„мӮ°н•ҙ (a) prefixк°Җ м •нҷ•нһҲ к·ё кёёмқҙл§ҢнҒјмқҳ
      charsлҘј мҶҢл№„, (b) `В·`к°Җ col 20мқҳ bullet positionм—җ мң„м№ҳн•Ёмқ„
      кІҖмҰқ. н–Ҙнӣ„ мғҒмҲҳ ліҖкІҪмқҙ м •л ¬мқ„ к№ЁнҠёлҰ¬л©ҙ м—¬кё°м„ң лЁјм Җ fail.
      лӮҙмҡ©мқҖ л¶ҲліҖ вҖ” 3к°ң audit-chain bullet(Execute / AutoSendOff /
      observe_only) + `p` summary лӘЁл‘җ мң м§Җ.
      Post-commit: HEADм—җ annotated tag `v1.10.8` л¶Җм°© + push.
      build.rsмқҳ rerun-if-changedк°Җ tag ліҖкІҪмқ„ к°җм§Җн•ҙ мһ¬л№Ңл“ң мӢң
      footerк°Җ `v1.10.8`лЎң л ҢлҚ”лҗЁ.
    triggered_by: "Operator feedback on v1.10.7: 'л„Ө, bullet LineлҸ„ л“Өм—¬м“°кё° н•ҙмӨҳ'"
    issue_or_context: >
