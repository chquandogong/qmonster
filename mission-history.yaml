  - change_id: "phase-4-wrap-up-p4-8-approval-mode-swap-and-token-thresholds-decision"
    semantic_version: "1.8.13"
    change_sequence: 29
    date: "2026-04-22"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "Codex (codex:1:review, v1.8.8 P4-6 review flagged `--approval-mode = default` as a non-blocker positive-form alternative έΑΦ this revision addresses that non-blocker; also due to confirm the v1.8.13 changes)"
      - "Gemini (gemini:1:research, v1.8.8 P4-6 review concurred that both representations are honest and noted the positive-form upgrade was optional; also due to confirm the v1.8.13 changes)"
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator έΑΦ approved reconciliation onto the v1.8.12 shared-verification contract as v1.8.13 rather than overwriting v1.8.12)"
    change_type: "feature-fix"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close Phase 4 end-to-end by addressing the two items deferred
      when the 3x2 grid was declared complete at v1.8.11: (A) Codex's
      v1.8.8 P4-6 positive-form non-blocker (`--approval-mode =
      default` as an alternative to `--yolo = unset` for the
      gemini-default baseline second lever) and (B) the remaining
      Phase-4 VALIDATION.md checkbox (`token.thresholds` per-provider
      split decision). Layered on top of v1.8.12 shared-verification
      hardening έΑΦ does not disturb the portable done_when contract
      introduced at v1.8.12.
    intent_ko: >
      Phase 4Έξ╝ end-to-endΈκε ΈπΙΆ░Ρ. v1.8.11ΉΩΡ 3x2 grid ΉβΕΉΕ▒ ΉΕιΉΨ╕ Ήζ┤ΊδΕ
      ΉειΈ│┤ΈΡαΉΩΙΈΞα ΈΣΡ ΊΧφΈςσΉζΕ ΈΜτΈΛΦΈΜν. (A) Codex v1.8.8 P4-6 ΈουΈ╖░Ήζα
      positive-form non-blocker (`--yolo = unset` ΈΝΑΉΜι
      `--approval-mode = default`), (B) ΈΓρΉζΑ Phase-4 VALIDATION.md
      Ή▓┤ΊΒυΈ░ΧΉΛν(`token.thresholds` per-provider Έ╢ΕΊΧι Ά▓░ΉιΧ). v1.8.12
      shared-verification ΊΧαΈΥεΈΜζ Ά│ΕΉΧ╜ ΉεΕΉΩΡ ΉΨ╣ΉΨ┤ ΉπΕΊΨΚ έΑΦ v1.8.12Ά░Α
      ΉιΧΈουΊΧε portable done_when Ά│ΕΉΧ╜ΉζΑ Ά╖╕ΈΝΑΈκε ΉειΉπΑ.
    decision: >
      (A) Swap the gemini-default second lever from `--yolo = unset`
      (ProjectCanonical έΑΦ "recommend NOT setting a flag") to
      `--approval-mode = default` (ProviderOfficial έΑΦ both the
      flag and the `default` value are documented in Gemini CLI
      docs). The bundle authority split graduates from 0 PO + 2 PC
      to 1 PO + 1 PC and mirrors codex-default's v1.8.6 dual-
      authority reason pattern (reason summary now contains both
      `ProviderOfficial` and `ProjectCanonical` tokens). The
      aggressive variant `gemini-script-low-token` keeps
      `--yolo = enabled` έΑΦ the pair now expresses a semantic
      inverse on the approval-surface axis rather than a value
      inverse on a shared key. Trade-off accepted for (1) a
      positive-form lever operators can scan without parsing
      "NOT set", (2) a 1-PO honesty upgrade honestly available
      from Gemini docs, (3) lever rows that map cleanly to an
      actual `gemini --approval-mode default` invocation.
      (B) Retain the `token.thresholds` single global block.
      Rationale (in-line in VALIDATION.md): (i) no `tests/
      fixtures/` directory exists, so Phase-1 has produced no
      measured per-provider threshold data; (ii) of the 5 keys
      in `[token.thresholds]` (context_warn, context_crit,
      big_output_chars, log_storm_lines, repeat_window), only
      `big_output_chars` is currently wired into Rust (`src/
      app/config.rs:131`, consumed by `ArchiveWriter`) έΑΦ a
      speculative per-provider split would add config burden
      without touching actual policy; (iii) provider asymmetry
      already lives in the profile-rule layer (`src/policy/
      rules/profiles.rs`) + identity-confidence gates, not in
      raw token thresholds. Future Phase-1 fixture data can
      still justify a split without today's global block
      locking us in.
    decision_ko: >
      (A) gemini-default ΈΣΡ Έ▓ΙΉπ╕ ΈιΙΈ▓ΕΈξ╝ `--yolo = unset` (PC)ΉΩΡΉΕε
      `--approval-mode = default` (PO)Έκε Ά╡ΡΉ▓┤. authority splitΉζΑ
      0 PO + 2 PC έΗΤ 1 PO + 1 PCΉζ┤ ΈΡαΆ│ι, codex-default v1.8.6Ήζα
      dual-authority reason ΊΝρΊΕ┤ΉζΕ ΈΦ░Έξ╕ΈΜν. aggressive Έ│ΑΊαΧΉζΑ
      `--yolo = enabled`Έξ╝ ΉειΉπΑ έΑΦ Ά│╡Ήει ΊΓν ΉεΕΉζα Ά░Τ Έ░αΉιΕΉζ┤ ΉΧΕΈΜΝ
      approval-surface Ή╢Χ ΉεΕΉζα ΉζαΈψ╕ΉιΒ Έ░αΉιΕ.
      (B) `token.thresholds` ΈΜρΉζ╝ global block ΉειΉπΑ. Ά╖╝Ά▒░(VALIDATION.md
      Ήζ╕Έζ╝Ήζ╕): (i) `tests/fixtures/` Έ╢ΑΉηυΈκε Phase-1 Ή╕κΉιΧ ΈΞ░Ήζ┤ΊΕ░ ΉΩΗΉζΝ,
      (ii) `[token.thresholds]` 5Ά░ε ΊΓν ΉνΣ RustΉΩΡ ΉΜνΉιεΈκε Έ░░ΉΕιΈΡε ΊΓνΈΛΦ
      `big_output_chars` ΊΧαΈΓα(`src/app/config.rs:131`, `ArchiveWriter`
      ΉΗΝΈ╣Ε)Έ┐Ρ έΑΦ Ή╢ΦΉ╕κΉΕ▒ Έ╢ΕΊΧιΉζΑ ΉΕνΉιΧ Έ╢ΑΈΜ┤ΈπΝ Ή╢ΦΆ░Α, (iii) provider
      Έ╣ΕΈΝΑΉ╣φΉΕ▒ΉζΑ Ήζ┤Έψ╕ profile-rule Ά│ΕΉ╕╡ + identity-confidence Ά▓ΝΉζ┤ΊΛ╕ΉΩΡ
      Ήκ┤Ήηυ. ΊδΕΉΗΞ Phase-1 fixture ΈΞ░Ήζ┤ΊΕ░Ά░Α ΉΜνΉιε Έ╢ΕΊΧιΉζΕ ΉγΦΆ╡υΊΧαΈσ┤
      ΉπΑΆ╕ΙΉζα global blockΉζ┤ Ήζ┤Έξ╝ Ά░ΑΈκεΈπΚΉπΑ ΉΧΛΉζΝ(Ά░ΑΉΩφ).
    triggered_by: "Codex v1.8.8 P4-6 deferred non-blocker + remaining VALIDATION.md Phase-4 checkbox"
    issue_or_context: >
      Phase 4 was declared 'fully gate-approved' at v1.8.11 with all
      6 profiles in the 3x2 grid shipped, but two items remained
      open: (1) Codex's v1.8.8 P4-6 non-blocker suggesting
      `--approval-mode = default` as a positive-form alternative to
      the `--yolo = unset` expression in the gemini-default
      baseline, and (2) the VALIDATION.md checkbox for
      `token.thresholds` per-provider split (last Phase-4 check
      unticked). Both items needed a clean resolution before
      Phase 5 opens, on top of the v1.8.12 shared-verification
      contract.
    changes:
      added: []
      modified:
        - "src/policy/rules/profiles.rs"
        - "docs/ai/VALIDATION.md"
        - "mission.yaml"
        - "mission-history.yaml"
        - ".mission/CURRENT_STATE.md"
      removed: []
    changed_sections:
      - "gemini-default second lever (positive-form swap: --yolo = unset PC έΗΤ --approval-mode = default PO)"
      - "gemini-script-low-token prose refresh (aggressive --yolo citation now refers to baseline's --approval-mode = default instead of --yolo = unset)"
      - "VALIDATION.md token.thresholds checkbox ticked with inline decision rationale"
      - "ledger v1.8.13 P4-8 wrap-up entry layered on top of v1.8.12 shared-verification hardening"
    done_when_delta:
      added: []
      modified:
        - "Phase 4 scope now structurally closed: 7/7 VALIDATION.md Phase-4 checkboxes ticked; no reviewer-raised non-blockers open on the shipped rule set"
      removed: []
    impact_scope:
      runtime: "gemini-default rec renders 1 PO + 1 PC lever rows instead of 0 PO + 2 PC; no policy-behavior / severity / Notify-gate change"
      verification: "cargo build + cargo test (222 lib + 6 drift + 18 integration) + cargo clippy --all-targets -D warnings + cargo fmt --check all clean"
      docs: "VALIDATION.md 7/7 Phase-4 boxes ticked with inline decision rationale for token.thresholds"
      ledger: "v1.8.13 layered on top of v1.8.12 shared-verification hardening; meta title + latest version bumped; v1.8.12 timeline entry and portable done_when contract untouched"
    breaking: false
    risk: "low έΑΦ lever-row cosmetic change + checkbox documentation only; no Rust behavior change"
    related_commits: []
    related_decisions:
      - "KD-005"
      - "KD-006"
    snapshot_after: ""
