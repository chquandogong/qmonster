    done_when_delta:
      added:
        - 'Phase 4 P4-2 v1.8.2: `src/policy/rules/auto_memory.rs::eval_auto_memory` is wired into `Engine::evaluate` after profiles. `recommend_mdr_over_auto_memory` fires a `Severity::Concern` passive advisory with `source_kind: ProjectCanonical` when `signals.task_type` is `Review` or `SessionResume`. The rec carries `next_step: Some("record in `.mission/CURRENT_STATE.md` or create a new `.mission/decisions/MDR-XXX.md`; avoid provider save_memory / auto-memory for state-critical content")`. Gemini G-5 VALIDATION.md:154-156 check closed.'
