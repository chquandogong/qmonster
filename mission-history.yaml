  - change_id: "v1.15.13-s3-1-input-output-tokens-plus-statusline-footer-docs"
    semantic_version: "1.15.13"
    change_sequence: 69
    date: "2026-04-27"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) — directed verification of Codex `/statusline` and Gemini `/footer` semantics"
    change_type: "feature"
    motivation_type: "backlog-resolution + operator-directed-research"
    persistence: "permanent"
    intent: >
      Close Slice 3 backlog item S3-1 (Codex bottom-status-line
      cumulative-vs-delta token semantics) by verifying the
      semantics directly against the bundled Codex binary, exposing
      the already-extracted input/output tokens on SignalSet, and
      documenting the operator-configurability of provider status
      surfaces (`/statusline` and `/footer`) so future-state
      decisions about parser robustness have explicit references.
    decision: >
      Operator-directed verification: inspected the
      `/usr/lib/.../codex/codex` binary for `/statusline` references
      and the `/usr/lib/.../gemini-cli/.../chunk-HF7X35D3.js` for
      `/footer` definition. Findings: Codex `/statusline` is a
      built-in slash command "Configure which items appear in the
      status line" with item ids `branch`, `model`, `input`,
      `output`, `version`, etc. Codex's `TokenUsage` struct fields
      (`input_tokens`, `cached_input_tokens`, `output_tokens`,
      `reasoning_output_tokens`, `total_tokens`) are session
      cumulative — confirming the `1.51M in · 20.4K out` tokens are
      cumulative, not deltas. Gemini `/footer` (alias `/statusline`)
      is built-in with description "Configure which items appear in
      the footer (statusline)" — opens the FooterConfigDialog;
      footer items are toggled via `ui.footer.*` settings. Both
      surfaces are operator-configurable; Qmonster respects
      `None`-on-absent-field instead of inferring (S3-4 honesty
      principle generalised). Implementation: SignalSet gains
      `pub input_tokens: Option<MetricValue<u64>>` and `pub
      output_tokens: Option<MetricValue<u64>>` (already extracted by
      the parser for cost_usd derivation; this round just exposes
      them). UI metric badge stays single (`TOKENS` = total) so the
      pane card stays compact; policy / audit gain per-direction
      access. UI_MANUAL gains an explicit configurability note.
    triggered_by: "Operator instruction (2026-04-27): 'codex는 /statusline 명령을 검색하여 확인하고, gemini는 /footer 명령을 확인하여 반영해줘'."
    issue_or_context: >
      S3-1 in `.docs/claude/Qmonster-v0.4.0-2026-04-25-claude-slice-3-backlog.md`
      asked: "Token in/out: `0 in · 0 out` carries live token deltas
      — fold into SignalSet.token_count only if a stable cumulative
      semantic exists; otherwise leave for a later slice." That
      semantic question was operator-deferred until v1.15.13;
      direct binary inspection now resolves it.
    changes:
      added:
        - "src/domain/signal.rs::SignalSet.input_tokens / output_tokens fields"
        - "src/adapters/codex.rs::CodexAdapter populates set.input_tokens / output_tokens from existing parse_codex_status_line extractor"
        - "src/adapters/codex.rs::regression assertion in codex_adapter_status_line_populates_metrics test (input=1_510_000 / output=20_400 / ProviderOfficial / Codex)"
        - "docs/ai/UI_MANUAL.md::operator-configurability note for /statusline (Codex) and /footer (Gemini); explicit S3-1 cumulative-tokens contract"
      modified:
        - "src/adapters/common.rs::parse_common_signals defaults input_tokens / output_tokens to None for non-Codex adapters"
        - "mission.yaml (meta: version 1.15.12 → 1.15.13; title)"
        - "mission-history.yaml (sequence 69; meta: latest_version 1.15.13, total_revisions 68 → 69)"
      removed: []
    changed_sections:
      - "src/domain/signal.rs::SignalSet"
      - "src/adapters/codex.rs::CodexAdapter::parse"
      - "src/adapters/common.rs::parse_common_signals defaults"
      - "docs/ai/UI_MANUAL.md::Panes reading guide (provider configurability)"
    done_when_delta:
      added:
        - "S3-1 backlog item closed: cumulative-vs-delta semantics resolved (cumulative)"
