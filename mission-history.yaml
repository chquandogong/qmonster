      module-level constants. Recommended defaults track 2026-04-27
      pricing-tier expectations (operator can tune freely):
      default $5/$20 (Codex `gpt-5.4` baseline; matches the v1.15.14
      hardcoded values), Claude $10/$30 (higher tier), Gemini $3/$10
