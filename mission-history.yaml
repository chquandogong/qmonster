      (ii) `[token.thresholds]` 5к°ң нӮӨ мӨ‘ Rustм—җ мӢӨм ңлЎң л°°м„ лҗң нӮӨлҠ”
      `big_output_chars` н•ҳлӮҳ(`src/app/config.rs:131`, `ArchiveWriter`
      мҶҢл№„)лҝҗ вҖ” м¶”мёЎм„ұ л¶„н• мқҖ м„Өм • л¶ҖлӢҙл§Ң м¶”к°Җ, (iii) provider
      л№„лҢҖм№ӯм„ұмқҖ мқҙлҜё profile-rule кі„мёө + identity-confidence кІҢмқҙнҠём—җ
      мЎҙмһ¬. нӣ„мҶҚ Phase-1 fixture лҚ°мқҙн„°к°Җ мӢӨм ң л¶„н• мқ„ мҡ”кө¬н•ҳл©ҙ
      м§ҖкёҲмқҳ global blockмқҙ мқҙлҘј к°ҖлЎңл§үм§Җ м•ҠмқҢ(к°Җм—ӯ).
