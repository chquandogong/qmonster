      мВімХДлВ®мІА л™їнЦИлЛ§. v1.8.0 л†Им†Ак∞А "мДЄ к∞Ь lever + citationмЭД
      лђґлКФлЛ§"к≥† м£ЉмЮ•нХЬ к≥ДмХљмЭі live pathмЧРмДЬ к±∞мІУмЭімЧИлЛ§. мИШм†Х: мЛ†кЈЬ
      `Recommendation.profile` мКђл°ѓ + к≥µмЪ© render нЧђнНЉл°Ь л≤ИлУ§мЭД
      л†МлНФлЯђкєМмІА м†ДлЛђнХШк≥†, unit + integration нЕМмК§нКЄл°Ь end-to-end
      к≥ДмХљмЭД к≥†м†ХнХЬлЛ§.
    decision: >
      (1) src/domain/recommendation.rs: add
      `pub profile: Option<ProviderProfile>` as a new field on
      Recommendation (default None for non-profile rules; Some(_)
      only when the rec recommends a bundle).
      (2) Thread `profile: None` through every existing
