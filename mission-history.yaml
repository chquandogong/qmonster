      operator to promote permissive runtime posture observations from
      display-only badges into passive recommendations without making
      the advisory default-on.
    intent_ko: >
      종합 업데이트 계획의 Phase B3를 구현한다. YOLO / bypass /
      no-sandbox / Full Access 같은 permissive runtime posture는 기본
      동작에서는 badge로만 유지하고, 운영자가 명시적으로 켰을 때만
      Concern recommendation으로 승격한다.
