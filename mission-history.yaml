        - "src/ui/settings.rs::settings_close_button_rect (pub helper) βÄî top-right 3Ο½1 rect computation"
        - "src/ui/settings.rs::render_settings_modal βÄî `[x]` paragraph rendered at the close-button rect"
        - "Tests: close_button_rect_sits_at_top_right_of_body + close_button_rect_stays_inside_body_bounds + close_button_rect_clamps_to_tiny_body (3 unit tests covering position, body-bounds containment, and degenerate-tiny-body clamping)"
      modified:
        - "src/main.rs Event::Mouse handler for the settings overlay βÄî replaces the unconditional swallow with a check-for-close-button-click + close-on-hit, then continue (other mouse events still swallowed)"
      removed: []
    changed_sections:
