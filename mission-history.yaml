      `έΩΠ Read(...)`) or TODO-list prose (`Task 1 έΑΦ capture
      fixtures`). The five existing phrase-level markers stay for
      backward compatibility. D3-C έΑΦ Update
      `docs/ai/ARCHITECTURE.md` "Deferred for later phases" entry
      from "Subagent token accounting (Phase 1 ships a
      detection-only warning)" to a Phase D D3-C honesty note: per-
      subagent input/output token splits are blocked on provider
      data, not on detection. Re-open if a future provider release
      lands a structured per-subagent counter. Codex statusline έΑΦ
      Accept both the earlier inline `gpt-5.5 xhigh` model token and
      the current trailing `gpt-5.5 xhigh` model-with-reasoning item,
      so `model_name` and `reasoning_effort` stay populated when the
      plain model item appears earlier in the same statusline.
    decision_ko: >
      D3-A έΑΦ `src/adapters/common.rs`Ήζα cross-provider
      `SUBAGENT_MARKERS` Έ░░ΉΩ┤ΉΩΡ `έΩΠ task(`Έξ╝ Ή╢ΦΆ░Α. bullet + open-paren
      ΉΝΞΉζΑ Claude Code Task subagent ΊΙ┤ tail ΈιΝΈΞΦΈπΒΉΩΡ ΊΧεΉιΧΈΡαΉΨ┤
      Ήζ╝Έ░α ΊΙ┤ Ία╕Ή╢ε(`έΩΠ Bash(...)`, `έΩΠ Read(...)`)Ήζ┤ΈΓα TODO ΊΦΕΈκεΉοΙ
      (`Task 1 έΑΦ ...`)ΉΩΡΉΕεΈΛΦ ΈπνΉ╣αΈΡαΉπΑ ΉΧΛΈΛΦΈΜν. Ά╕░Ήκ┤ 5Ά░ε phrase-level
      ΈπΙΉ╗νΈΛΦ backward compat ΈςσΉιΒΉε╝Έκε ΉειΉπΑ. D3-C έΑΦ Phase D D3-C
      honesty noteΈκε ARCHITECTURE.md "Deferred for later phases"
      ΉΩΦΊΛ╕ΈουΈξ╝ Ά░▒ΉΜι: per-subagent input/output ΊΗιΊΒ░ Έ╢ΕΈουΈΛΦ provider
      ΈΞ░Ήζ┤ΊΕ░ Έ╢ΑΉηυ ΈΧΝΈυ╕ΉΩΡ ΉαΒΆ╡υ deferred. Έψ╕ΈηαΉΩΡ providerΆ░Α Ά╡υΉκ░ΊβΦΈΡε
      per-subagent counterΈξ╝ ΈΖ╕Ή╢εΊΧαΈσ┤ ΉηυΆ░ε. Codex statusline έΑΦ
      Ά╕░Ήκ┤ inline `gpt-5.5 xhigh` ΈςρΈΞ╕ ΊΗιΊΒ░Ά│╝ ΊαΕΉηυ trailing
      `gpt-5.5 xhigh` model-with-reasoning itemΉζΕ ΈςρΈΣΡ ΊΩΙΉγσΊΧαΉΩυ,
      Ά░βΉζΑ statusline ΉΧηΉς╜ΉΩΡ plain model itemΉζ┤ ΉηΙΈΞΦΈζ╝ΈΠΕ
      `model_name`Ά│╝ `reasoning_effort`Έξ╝ Ή▒ΕΉγ┤ΈΜν.
    triggered_by: "Operator approved the D3-A + D3-C combination after the v1.18.0 (D2 identity drift) commit."
    issue_or_context: >
      The pre-v1.19.0 `SUBAGENT_MARKERS` set covered only the five
      phrase markers `starting subagent`, `spawning subagent`,
      `launching subagent`, `delegating task`, and `subagent
      complete`. None of those match Claude Code's actual Task tool
      tail signature (`έΩΠ Task(...)`), so a real Claude subagent
      dispatch went undetected. At the same time, ARCHITECTURE.md
      kept "Subagent token accounting" as deferred without naming
      the underlying data limitation, which left the door open to
      future delta-window heuristics that would re-introduce the
      v1.13.0 false-positive class. The operator also supplied a
      live Codex 0.125.0 statusline where the normal model token
      (`gpt-5.5`) appears before project/branch fields and the effort
      appears only in the final `gpt-5.5 xhigh` item; the parser
      needed to consume that final item even after `model_name` was
      already set.
    changes:
