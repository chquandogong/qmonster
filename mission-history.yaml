        - "src/app/config.rs::CostConfig::warning_for / critical_for / override_for resolution helpers"
        - "src/policy/gates.rs::PolicyGates.cost_warning_usd / cost_critical_usd fields + Default impl + from_config_and_identity signature update (now takes &CostConfig + Provider)"
        - "config/qmonster.example.toml::[cost] section with default + commented per-provider overrides + recommended-defaults rationale block"
        - "Tests: policy_gates_resolves_per_provider_cost_overrides (Claude $10/$30, Codex falls through, Gemini $3/$10) + cost_pressure_thresholds_track_per_provider_overrides (advisory rule honors per-provider gates)"
      modified:
        - "src/policy/rules/advisories.rs::cost_pressure_warning + cost_pressure_critical now read gates.cost_*_usd instead of module-level constants"
        - "src/policy/rules/advisories.rs::COST_PRESSURE_WARNING_USD / COST_PRESSURE_CRITICAL_USD constants removed (lifted into CostConfig defaults)"
        - "src/app/event_loop.rs::PolicyGates::from_config_and_identity caller now passes &ctx.config.cost + resolved.identity.provider"
        - "src/policy/gates.rs::policy_gates_from_config_and_identity_reads_both test updated for new signature"
        - "src/policy/{engine,gates,rules/{advisories,auto_memory,profiles}}.rs::PolicyGates {} construction sites updated for two new fields (default values 5.0 / 20.0 to preserve existing test behavior)"
        - "mission.yaml (meta: version 1.15.15 → 1.15.16; title; lineage.total_revisions 71 → 72)"
        - "mission-history.yaml (sequence 72; meta: latest_version 1.15.16, total_revisions 71 → 72)"
      removed:
        - "src/policy/rules/advisories.rs::COST_PRESSURE_WARNING_USD / COST_PRESSURE_CRITICAL_USD constants (replaced by gates fields)"
    changed_sections:
      - "src/app/config.rs::CostConfig + CostProviderConfig"
      - "src/policy/gates.rs::PolicyGates threshold fields"
      - "src/policy/rules/advisories.rs::cost_pressure_warning / cost_pressure_critical"
      - "config/qmonster.example.toml::[cost] section"
    done_when_delta:
      added:
        - "Operator can override cost thresholds via TOML `[cost]` section without rebuilding"
        - "Per-provider overrides apply only to the named provider; absent overrides fall through to the top-level pair"
