      Land four things and NOTHING else in this slice: (1) new
      `RequestedEffect::PromptSendProposed { target_pane_id: String,
      slash_command: String }` variant, which forced the enum to
      drop its derived `Copy + PartialOrd + Ord + Hash` ŌĆö the
      payload cannot cheaply participate in a total order. Authority
      ordering is now exposed via `RequestedEffect::authority_tier()
      -> u8` (Notify=0, ArchiveLocal=1, PromptSendProposed=2,
      SensitiveNotImplemented=3). (2) three new `AuditEventKind`s ŌĆö
      `PromptSendProposed`, `PromptSendAccepted`, `PromptSendRejected`
      ŌĆö wired through `src/store/audit.rs::kind_to_str` and
      `parse_kind` so SQLite round-trip cannot regress later even
      though `Accepted` / `Rejected` have no producing code path yet.
      (3) `EffectRunner::permit` signature change from
      `fn permit(&self, effect: RequestedEffect) -> bool` to
      `fn permit(&self, effect: &RequestedEffect) -> bool` (owned-
      to-borrowed, necessary for the payload-bearing variant).
      Behavior: `observe_only` blocks every variant including the
      proposal; `recommend_only` lets the proposal pass (display-
      layer effect, not actuation) regardless of
      `allow_auto_prompt_send` ŌĆö that flag continues to gate the
      *real* tmux send-keys call that P5-2+ layers on top. (4)
      `app/event_loop.rs::deliver_effects` gains a
      `RequestedEffect::PromptSendProposed { .. } => continue` arm
