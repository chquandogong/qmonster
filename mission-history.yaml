  - change_id: "qmonster-v1.15.17-per-provider-context-quota-thresholds"
    semantic_version: "1.15.17"
    change_sequence: 73
    date: "2026-04-27"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) βÄî 'λûîλ½§ μ¨®μ³¥κè³ ξΑôλùÄ κΑ©λ΄ùλ€ΦκΓ€ λ†¹λö©'"
    change_type: "feature"
    motivation_type: "operator-configurability"
    persistence: "permanent"
    intent: >
      Apply the v1.15.16 per-provider-config pattern to the remaining
      hardcoded advisory thresholds. context_pressure and quota_pressure
      were still keyed on `0.75..0.85` literals embedded in the rule
      body; the operator's instruction was to lift them out the same
      way CostConfig was, so that any future provider-specific tuning
      can land in TOML rather than code.
    decision: >
      Add `[context]` and `[quota]` TOML sections with top-level
      `warning_pct` / `critical_pct` (fraction in 0..=1.0, not %) plus
      optional `[context.claude]` / `[context.codex]` / `[context.gemini]`
      and `[quota.claude]` / `[quota.codex]` / `[quota.gemini]`
      per-provider overrides. PolicyGates gains four new f32 fields
      (`context_warning_pct`, `context_critical_pct`, `quota_warning_pct`,
      `quota_critical_pct`) that `from_config_and_identity` resolves
      per-pane (provider override if set, else top-level default). The
      four advisory rules βÄî `context_pressure_warning`,
      `context_pressure_critical`, `quota_pressure_warning`,
      `quota_pressure_critical` βÄî read directly from gates instead of
      the hardcoded `0.75..0.85` literals. Recommended defaults are
      uniform 0.75/0.85 across all providers because the workflow
      remediation (/compact + checkpoint snapshot, or quota pacing) is
      identical regardless of which CLI emitted the metric βÄî the
      override slots exist so a provider whose pressure sensor is
      consistently noisy can be calibrated without code change. Today
      only Gemini's v0.39 status table populates `quota_pressure`, so
      Claude/Codex `[quota.<provider>]` slots are commented-out scaffolding
      until a future provider exposes a quota fraction. ContextConfig
      and QuotaConfig share `PressureProviderConfig` because the units
      are identical (f32 fraction); CostConfig keeps its own
      CostProviderConfig because USD thresholds are f64.
    triggered_by: "Operator instruction (2026-04-25): 'λûîλ½§ μ¨®μ³¥κè³ ξΑôλùÄ κΑ©λ΄ùλ€ΦκΓ€ λ†¹λö©' (apply the remaining same pattern)."
    issue_or_context: >
      v1.15.16 lifted the cost_pressure thresholds into PolicyGates +
      CostConfig but stopped short of context_pressure and quota_pressure.
      The follow_up_carryover on sequence 72 explicitly flagged this
      as the obvious next step. Without lift-out, an operator whose
      provider pressure metric runs hot or cold (e.g. Claude header
      reporting context_pressure differently from Codex bottom-status)
      had no way to recalibrate without touching rule code.
    changes:
      added:
        - "src/app/config.rs::ContextConfig (top-level warning_pct / critical_pct + per-provider Option<PressureProviderConfig> for Claude / Codex / Gemini)"
        - "src/app/config.rs::QuotaConfig (same shape as ContextConfig; today only Gemini populates the metric)"
        - "src/app/config.rs::PressureProviderConfig (warning_pct / critical_pct pair; shared between ContextConfig + QuotaConfig)"
        - "src/app/config.rs::ContextConfig::warning_for / critical_for / override_for resolution helpers"
        - "src/app/config.rs::QuotaConfig::warning_for / critical_for / override_for resolution helpers"
        - "src/app/config.rs::QmonsterConfig.context + .quota fields"
        - "src/policy/gates.rs::PolicyGates.context_warning_pct / context_critical_pct / quota_warning_pct / quota_critical_pct fields + Default impl + from_config_and_identity signature update (now takes &ContextConfig + &QuotaConfig)"
        - "config/qmonster.example.toml::[context] and [quota] sections with default + commented per-provider overrides + recommended-defaults rationale block"
        - "Tests: policy_gates_resolves_per_provider_context_and_quota_overrides (Gemini context override 0.60/0.75 + Claude quota override 0.80/0.90 + Codex falls through both) + context_pressure_thresholds_track_per_provider_overrides (advisory rule honors per-provider gates: tight gates promote 0.78 from warning to critical; loose gates suppress) + quota_pressure_thresholds_track_per_provider_overrides (same pattern for quota)"
      modified:
        - "src/policy/rules/advisories.rs::context_pressure_warning + context_pressure_critical now read gates.context_*_pct instead of hardcoded 0.75..0.85"
        - "src/policy/rules/advisories.rs::quota_pressure_warning + quota_pressure_critical now read gates.quota_*_pct instead of hardcoded 0.75..0.85"
