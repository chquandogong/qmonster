      tests: "337 total — added 5 new tests/false_positive_regression.rs cases against real fixtures; existing 332 unchanged (300 lib + 6 + 26 + 5)"
      ledger: "1 new timeline entry + 4 new fixture files + 1 new regression test + 2 new .docs/claude/ working-doc files; meta bump"
