      tests: "456 total — 384 lib + 14 main + 34 event_loop + 18 false_positive + 6 idle_state + 0 sim (was 451 at v1.15.10; +5 from the 5 quota_pressure advisory tests)"
      ledger: "1 new timeline entry (sequence 67); meta bump"
