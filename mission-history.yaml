        - "Phase 3A: Phase-1 unit-test backfill for repeated_output/verbose_answer/error_hint (Gemini #1 closed)."
        - "Phase 3A: cargo build + cargo test (~152 lib + ~12 integration) + cargo clippy --all-targets -- -D warnings all clean."
