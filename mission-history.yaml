evolution_summary:
  current_phase: "v1.16.24 live TUI loop extraction — Phase C C1 is structurally complete enough for C2 with startup, tui_loop, dashboard_runtime, polling_tick, terminal_session, dashboard_render, keymap, target_picker, runtime_refresh, dashboard_state, modal_state, path_resolution, settings_overlay, operator_actions, once_report, prompt_send_actions, and clipboard_actions helper modules already extracted."
  next_phase: "Begin Phase C C2 control-mode tmux adapter work. Later Phase C items remain review-tier profiles. Save path remains comment-lossy via `toml::to_string_pretty` (swap to `toml_edit` if operators ask for format-preserving writes). Confirm-archive review remains permanently closed per operator decision (2026-04-27)."
  guiding_principles:
    - "Observe-first / Alert-first / Recommendation-first"
    - "Token optimization as an architectural pillar"
    - "docs/ai canonical, .docs working, mission-spec contract+ledger"
    - "Auto memory is local convenience, not primary state"
    - "No destructive automation by default; manual refresh only; balanced logging"
    - "SourceKind taxonomy = ProviderOfficial | ProjectCanonical | Heuristic | Estimated (r2)"
    - "Identity-before-adapters pipeline; policy/ is pure; runtime writes only in ~/.qmonster/ (r2)"
    - "Safety-precedence asymmetry: env/CLI may only move actions.mode / allow_auto_prompt_send / allow_destructive_actions / refresh.policy toward safer (r2)"
    - ".mission/CURRENT_STATE.md = day-end handoff, never runtime checkpoint sink (r2)"

key_decisions:
  - id: "KD-001"
    title: "Pane identity = {provider, instance, role, pane_id}"
    rationale: "Allows same-provider repetition within one project window (claude:1:main + claude:2:review + claude:3:research)."
    source: ".docs/init/Qmonster_종합_기획_보고서_v0.4.0_2026-04-20.md §1.1, §4.2"
  - id: "KD-002"
    title: "Day-end state goes to .mission/CURRENT_STATE.md, not memory"
    rationale: "Auto memory is machine-local, non-deterministic, not sharable across models; CURRENT_STATE.md is the canonical day-end ledger."
    source: ".docs/init/cli_memory_comparison_report_ko_v2.md §0, §4.5"
  - id: "KD-003"
    title: "recommend_only by default; no destructive automation"
    rationale: "Failure modes in the comprehensive plan §18 include 'too much automation up front'. Recommendation-first keeps us on the safe side until cross-checks confirm the surface."
    source: ".docs/init/Qmonster_종합_기획_보고서_v0.4.0_2026-04-20.md §18, §20"
  - id: "KD-004"
    title: "Manual refresh only; Qmonster surfaces but never silently upgrades"
    rationale: "Avoid version drift and provider-side behavioral surprises in a TUI that the operator relies on for observability."
    source: ".docs/init/Qmonster_종합_기획_보고서_v0.4.0_2026-04-20.md §1.5"
  - id: "KD-005"
    title: "Official vs heuristic vs estimated labeling is non-negotiable"
    rationale: "The operator needs to trust numbers at a glance; mixing authoritative provider levers with community heuristics silently erodes that trust."
    source: ".docs/init/Qmonster_토큰_최적화_조사_및_구현_보고서_2026-04-19 2.md §7.5 (official levers) vs §3 (community tools as heuristics)"
  - id: "KD-006"
    title: "SourceKind taxonomy = ProviderOfficial | ProjectCanonical | Heuristic | Estimated"
    rationale: "Codex r1 (C-5) and Gemini r1 (G-13) both flagged that (official) was conflating three distinct authorities. Splitting into four named kinds lets the UI, policy, and docs surface authority honestly."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md must-fix #5; .docs/gemini/Qmonster-v0.4.0-2026-04-20-gemini-research-r1.md TODO #5; final synthesis r2 §1"
  - id: "KD-007"
    title: "Identity-before-adapters pipeline"
    rationale: "Identity cannot be inferred after provider dispatch — the adapter needs to know which provider it is. Fixing this now avoids a shape change once code exists."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md must-fix #3; final synthesis r2 §5.1"
  - id: "KD-008"
    title: "Phase 1 narrowed: no SQLite, no archive persistence, no profile recommender"
    rationale: "Codex's scope reductions (CS-1..CS-4) keep Phase 1 honest to its 'observe-first' name and avoid Phase-2/4 creep. Storage/policy/profile layers still exist but as traits and interfaces only."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md scope reductions; final synthesis r2 §§6.2-6.3"
  - id: "KD-009"
    title: "Safety precedence is asymmetric"
    rationale: "env/CLI may move actions.mode, allow_auto_prompt_send, allow_destructive_actions, refresh.policy toward safer only. Resolves r1's contradiction between standard precedence and the rule that runtime cannot elevate dangerous modes."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md must-fix #6; final synthesis r2 §4"
