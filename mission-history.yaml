      detection. The old same-current_path proxy was useful but too
      noisy in normal multi-pane operation; branch data is now available
      from Codex/Gemini status surfaces, so use it before warning.
    intent_ko: >
      Phase B4의 branch-level concurrent-work narrowing을 구현한다. 기존
      same-current_path proxy는 일반적인 다중 pane 운영에서 false positive가
