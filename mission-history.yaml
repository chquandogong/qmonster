  - change_id: "phase-4-p4-1-structured-profile-payload-to-renderer"
    semantic_version: "1.8.1"
    change_sequence: 17
    date: "2026-04-21"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "Codex (codex:1:review, v1.8.0 P4-1 review вҖ” flagged finding #1 closed by this round)"
      - "Gemini (gemini:1:research, v1.8.0 P4-1 review вҖ” pass / м Ғк·№ мҠ№мқё; narrative + mirror artifacts backfilled in this round)"
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "fix"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close Codex v1.8.0 P4-1 review finding #1: the structured
      `ProviderProfile` built inside `recommend_claude_default` was
      being discarded before the `Recommendation` returned from the
      rule. Operators saw only a prose `reason` string; the three
      ProviderOfficial lever keys/values/citations never survived
      past `Recommendation` into `PaneReport`, `--once`, or the TUI
      panel. This made the v1.8.0 ledger claim that the rec "bundles
      three levers with citations" false in the live path. Fix:
      carry the bundle through to the renderer via a new
      `Recommendation.profile` slot + a shared render helper, and
      lock the end-to-end contract with unit + integration tests.
    intent_ko: >
      Codex v1.8.0 P4-1 лҰ¬л·°мқҳ finding #1мқ„ лӢ«лҠ”лӢӨ.
      `recommend_claude_default` лӮҙл¶Җм—җм„ң л№Ңл“ңн•ң кө¬мЎ°нҷ”лҗң
      `ProviderProfile`мқҙ к·ңм№ҷмқҙ л°ҳнҷҳн•ҳлҠ” `Recommendation` мқҙм „м—җ
      лІ„л Өм§Җкі  мһҲм—ҲлӢӨ. operatorлҠ” prose `reason` л¬ёмһҗм—ҙл§Ң лҙӨкі ,
      м„ё к°ң ProviderOfficial leverмқҳ key/value/citationмқҖ
      `Recommendation` мқҙнӣ„ `PaneReport`, `--once`, TUI panel м–ҙл””м—җлҸ„
      мӮҙм•„лӮЁм§Җ лӘ»н–ҲлӢӨ. v1.8.0 л Ҳм Җк°Җ "м„ё к°ң lever + citationмқ„
      л¬¶лҠ”лӢӨ"кі  мЈјмһҘн•ң кі„м•Ҫмқҙ live pathм—җм„ң кұ°м§“мқҙм—ҲлӢӨ. мҲҳм •: мӢ к·ң
      `Recommendation.profile` мҠ¬лЎҜ + кіөмҡ© render н—¬нҚјлЎң лІҲл“Өмқ„
      л ҢлҚ”лҹ¬к№Ңм§Җ м „лӢ¬н•ҳкі , unit + integration н…ҢмҠӨнҠёлЎң end-to-end
      кі„м•Ҫмқ„ кі м •н•ңлӢӨ.
    decision: >
      (1) src/domain/recommendation.rs: add
      `pub profile: Option<ProviderProfile>` as a new field on
      Recommendation (default None for non-profile rules; Some(_)
      only when the rec recommends a bundle).
      (2) Thread `profile: None` through every existing
