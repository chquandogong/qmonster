    decision: >
      Stratified store layer (paths → audit/sqlite → archive_fs →
      snapshots → retention). SqliteAuditSink implements EventSink and
      accepts only AuditEvent — the DB schema has no raw-bytes column,
      so the r2 type-level rule survives at the storage boundary too.
      ArchiveWriter lives in a separate module and is the only place in
      the crate that writes raw pane bytes to disk. policy::Engine now
      emits RequestedEffect::ArchiveLocal on log_storm; deliver_effects
      dispatches via the existing EffectPermits matrix, so observe_only
      config still blocks archive writes. Version drift uses
      serde_json to round-trip ~/.qmonster/versions.json across
