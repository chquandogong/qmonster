  - change_id: "bullet-hanging-indent"
    semantic_version: "1.10.8"
    change_sequence: 43
    date: "2026-04-23"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator έΑΦ follow-up on v1.10.7: 'bullet LineΈΠΕ ΈΥνΉΩυΉΥ░Ά╕░ ΊΧ┤Ήνα' έΑΦ the shallow 4-space bullet indent wasn't nested enough visually)"
    change_type: "ux-polish"
    motivation_type: "operator-driven"
    persistence: "permanent"
    intent: >
      Close the operator's follow-up on v1.10.7: the bullet rows
      were indented to col 4, which visually read as only a
      two-column shift from the summary row at col 2 έΑΦ not a
      clear nest. Move the bullets to a proper hanging-indent
      under the value column of the summary row.
    intent_ko: >
      v1.10.7 follow-up ΈπΙΆ░Ρ: bullet ΊΨΚΉζ┤ col 4Έκε ΈΥνΉΩυΉΥ░Ά╕░ΈΡαΉΨ┤
      summary ΊΨΚ(col 2)Έ│┤ΈΜν Ά│ιΉηΣ 2Ή╣╕ Ήζ┤ΈΠβΊΧε Ά▓ΔΉε╝Έκε Ήζ╜Ίηα έΑΦ
      ΉΜεΆ░ΒΉιΒ ΉνΣΉ▓σΉζ┤ ΉΧ╜ΊΧρ. Summary ΊΨΚ value Ή╗υΈθ╝ ΉΧΕΈηαΈκε hanging
      indentΉΜεΉ╝ε ΈςΖΊβΧΊΧαΆ▓Ν ΉνΣΉ▓σΉΜεΊΓρΈΜν.
    decision: >
      `HELP_CONTINUATION_PREFIX` deepened from 4 spaces to 20
      spaces before the `┬╖ ` marker. This places the `┬╖` at
      column 20 (same column as the `:` of the summary row,
      since HELP_DETAIL_INDENT(2) + HELP_LABEL_WIDTH(18) = 20)
      and the bullet text then starts at column 22 έΑΦ the value
      column of the summary row. Result: bullets hang directly
      under the value of the `p` entry in standard hanging-
      indent style. A new unit test
      `help_continuation_prefix_hangs_bullet_under_value_column`
      computes the expected column offset from
      `HELP_DETAIL_INDENT + HELP_LABEL_WIDTH + ": "` and asserts
      (a) the prefix consumes exactly that many chars before the
      bullet text begins and (b) the `┬╖` sits at the col-20
      bullet position. Any future change to
      `HELP_DETAIL_INDENT` / `HELP_LABEL_WIDTH` /
      `HELP_CONTINUATION_PREFIX` that breaks the alignment fails
      here before shipping. No content change έΑΦ the three
      audit-chain bullets (Execute / AutoSendOff / observe_only)
      and the `p` summary text are unchanged.
      Post-commit git operation: create annotated tag `v1.10.8`
      at HEAD and push. Build.rs re-runs on the new tag
      (rerun-if-changed on `.git/HEAD` + currently-checked-out
      ref), so a fresh build renders `v1.10.8` in the footer.
    decision_ko: >
      `HELP_CONTINUATION_PREFIX`Έξ╝ 4-spaceΉΩΡΉΕε 20-space + `┬╖ `Έκε
      Έ│ΑΆ▓╜. `┬╖` ΈπΙΉ╗νΆ░Α col 20(HELP_DETAIL_INDENT(2) +
      HELP_LABEL_WIDTH(18))ΉΩΡ ΉεΕΉ╣α έΑΦ summary ΊΨΚΉζα `:`ΉβΑ Ά░βΉζΑ col.
      Bullet ΊΖΞΉΛνΊΛ╕ΈΛΦ col 22Έ╢ΑΊΕ░ ΉΜεΉηΣΊΧ┤ summary value column ΉΧΕΈηαΈκε
      hanging indent ΉιΧΈιυ. ΉΔΙ ΉειΈΜδ ΊΖΝΉΛνΊΛ╕
      `help_continuation_prefix_hangs_bullet_under_value_column`Ήζ┤
      `HELP_DETAIL_INDENT + HELP_LABEL_WIDTH + ": "`ΉΩΡΉΕε Ά╕░ΈΝΑ
      column offsetΉζΕ Ά│ΕΉΓ░ΊΧ┤ (a) prefixΆ░Α ΉιΧΊβΧΊηΙ Ά╖╕ Ά╕╕Ήζ┤ΈπΝΊΒ╝Ήζα
      charsΈξ╝ ΉΗΝΈ╣Ε, (b) `┬╖`Ά░Α col 20Ήζα bullet positionΉΩΡ ΉεΕΉ╣αΊΧρΉζΕ
      Ά▓ΑΉοζ. ΊΨξΊδΕ ΉΔΒΉΙα Έ│ΑΆ▓╜Ήζ┤ ΉιΧΈιυΉζΕ Ά╣ρΊΛ╕ΈουΈσ┤ ΉΩυΆ╕░ΉΕε Έρ╝ΉιΑ fail.
      ΈΓ┤ΉγσΉζΑ Έ╢ΙΈ│Α έΑΦ 3Ά░ε audit-chain bullet(Execute / AutoSendOff /
      observe_only) + `p` summary ΈςρΈΣΡ ΉειΉπΑ.
      Post-commit: HEADΉΩΡ annotated tag `v1.10.8` Έ╢ΑΉ░σ + push.
      build.rsΉζα rerun-if-changedΆ░Α tag Έ│ΑΆ▓╜ΉζΕ Ά░ΡΉπΑΊΧ┤ ΉηυΈ╣ΝΈΥε ΉΜε
      footerΆ░Α `v1.10.8`Έκε ΈιΝΈΞΦΈΡρ.
    triggered_by: "Operator feedback on v1.10.7: 'ΈΕν, bullet LineΈΠΕ ΈΥνΉΩυΉΥ░Ά╕░ ΊΧ┤Ήνα'"
