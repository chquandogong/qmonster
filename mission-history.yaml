  - change_id: "qmonster-v1.15.19-settings-overlay-close-button"
    semantic_version: "1.15.19"
    change_sequence: 75
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
