  - change_id: "v1.15.8-s3-3-gemini-quota-pressure"
    semantic_version: "1.15.8"
    change_sequence: 64
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "feature"
    motivation_type: "backlog-resolution"
    persistence: "permanent"
    intent: >
      Close Slice 3 backlog item S3-3 (partial ‚ÄĒ `quota` column).
      Gemini's status table carries `quota` and `context` as
      distinct columns; v1.15.0 surfaced `context` as
      SignalSet.context_pressure but quota only triggered LimitHit
      at 100%. v1.15.8 surfaces the gradient (e.g. `47% used`) so
      the operator sees quota pressure approaching the limit, not
      only after it hits.
    decision: >
      Add a new `SignalSet.quota_pressure: Option<MetricValue<f32>>`
      field, parallel to `context_pressure` but Gemini-specific.
      `gemini_status_from_columns` now matches the `quota` header
      label and parses the value with the existing `parse_used_percent`
      helper. The Gemini adapter's parse() populates
      `set.quota_pressure` from the validated status table. The
      pre-existing 100%-only LimitHit detection (Gemini idle-state
      classifier) carries forward unchanged. UI: `primary_metric_row`
      and `metric_row` add a `QUOTA Y%` badge between `CTX` and
      `TOKENS`, sharing CTX's severity coloring (>=85% Risk, >=75%
      Warning, >=60% Concern).
    triggered_by: "Slice 3 backlog S3-3 (.docs/claude/Qmonster-v0.4.0-2026-04-25-claude-slice-3-backlog.md)."
    issue_or_context: >
      The Gemini v0.39 status table parses six observable columns
      (branch, sandbox, /model, workspace, context, quota) but only
