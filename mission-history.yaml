  - change_id: "v1.15.2-pane-state-change-visibility"
    semantic_version: "1.15.2"
    change_sequence: 58
    date: "2026-04-25"
    author: "Codex (codex:review, GPT-5)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) вҖ” UX request: make state changes immediately recognizable in panes"
    change_type: "patch"
    motivation_type: "operator-ux-finding"
    persistence: "permanent"
    intent: >
      Make pane state transitions visible at the moment they happen, not
      only after the operator notices a changed label. The operator asked
      for a flashing state row and invited better alternatives; the patch
      implements a short transition cue instead of continuous flashing.
    decision: >
      Track the last observed `idle_state` per pane in the main TUI loop
      and record a temporary `PaneStateFlash` when the value changes.
      Render active flashes for about 3 seconds with a `CHANGED` badge
      and pulse highlight on both the pane header and `state` row. When a
      pane returns to active (`idle_state: None`), render a temporary
      `state: в–¶ ACTIVE CHANGED` row, then let the state row disappear
      after the flash expires.
    triggered_by: "Operator request on 2026-04-25: state changes should be noticeable, e.g. by flashing the state row."
    issue_or_context: >
      The existing `state` row accurately reflected the current pane
      idle/limit/wait state, but an operator watching several panes could
      miss a transition, especially the return from a halted state back
      to active because the row vanished immediately.
    changes:
      added:
        - "src/ui/panels.rs::PaneStateFlash + PaneStateFlashView"
        - "src/main.rs::update_pane_state_flashes in-memory transition tracker"
        - "UI render path for `CHANGED` badge, pulse style, and temporary `в–¶ ACTIVE` state row"
        - "4 regression tests covering idle transition flash, active-return flash, flash expiry, and main-loop tracker state"
      modified:
