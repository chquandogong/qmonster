  - change_id: "qmonster-v1.15.19-settings-overlay-close-button"
    semantic_version: "1.15.19"
    change_sequence: 75
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) βÄî 'λÉàκΓ€ λΕîξΑÄκê€ λΑΫλ½êκè³ [x]κΞΦ λΕîξΑÄμï‰λ½§, κßàλöΑλäΛκΓ€ λΔÖκΘ¨μï† λà‰ λûàκè³κΓù μï¥λΛ‰'"
    change_type: "polish"
    motivation_type: "operator-ergonomics"
    persistence: "permanent"
    intent: >
      The v1.15.18 settings overlay was keyboard-only, while every other
      modal in the dashboard (help, git, target picker) carries a
      mouse-clickable `[x]` close button at the top-right. The operator
      asked for parity so the settings modal can also be dismissed with
      a click instead of reaching for `Esc` / `q`.
    decision: >
      Render `[x]` at the top-right of the settings modal body using
      the same 3-wide Ο½ 1-tall hit-test rectangle the help / git /
      target overlays use, and add a click handler in the main event
      loop's mouse path that closes the overlay when a left-click lands
      on that rectangle. The hit-test rect is exposed as a pure helper
      (`settings_close_button_rect(body)`) so the click handler in
      main.rs and the renderer in `render_settings_modal` agree on the
      same rectangle. Other mouse events while the overlay is open are
      still swallowed (no scroll, no click-through to the dashboard
      underneath) βÄî only the close-button click does anything.
    triggered_by: "Operator instruction (2026-04-25): 'λÉàκΓ€ λΕîξΑÄκê€ λΑΫλ½êκè³ [x]κΞΦ λΕîξΑÄμï‰λ½§, κßàλöΑλäΛκΓ€ λΔÖκΘ¨μï† λà‰ λûàκè³κΓù μï¥λΛ‰'."
    issue_or_context: >
      Mouse parity with the existing modals is not just cosmetic βÄî it
      removes a class of friction where the operator has the cursor
      hovering the modal but has to switch to keyboard input to dismiss
      it. Matching the help / git / target pattern keeps the dashboard
      dismissal contract uniform across overlays.
    changes:
