  - change_id: "phase-4-p4-4-remediation-codex-spec-compliance"
    semantic_version: "1.8.5"
    change_sequence: 21
    date: "2026-04-21"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "Codex (codex:1:review, v1.8.4 P4-4 review — flagged both findings closed by this round)"
      - "Gemini (gemini:1:research, v1.8.4 P4-4 review via local CLI headless run — confirmed the commit_attribution risk independently)"
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "fix"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close both reviewer findings raised in parallel against v1.8.4
      P4-4: (a) Codex + Gemini both flagged as risk that
      `commit_attribution = "false"` contradicts the Codex config
      spec — the key is a string and disabling means an empty
      string, NOT the literal "false" which would parse as truthy
      and wrongly include "false" as attribution text in commits.
      (b) Codex flagged as warning that `tool_output_token_limit =
      30000`'s ProviderOfficial authority label is too strong —
      Codex docs describe the key but the sample config shows 12000,
      so 30000 is Qmonster's parity choice with Claude's
      BASH_MAX_OUTPUT_LENGTH bound, not a Codex-doc canonical
      default. Gemini considered (b) acceptable parity (non-blocker)
      but fixing it aligns authority labels with actual source
      honesty — same principle that drove the v1.8.1
      ProjectCanonical-vs-ProviderOfficial bundle-vs-lever split.
    intent_ko: >
      v1.8.4 P4-4에 대해 Codex + Gemini가 병렬로 제기한 두 reviewer
      finding을 닫는다. (a) `commit_attribution = "false"`가 Codex
      config spec과 맞지 않는다는 지적 — 이 키는 문자열이고
      비활성화는 빈 문자열("")이다. 리터럴 "false"는 truthy 문자열로
      파싱되어 실제로 "false"가 attribution 텍스트로 커밋에
      포함되는 반대 동작을 일으킴. Codex + Gemini 모두 risk로 분류.
      (b) `tool_output_token_limit = 30000`의 ProviderOfficial
      label이 과하다는 Codex 지적 — Codex 문서는 키를 기술할 뿐이며
      샘플 설정의 12000은 예시일 뿐 canonical default로 못박지 않음.
      30000은 Qmonster가 Claude BASH_MAX_OUTPUT_LENGTH와 parity를
      맞춘 선택이므로 ProjectCanonical이 정직한 label. Gemini는
      허용 가능한 parity choice로 보고 blocker는 아님으로 판정했으나
      수정은 권장.
    decision: >
      (1) src/policy/rules/profiles.rs::codex_default_profile: fix
      the two lever entries.
        - `commit_attribution`: `value: "false"` → `value: ""` (empty
          string). Citation updated to: "Codex docs — settings
          surface, commit_attribution is a string; empty string
          disables marketing attribution in git commits". source_kind
          stays `ProviderOfficial` (the key IS documented; only the
          value was wrong).
        - `tool_output_token_limit`: `source_kind: ProviderOfficial`
          → `source_kind: ProjectCanonical`. Citation updated to:
          "Codex docs describe the key (no canonical default —
          sample shows 12000 as example); Qmonster picks 30000 for
          cross-provider parity with Claude's BASH_MAX_OUTPUT_LENGTH
          bound". value 30000 unchanged (the parity choice is the
          intended behavior).
      (2) The other lever (`web_search = cached`) is unchanged.
      (3) src/policy/rules/profiles.rs test update: rename
      `recommend_codex_default_fires_with_provider_official_levers_on_healthy_codex_main`
      → `_fires_with_honest_authority_labels_on_healthy_codex_main`.
      Replace the old universal loop that asserted every lever as
      ProviderOfficial with explicit per-lever value + source_kind
      assertions. The regression Codex + Gemini caught
      (`commit_attribution = "false"`) would fail the new test.
      Also locks the exact ProjectCanonical label on
      `tool_output_token_limit` and the empty-string value on
      `commit_attribution` with clear failure messages citing the
      originating Codex finding numbers.
      (4) The other two P4-4 tests (non-Codex provider suppression,
      quota_tight suppression) are unchanged — their assertions are
      still accurate after the value/label corrections.
    decision_ko: >
      (1) codex_default_profile의 두 lever 항목 수정.
        - `commit_attribution`: `value: "false"` → `value: ""` (빈
          문자열). citation을 "Codex docs — commit_attribution은
          문자열이며 빈 문자열이 marketing attribution을 비활성화"
          로 갱신. source_kind는 ProviderOfficial 유지 (키 자체는
          문서화되어 있음; 값만 잘못됐었음).
        - `tool_output_token_limit`: `source_kind: ProviderOfficial`
          → `source_kind: ProjectCanonical`. citation을 "Codex docs
