        - "mission.yaml — version 1.8.1 → 1.8.2; title replaced (remediation → P4-2 shipped); new v1.8.2 goal paragraph; 3 new done_when entries for P4-2; execution_hints.topology + suggested_approach updated; lineage total_revisions 17 → 18"
