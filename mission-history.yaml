      `CLAUDE_AGENT_SDK_DISABLE_BUILTIN_AGENTS=1`) with per-lever
      citation + `side_effects: Vec<String>` populated 1:1 with the
      lever list (G-6). The three high-risk env vars live ONLY in
      this profile; `claude_default_profile` is guaranteed not to
      contain them.
      (3) src/ui/panels.rs: `format_profile_lines` extended to emit
      `side_effects (<n>):` header + `- <effect>` entries after the
      lever block whenever `profile.side_effects` is non-empty; the
      section is omitted for empty lists so `claude-default` stays
      visually compact.
