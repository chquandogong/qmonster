  - change_id: "phase-3a-gate-remediation"
    semantic_version: "1.6.1"
    change_sequence: 8
    date: "2026-04-21"
    author: "Claude Code (claude:1:main, Sonnet 4.6)"
    contributors:
      - "Codex (codex:1:review, Phase-3A gate-open cross-check)"
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "fix"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close all three Codex Phase-3A findings (all warnings) so the
      Phase-3B gate can open without contract regressions. Finding #1:
      Notify dispatch leaked Concern-severity recs when a Warning rec
      co-existed. Finding #2: alert_event used AlertFired for every rec
      regardless of severity. Finding #3: canonical docs described the
      G-11 concurrent-work rule in terms of a stricter trigger (same file
      or git branch) that was not yet shipped, while the actual
      implementation uses a same-current_path proxy.
    intent_ko: >
      Codex Phase-3A ΉπΑΉιΒ 3Ά▒┤(ΈςρΈΣΡ warning)ΉζΕ ΈΜτΆ│ι Phase-3B Ά▓ΝΉζ┤ΊΛ╕Έξ╝ ΉΩ┤
      ΉΙα ΉηΙΆ▓Ν ΉιΧΈουΊΧεΈΜν. ΉπΑΉιΒ #1: Warning recΆ░Α ΊΧρΆ╗α ΉηΙΉζΕ ΈΧΝ dispatch_notify
      Ά░Α Concern-severity recΉΩΡΈΠΕ ΉΧΝΈο╝ΉζΕ Έ│┤ΈΓ┤ΈΛΦ ΈΙΕΉ╢ε. ΉπΑΉιΒ #2: alert_event
      Ά░Α severityΉΩΡ Έυ┤Ά┤ΑΊΧαΆ▓Ν AlertFiredΈξ╝ ΉΓυΉγσ. ΉπΑΉιΒ #3: canonical Έυ╕ΉΕεΆ░Α
      ΉΜνΉιε Ά╡υΊαΕ(same-current_path ΊΦΕΈκζΉΜε)Ήζ┤ ΉΧΕΈΜΝ Έψ╕Έηα Ά│ΕΊγΞ(same file/git
      branch)Ήε╝Έκε G-11 Ά╖εΉ╣βΉζΕ ΉΕνΈςΖ.
    decision: >
      (1) dispatch_notify now filters recs by r.severity >= Severity::Warning
      before calling the rate limiter and notifier έΑΦ Concern-severity recs
      no longer reach the desktop backend even when the Notify effect was
      requested by the engine due to a co-existing Warning rec. Regression
      test: dispatch_notify_filters_concern_when_warning_coexists.
      (2) alert_event splits AuditEventKind: AlertFired for >= Warning,
      RecommendationEmitted for < Warning (Concern/Good/Safe). The unused
      RecommendationEmitted write-site is now exercised. Two regression
      tests: concern_severity_rec_audit_logged_as_recommendation_emitted
      + warning_severity_rec_audit_logged_as_alert_fired. CaptureSink
      helper added to integration test file so audit events can be
      inspected without downcasting Box<dyn EventSink>.
      (3) VALIDATION.md:95-99 and ARCHITECTURE.md:272-274 rewritten to
      reflect the shipped same-current_path proxy and correctly defer
      file-level / git-branch-level detection to Phase 3B / Phase 4+.
      No source changes to concurrent.rs έΑΦ its inline docstring already
      acknowledged the proxy.
    decision_ko: >
      (1) dispatch_notifyΆ░Α rate limiter / notifier Ία╕Ή╢ε ΉιΕΉΩΡ r.severity >=
      Severity::WarningΉε╝Έκε recΉζΕ ΊΧΕΊΕ░ΈπΒ έΑΦ engineΉζ┤ Warning recΈκε Ήζ╕ΊΧ┤
      Notify effectΈξ╝ Έ░εΊΨΚΊΧ┤ΈΠΕ Concern recΆ░Α desktop backendΉΩΡ ΈΠΕΈΜυΊΧαΉπΑ
      ΉΧΛΉζΝ. ΊγΝΆ╖Α ΊΖΝΉΛνΊΛ╕: dispatch_notify_filters_concern_when_warning_coexists.
      (2) alert_eventΆ░Α AuditEventKindΈξ╝ Έ╢ΕΈου: Warning Ήζ┤ΉΔΒΉζΑ AlertFired,
      Warning Έψ╕ΈπΝ(Concern/Good/Safe)ΉζΑ RecommendationEmitted. Έψ╕ΉΓυΉγσ
      write-siteΉαΑΈΞα RecommendationEmittedΆ░Α Ήζ┤Ήιε ΉΜνΊΨΚΈΡρ. ΊγΝΆ╖Α ΊΖΝΉΛνΊΛ╕ 2Ά▒┤:
      concern_severity_rec_audit_logged_as_recommendation_emitted,
      warning_severity_rec_audit_logged_as_alert_fired. Box<dyn EventSink>
      downcasting ΉΩΗΉζ┤ audit event Ά▓ΑΉΓυΈξ╝ ΉεΕΊΧ┤ CaptureSink ΊΩυΊΞ╝ Ή╢ΦΆ░Α.
      (3) VALIDATION.md:95-99, ARCHITECTURE.md:272-274Έξ╝ Ή╢εΉΜεΈΡε
      same-current_path ΊΦΕΈκζΉΜεΈκε ΉηυΉηΣΉΕ▒, ΊΝΝΉζ╝ ΉΙαΉνΑ/git-branch ΉΙαΉνΑ
      Ά░ΡΉπΑΈΛΦ Phase 3B / Phase 4+Έκε ΉιΧΊβΧΊηΙ ΉΩ░Ά╕░. concurrent.rsΉζα Ήζ╕Έζ╝Ήζ╕
      docstringΉζΑ Ήζ┤Έψ╕ ΊΦΕΈκζΉΜεΈξ╝ Ήζ╕ΉιΧΊΧ┤ ΉΙαΉιΧ Έ╢ΙΊΧΕΉγΦ.
    triggered_by: "Codex Phase-3A gate-open review (three warning findings)"
    issue_or_context: >
      Phase 3A (v1.6.0) shipped with the Notify severity gate at the
      engine level but not at the dispatch level; the audit log used a
      single AlertFired kind for all severities; and the canonical docs
      still described the G-11 rule as requiring same file or git branch
      when the implementation uses same current_path. All three are
      contract-level regressions caught by the Codex gate review.
    changes:
      modified:
        - "src/app/event_loop.rs: dispatch_notify adds .filter(|r| r.severity >= Severity::Warning)"
        - "src/app/event_loop.rs: alert_event splits AlertFired vs RecommendationEmitted by severity"
        - "docs/ai/VALIDATION.md: concurrent-work line (95-99) updated to reflect same-current_path proxy + Phase 3B/4+ deferral"
        - "docs/ai/ARCHITECTURE.md: concurrent-work line (272-274) updated to reflect same-current_path proxy"
      added:
        - "tests/event_loop_integration.rs: dispatch_notify_filters_concern_when_warning_coexists (Codex #1 regression)"
        - "tests/event_loop_integration.rs: concern_severity_rec_audit_logged_as_recommendation_emitted (Codex #2 regression)"
        - "tests/event_loop_integration.rs: warning_severity_rec_audit_logged_as_alert_fired (Codex #2 regression)"
        - "tests/event_loop_integration.rs: CaptureSink helper (Arc<Mutex<Vec<AuditEvent>>> + EventSink impl)"
      removed: []
    changed_sections:
      - "dispatch_notify body (+ severity filter)"
      - "alert_event body (+ severity split for audit kind)"
      - "VALIDATION.md Phase 3 concurrent-work bullet"
      - "ARCHITECTURE.md Deferred for later phases concurrent-work bullet"
    done_when_delta:
      added:
        - "Phase 3A remediation v1.6.1: dispatch_notify filters by Severity >= Warning (Codex #1 closed)."
        - "Phase 3A remediation v1.6.1: alert_event splits AlertFired (>= Warning) vs RecommendationEmitted (< Warning) by severity (Codex #2 closed)."
        - "Phase 3A remediation v1.6.1: canonical docs (VALIDATION.md, ARCHITECTURE.md) acknowledge the shipped same-current_path G-11 proxy (Codex #3 closed)."
      modified: []
      removed: []
    impact_scope:
      code: "~120 LOC added (3 integration tests + CaptureSink helper); ~10 LOC modified (dispatch_notify + alert_event)"
      tests: "152 lib + 15 integration (up from 152 lib + 12 integration)"
      clippy: "--all-targets -D warnings clean"
      runtime: "Notify behavior now strictly filtered at dispatch level too; Concern-severity audit events now use RecommendationEmitted kind"
      docs: "VALIDATION.md + ARCHITECTURE.md concurrent-work bullets corrected; mission.yaml + mission-history.yaml + .mission/CURRENT_STATE.md updated"
    breaking: false
    risk: "low έΑΦ additive regression tests; behavior narrowed further toward spec; no Phase-3A non-negotiable relaxed"
    related_commits: []
    related_decisions:
      - "KD-006"
      - "KD-007"
