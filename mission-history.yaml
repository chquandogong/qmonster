      cumulative-vs-delta token semantics) by verifying the
      semantics directly against the bundled Codex binary, exposing
      the already-extracted input/output tokens on SignalSet, and
      documenting the operator-configurability of provider status
      surfaces (`/statusline` and `/footer`) so future-state
      decisions about parser robustness have explicit references.
    decision: >
      Operator-directed verification: inspected the
      `/usr/lib/.../codex/codex` binary for `/statusline` references
      and the `/usr/lib/.../gemini-cli/.../chunk-HF7X35D3.js` for
      `/footer` definition. Findings: Codex `/statusline` is a
      built-in slash command "Configure which items appear in the
      status line" with item ids `branch`, `model`, `input`,
      `output`, `version`, etc. Codex's `TokenUsage` struct fields
      (`input_tokens`, `cached_input_tokens`, `output_tokens`,
      `reasoning_output_tokens`, `total_tokens`) are session
      cumulative вҖ” confirming the `1.51M in В· 20.4K out` tokens are
      cumulative, not deltas. Gemini `/footer` (alias `/statusline`)
      is built-in with description "Configure which items appear in
      the footer (statusline)" вҖ” opens the FooterConfigDialog;
      footer items are toggled via `ui.footer.*` settings. Both
      surfaces are operator-configurable; Qmonster respects
      `None`-on-absent-field instead of inferring (S3-4 honesty
      principle generalised). Implementation: SignalSet gains
      `pub input_tokens: Option<MetricValue<u64>>` and `pub
      output_tokens: Option<MetricValue<u64>>` (already extracted by
      the parser for cost_usd derivation; this round just exposes
