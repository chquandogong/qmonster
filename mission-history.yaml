      source_kinds (same v1.8.6 pattern as the other five profile
      recs): 'apply 3 levers for a quota-tight scripted Gemini
      session — 0 ProviderOfficial + 3 ProjectCanonical, with 3
      operator-visible side effects (see list below)'.
      (5) No renderer change — existing `format_profile_lines`
      helper handles the new rec transitively (Gemini G-6 side_
      effects section emits the same way Claude + Codex
      aggressive variants render).
      (6) Four new unit tests in `policy/rules/profiles.rs`:
        - Shape: 3 levers + 3 side_effects, 0 PO + 3 PC, Good
          severity, ProjectCanonical source, derived-from-data
          reason citing ProjectCanonical, per-lever exact value +
          source_kind assertions, AND an explicit G-5 cross-
          reference check on the save_memory side_effect string
          (locks architectural principle consistency at the test
          layer across all three aggressive variants).
        - Gate-off: suppressed when !quota_tight; gemini-default
          fires instead.
        - Provider-gate suppression: gemini-script-low-token does
          NOT fire on Claude or Codex panes under quota_tight;
          claude-script-low-token / codex-script-low-token fire
          instead on their respective panes (sanity check for
          three-way symmetric provider gating).
        - Mutual exclusion: toggle quota_tight on a Gemini main
          pane and assert exactly one of the two Gemini profiles
          fires per configuration (mirrors the Claude and Codex
          pair tests).
    decision_ko: >
      (1) src/policy/rules/profiles.rs에 신규
      `recommend_gemini_script_low_token` 규칙. `eval_profiles`
      dispatcher가 이제 6개 rule 순차 호출 — provider × quota_
      tight 2축으로 pane당 최대 1개 profile.
      (2) `gemini_script_low_token_profile()` 생성자가 3 lever
      번들(모두 ProjectCanonical): `--yolo = enabled` (baseline의
