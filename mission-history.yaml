  - change_id: "v1.15.15-cost-badge-severity-coloring"
    semantic_version: "1.15.15"
    change_sequence: 71
    date: "2026-04-27"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) вАФ autonomous follow-up authorisation"
    change_type: "patch"
    motivation_type: "ui-consistency"
    persistence: "permanent"
    intent: >
      Pair the v1.15.14 cost_pressure_* advisory thresholds with a
      severity-tinted COST badge so the pane card visually mirrors
      what the alert queue is about to surface. Before this patch,
      the COST badge stayed neutral-colored regardless of the spend
      level, while CTX and QUOTA already used severity coloring; the
      inconsistency made it harder to scan a row of panes for
      cost-runaway risk.
    decision: >
      Add `cost_metric_severity(value: f64) -> Severity` in
      `src/ui/panels.rs` mirroring `context_metric_severity` /
      `quota_metric_severity` patterns. Thresholds:
      `>= $20.00` вЖТ Risk (matches `cost_pressure_critical`);
      `>= $5.00` вЖТ Warning (matches `cost_pressure_warning`);
      `>= $2.00` вЖТ Concern (early visual cue before any advisory
      fires); else Good. The Concern band starts the tint earlier
      than the advisory rule pair so operators see cost climbing
      visually before a recommendation lands in the alert queue.
      `primary_metric_row` swaps `theme::label_style()` for
      `theme::severity_badge_style(cost_metric_severity(value))`
      on the COST badge вАФ same call shape as CTX and QUOTA.
    triggered_by: "Operator instruction (2026-04-27): autonomous follow-up authorised. Selected cost-badge severity coloring as the natural UI polish that pairs with v1.15.14's cost_pressure_* advisories."
    issue_or_context: >
      v1.15.14 added cost_pressure_warning / cost_pressure_critical
      to the alert queue but the pane-card COST badge stayed
      neutral-colored regardless of value. This created an
      inconsistency: CTX and QUOTA badges are severity-tinted, but
