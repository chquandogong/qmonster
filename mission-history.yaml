      - "ui::dashboard tests έΑΦ new help_continuation_prefix_hangs_bullet_under_value_column locks the prefix column math against drift"
      - "mission.yaml / mission-history.yaml έΑΦ v1.10.8 narrative + change_sequence 43 + meta bump"
