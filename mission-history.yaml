      constructing the string inline.
      (2) Extend `help_lines()` with two new detail lines — a
      `p` entry that names the PromptSendAccepted → Completed /
      Failed audit chain plus the PromptSendBlocked branches,
      and a `d` entry that names the PromptSendRejected audit
      kind. The entries sit between the existing `c` (clear
      notices) and `Esc / ?` (close help) rows so the
      single-letter keys stay grouped in the overlay.
      (3) Add two unit tests — `footer_text_advertises_prompt_
      send_keys` pins the footer token layout, and
      `help_overlay_documents_p_and_d_prompt_send_actions`
      parses each help line on the first `:` and asserts the
      `p` entry mentions `PromptSendAccepted` + `PromptSendBlocked`
      while the `d` entry mentions `PromptSendRejected`. The
      audit-kind name assertions turn any future kind rename
      into a test failure here before it drifts through the
      ledger.
    decision_ko: >
      `src/ui/dashboard.rs` 한 파일만 건드림:
      (1) footer 텍스트를 pure helper `footer_text(focus: &str)
      -> String`로 추출 — 버퍼 없이 advertised 키 리스트를
      단위 테스트 가능. `p accept · d dismiss` 토큰을 기존
      `t target`과 `? help` 사이에 삽입. `render_footer`는 이제
      `footer_text(focus)`를 호출.
      (2) `help_lines()`에 2개 엔트리 추가 — `p` 항목은
      PromptSendAccepted → Completed / Failed 감사 체인 +
      PromptSendBlocked 분기를 명시하고, `d` 항목은
      PromptSendRejected 감사 kind를 명시. 위치는 기존 `c`
      (clear notices)와 `Esc / ?` (close help) 사이 — 단일 문자
      키들이 overlay에서 그룹을 이루도록.
      (3) 2개 단위 테스트 추가 — `footer_text_advertises_
      prompt_send_keys`가 footer 토큰 레이아웃을 고정하고,
