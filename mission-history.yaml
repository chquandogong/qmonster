      land the domain types + allow-list plumbing first, then grow the
      actual user-facing actuation and the first producing rule in
      later slices (P5-2+). This keeps the first Phase-5 commit
      auditable and reversible while establishing the data-shape
      contract reviewers can validate.
    intent_ko: >
      Phase 5 (Safer Actuation)л•Љ type-layer м†ДмЪ© TDD мК§мЇРнПілФ© мКђлЭЉмЭімК§л°Ь
