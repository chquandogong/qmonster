        - "src/main.rs::runtime_refresh_commands now uses provider-owned command lists"
        - "src/main.rs::runtime_refresh_sends_one_command_at_a_time cycles both Claude and Gemini"
        - "src/main.rs::runtime_refresh_sends_escape_first is Claude-only"
        - "src/main.rs runtime-refresh tests updated for Claude `/status` вЖТ `/usage` вЖТ `/stats` and Gemini stats-source cycling"
        - "README.md + docs/ai/{ARCHITECTURE,PROJECT_BRIEF,UI_MANUAL,VALIDATION}.md (runtime-refresh cycling contract and 438-test evidence)"
        - "mission.yaml + mission-history.yaml (v1.15.5 ledger sync)"
