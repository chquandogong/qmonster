      `codex` / `gemini` words. Real Claude Code working-state
      titles begin with a single braille spinner glyph followed by
      activity text; real Gemini idle titles use a diamond glyph and
      a `Ready (project-name)` form. Neither carries a provider word,
      so the resolver fell through to `pane_current_command`, found
      `node` (the executable running both Claude Code and Gemini
