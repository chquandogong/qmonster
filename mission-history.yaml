      (3) src/policy/rules/mod.rs: `pub mod profiles;` м¶”к°Җ.
      (4) src/domain/mod.rs: `pub mod profile;` + re-export.
      (5) src/policy/engine.rs: `Engine::evaluate`к°Җ advisories
      мқҙнӣ„ `eval_profiles(id, signals, gates)`лҘј нҷ•мһҘн•ҙ кё°мЎҙ
