  - change_id: "v1.15.1-runtime-refresh-terminal-submission"
    semantic_version: "1.15.1"
    change_sequence: 57
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) βÄî operator-usage finding + parallel implementation/doc edits"
    change_type: "patch"
    motivation_type: "operator-usage-finding"
    persistence: "permanent"
    intent: >
      Patch the v1.15.0 active-safe runtime refresh to actually deliver
      every Claude command the docs promised. v1.15.0 batched
      `/status` + `/config` + `/stats` + `/usage` with Enter between
      each, but Claude's fullscreen `/status` surface intercepts the
      following keystrokes and discards the rest of the batch, so only
      the first slash command actually ran. The patch (a) cycles the
      Claude full set one command per `u` press while the pane is
      explicitly idle/waiting/limited, (b) switches the tmux send path
      to the terminal submit keystroke (`C-m`) instead of plain Enter
      so the submission is a real terminal carriage-return, and (c)
      keeps Claude active or only heuristically stale on a single
      `/status` (which does not block the prompt). Codex `/status` and
      Gemini `/stats session` + `/stats model` + `/stats tools` paths
      keep the pre-patch behaviour because their surfaces do not block.
    decision: >
      Single-commit patch (`7a09c7e Fix runtime refresh terminal
      submission`) at HEAD, materialised via the operator's parallel
      edits to src/main.rs, src/tmux/polling.rs, and the canonical
      docs. v1.15.0 baseline (active-safe split design, CFX-1+2
      remediation, modes/access/loaded/restrict rows, false-IDLE lag
      fix, Claude usage-limit precedence) carries forward unchanged.
      Confirm re-review skipped βÄî single-surface operator-driven fix
      whose runtime contract change is documented in README /
      ARCHITECTURE / UI_MANUAL / PROJECT_BRIEF and visible from a
      single live-fixture smoke test.
    triggered_by: "Operator usage on v1.15.0 active-safe split (2026-04-25): Claude /status fullscreen surface absorbs the following slash commands of a batched `u` send, leaving the cycle short."
    issue_or_context: >
      v1.15.0's `runtime_refresh_full_commands(Provider::Claude)`
      returned `[/status, /config, /stats, /usage]` and dispatched
      them in a single tmux `send-keys` loop separated by `Enter`.
      In production the first command (`/status`) opens a Claude
      fullscreen surface that consumes subsequent keystrokes for
      navigation, so /config / /stats / /usage never executed. The
      operator surfaced this almost immediately after v1.15.0 tag.
    changes:
      added:
        - "src/main.rs::Claude one-command-per-`u` cycling state + dispatcher (cycles /status βÜ£ /context βÜ£ /config βÜ£ /stats βÜ£ /usage)"
        - "src/main.rs::two new bin tests covering the cycling shape (per-provider, per-press)"
        - "src/tmux/polling.rs::terminal submit (`C-m`) send path replacing plain Enter for the runtime-refresh keystroke"
      modified:
