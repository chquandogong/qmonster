      ΉΕ╕ Ά░ε ProviderOfficial leverΉζα key/value/citationΉζΑ
      `Recommendation` Ήζ┤ΊδΕ `PaneReport`, `--once`, TUI panel ΉΨ┤ΈΦΦΉΩΡΈΠΕ
      ΉΓ┤ΉΧΕΈΓρΉπΑ Ές╗ΊΨΙΈΜν. v1.8.0 ΈιΙΉιΑΆ░Α "ΉΕ╕ Ά░ε lever + citationΉζΕ
      Έυ╢ΈΛΦΈΜν"Ά│ι Ήμ╝ΉηξΊΧε Ά│ΕΉΧ╜Ήζ┤ live pathΉΩΡΉΕε Ά▒░ΉπΥΉζ┤ΉΩΙΈΜν. ΉΙαΉιΧ: ΉΜιΆ╖ε
      `Recommendation.profile` ΉΛυΈκψ + Ά│╡Ήγσ render ΊΩυΊΞ╝Έκε Έ▓ΙΈΥνΉζΕ
