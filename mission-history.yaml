      {pane} Enter` (Enter stays on its own invocation because `-l`
      would literalise it). Add two whitebox tests to pin the
      argument vector layout against future refactors.
      (3) Finding #3 — AutoSendOff terminal audit gap: emit
      PromptSendBlocked immediately after PromptSendAccepted in the
      AutoSendOff branch, so every operator `p` keystroke ends in
      exactly one of the terminal outcome kinds. Broaden the
      PromptSendBlocked doc to cover both fire paths (ObserveOnly
      blocks acceptance; AutoSendOff blocks execution after
      acceptance); summary string names the reason. No new audit
      kind added — existing PromptSendBlocked generalises cleanly,
      which also respects Codex's "keep audit stream lean"
      preference.
    decision_ko: >
      운영자의 option A 선택에 따라 Gemini의 3개 finding을 단일
      커밋에 묶어 처리 (two-commit remediation + archive 분할 대신):
