      `--once` л‘җ кІҪлЎң лӘЁл‘җ лҸҷмқј н—¬нҚј нҳём¶ң. `next: вҖҰ`к°Җ `run: \`вҖҰ\``ліҙлӢӨ
      м•һм„ң л ҢлҚ”л§ҒлҗҳлҸ„лЎқ match-arm мңјлЎң кі м •н•ҳм—¬ мҲңм„ң кі„м•Ҫмқ„ н•„л“ң
      л Ҳмқҙм•„мӣғ м°ЁмӣҗмңјлЎң лӮҙмһ¬нҷ”. (4) н…ҢмҠӨнҠё: unit лӢЁм–ёмқ„
      `contains(вҖҰ)`м—җм„ң `assert_eq!(suggested_command, Some("/compact"))`
      + `next_step.contains("snapshot")`лЎң нғҖмқҙнҠёлӢқ; л ҢлҚ” н—¬нҚјмҡ© unit
      н…ҢмҠӨнҠё 2к°ң мӢ к·ң(`next:`к°Җ `run:`ліҙлӢӨ м•һм„¬ / `next_step`мқҙ Noneмқҙл©ҙ
      `next:` мғқлһө); нҶөн•© н…ҢмҠӨнҠёлҠ” мӢӨм ң Engine::evaluate мӮ°м¶ңл¬јм—җ лҢҖн•ҙ
      `format_strong_rec_body`лҘј нҳём¶ңн•ҳм—¬ end-to-end мҲңм„ң кі„м•Ҫмқ„
      кІҖмҰқ. (5) docs/ai/VALIDATION.mdм—җ `suggested_command`
      (лӢЁмқј-н‘ңл©ҙ мӢӨн–ү к°ҖлҠҘ) мЎ°кұҙ лӘ…мӢң + мӢ к·ң `next_step` н•ӯлӘ© м¶”к°Җ +
      strong rec мІҙнҒ¬нҸ¬мқёнҠё н•ӯлӘ© мһ¬мһ‘м„ұ. policy л Ҳмқҙм–ҙ лҸҷмһ‘ ліҖкІҪ м—ҶмқҢ.
    triggered_by: "Codex v1.7.2 review (`.docs/codex/Qmonster-v0.4.0-2026-04-21-phase3b-strong-rec-review.md` + `.mission/evals/Qmonster-v0.4.0-2026-04-21-phase3b-strong-rec-review.result.yaml`) вҖ” two warning-level findings on field semantics + test strength"
    issue_or_context: >
      v1.7.2 tried to express the snapshot-first precondition by
      overloading suggested_command with mixed-mode prose
      ("# press 's' to snapshot first; then /compact"). Codex flagged
