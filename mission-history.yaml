  - change_id: "qmonster-v1.15.20-phase-a-operational-activation"
    semantic_version: "1.15.20"
    change_sequence: 76
    date: "2026-04-27"
    author: "Codex (codex:1:review)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) ŌĆö requested synthesis of Claude/Codex/Gemini update plans and sequential execution"
    change_type: "feature"
    motivation_type: "operator-activation"
    persistence: "permanent"
    intent: >
      Execute Phase A from the three-model synthesis: activate already
      shipped surfaces before adding new large features. The highest-ROI
      gaps were operational, not architectural: settings overlay save had
      no standard config path in the running process, COST badges had no
      standard pricing template path, and profile recommendations were
      blocked because non-canonical panes resolved as role=Unknown or Low
      confidence.
    decision: >
      Choose the operator defaults directly: `~/.qmonster/config/qmonster.toml`
      is the standard config path; `~/.qmonster/config/pricing.toml` is
      the operator-filled pricing table; non-canonical provider/status
      surfaces may resolve to `Role::Main` at Medium confidence when the
      provider is structurally identified. Security posture advisories are
      deferred as an opt-in Concern rule, and review-tier profiles are
      planned as a later 3x3-grid restoration rather than mixed into this
      activation slice.
    triggered_by: "Operator instruction (2026-04-27): choose the best defaults for the three open decisions, include them in the plan, and proceed sequentially."
    issue_or_context: >
      v1.15.18/v1.15.19 shipped the settings overlay, but the current
      monitor pane was started as `target/release/qmonster` without
      `--config`, so `w` could not persist threshold edits. Likewise,
      `cost_pressure_*` and COST badges were implemented but dormant
      without an operator pricing table. Claude's cross-check also found
      that real non-canonical panes were structurally identifiable but
      role/confidence gates prevented baseline profile recommendations
      from surfacing.
    changes:
      added:
        - "scripts/run-qmonster.sh ŌĆö creates `~/.qmonster/config/qmonster.toml` and `~/.qmonster/config/pricing.toml` from repo templates when missing, then launches Qmonster with `--config`"
        - "src/store/paths.rs::config_dir / config_path / pricing_path helpers; `ensure()` now creates the config directory"
