  - change_id: "v1.15.5-runtime-refresh-cycled-provider-stats"
    semantic_version: "1.15.5"
    change_sequence: 61
    date: "2026-04-25"
    author: "Codex (codex:review, GPT-5)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator) вАФ operator-usage finding: Claude `/status` works; Claude/Gemini runtime sources should rotate on each `u` press"
    change_type: "patch"
    motivation_type: "operator-usage-finding"
    persistence: "permanent"
    intent: >
      Make manual runtime refresh predictable for provider slash
      surfaces that should be inspected one at a time. Claude should
      rotate through `/status`, `/usage`, and `/stats`; Gemini should
      rotate through `/stats session`, `/stats model`, and `/stats
      tools`; Codex remains a single `/status` source. Also preserve a
      Codex observability fallback that reads model/reasoning from the
      startup welcome box before the bottom status line renders.
    decision: >
      Replace the idle-state-dependent Claude command split with a
      provider-owned command list. Claude and Gemini dispatch exactly
      one command per `u` press, with cycle offsets scoped by pane and
      provider. Claude keeps the `/status` capture-then-`Escape` hook
      and receives a defensive pre-command `Escape` to close any prior
      fullscreen runtime surface. Gemini cycles without pre-`Escape`.
      Codex now treats the structural welcome-box `вФВ model:` line as a
      ProviderOfficial model/reasoning source, while prose containing
      `model:` remains ignored.
    triggered_by: "Operator request on 2026-04-25: `/status` now works; cycle Claude `/status`, `/usage`, `/stats` and Gemini `/stats session`, `/stats model`, `/stats tools` on repeated `u` presses."
    issue_or_context: >
      The previous contract still used Claude `/context` and `/config`
      in the idle-only full set, while Gemini dispatched all three
      stats commands in one batch. That did not match the operator's
      desired inspection workflow.
    changes:
      added:
        - "src/main.rs::runtime_refresh_provider_key (pane/provider-scoped cycle offsets)"
        - "src/adapters/codex.rs::parse_codex_welcome_model fallback for Codex welcome-box model/reasoning"
