    change_type: "fix"
    motivation_type: "Phase C C2 control-mode tmux adapter hardening"
    persistence: "permanent"
    intent: >
      Reduce long-running TUI risk for the opt-in control-mode transport by
      recovering from client lifecycle failures without masking real tmux
      command errors.
    intent_ko: >
      opt-in control-mode transportÏùò Ïû•ÏãúÍ∞Ñ TUI Ïã§Ìñâ Î¶¨Ïä§ÌÅ¨Î•º ÎÇÆÏ∂îÍ∏∞ ÏúÑÌï¥,
