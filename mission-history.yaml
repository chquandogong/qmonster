    decision: >
      Single-file patch in `src/ui/dashboard.rs`:
      (1) Help-copy fix — the `p` help_lines entry now
      enumerates three distinct audit outcomes:
        - Execute path (allow_auto_prompt_send=true, non-
          observe_only): `PromptSendAccepted → PromptSendCompleted
          or PromptSendFailed`
