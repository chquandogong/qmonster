    persistence: "permanent"
    intent: >
      Close the three Gemini v1.10.0 confirm findings and archive
      both reviewers' v1.10.0 verdicts in a single combined round.
      All three Gemini fixes tighten rather than broaden the surface
      Codex approved, so Codex's `approve` verdict transports cleanly
      to v1.10.1 without requiring re-execution.
    intent_ko: >
      Gemini v1.10.0 confirmÏùò 3Í∞ú findingÏùÑ Î™®Îëê Îã´Í≥Ý Îëê Î¶¨Î∑∞Ïñ¥Ïùò
      v1.10.0 ÌåêÏÝï(Codex `approve`, Gemini `approve-with-fixes`)ÏùÑ
      Ìïú ÎùºÏö¥ÎìúÎ°ú ÏïÑÏπ¥Ïù¥Î∏å. 3Í∞ú ÏàòÏÝï Î™®Îëê CodexÍ∞Ä ÏäπÏù∏Ìïú ÌëúÎ©¥ÏùÑ
      ÎÑìÌûàÏßÄ ÏïäÍ≥Ý Ï¢ÅÌûàÍ±∞ÎÇò Í∞ïÌôîÌïòÎØÄÎ°ú, Codex `approve` ÌåêÏÝïÏùÄ
      v1.10.1Ïóê Ïû¨Ïã§Ìñâ ÏóÜÏù¥ Í∑∏ÎåÄÎ°ú ÏúÝÏßÄÎêúÎã§.
    decision: >
      Apply all three Gemini findings as a single combined commit
      (operator choice of option A over a two-commit remediation +
      archive split):
      (1) Finding #1 ‚Äî gate abstraction boundary: move PromptSendGate
      enum + check_send_gate function from src/main.rs to
      src/policy/gates.rs; relocate the 5 gate-matrix unit tests
      into the gates module; main.rs now imports via
      `use qmonster::policy::gates::{PromptSendGate, check_send_gate}`.
      (2) Finding #2 ‚Äî tmux argument safety: split
      PollingSource::send_keys into two tmux invocations ‚Äî
      `tmux send-keys -t {pane} -l {text}` (literal mode; `-l`
      forces the payload to be interpreted as text regardless of
      tmux key-name collisions) followed by `tmux send-keys -t
      {pane} Enter` (Enter stays on its own invocation because `-l`
      would literalise it). Add two whitebox tests to pin the
      argument vector layout against future refactors.
      (3) Finding #3 ‚Äî AutoSendOff terminal audit gap: emit
      PromptSendBlocked immediately after PromptSendAccepted in the
      AutoSendOff branch, so every operator `p` keystroke ends in
      exactly one of the terminal outcome kinds. Broaden the
      PromptSendBlocked doc to cover both fire paths (ObserveOnly
      blocks acceptance; AutoSendOff blocks execution after
      acceptance); summary string names the reason. No new audit
      kind added ‚Äî existing PromptSendBlocked generalises cleanly,
      which also respects Codex's "keep audit stream lean"
