    change_type: "reconciliation"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Reconcile Codex r1 cross-check and Gemini r1 research/policy
      review into a final synthesis (r2); apply every approved
      must-fix to canonical docs and the mission envelope before
      Phase 1 implementation begins.
    intent_ko: >
      Codex r1 교차검증과 Gemini r1 조사/정책 리뷰를 r2 최종 종합본으로
      통합하고, Phase 1 구현 착수 이전에 승인된 must-fix를 canonical
      문서와 미션 envelope에 반영한다.
    decision: >
      Accept all 8 Codex must-fixes (1 closed, 1 Phase-1 implementation,
      6 applied now to docs/mission); accept all 4 Codex scope
      reductions (Phase 1 narrowed: no SQLite, no archive persistence,
      no snapshot export, no profile recommender, no A-G policy rules
      beyond basic alerts); adopt SourceKind = ProviderOfficial |
      ProjectCanonical | Heuristic | Estimated; integrate Gemini's
      subagent-detection warning, zombie-pane / re-attach reset, and
      manual version-drift detector into Phase 1; integrate audit-log
      type-level isolation into ARCHITECTURE.md (Phase 2 writer);
      codify the safety-precedence asymmetry and the ~/.qmonster/
      FS-write boundary in mission.yaml constraints.
    decision_ko: >
      Codex의 must-fix 8건을 모두 수용(1건 closed, 1건 Phase-1 구현,
      6건 문서/미션에 즉시 반영), scope reduction 4건 전부 수용하여
      Phase 1을 축소(SQLite/아카이브 영속/스냅샷 내보내기/프로필
