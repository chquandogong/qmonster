  - change_id: "v1.20.0-comment-preserving-settings-save"
    semantic_version: "1.20.0"
    change_sequence: 146
    date: "2026-04-28"
    author: "Claude (Opus 4.7)"
    contributors:
      - "Operator directive: Phase E E2 with proposed defaults"
    change_type: "feature"
    motivation_type: "phase entry"
    persistence: "permanent"
    intent: >
      Open Phase E by replacing the comment-lossy
      `toml::to_string_pretty` settings-save path with a
      `toml_edit::DocumentMut` surgical update so operator-authored
      comments and unrelated config sections survive every overlay
      save.
    intent_ko: >
      Phase EΈξ╝ ΉΩ┤ΉΨ┤, Ήμ╝ΉΕζ ΉΗΡΉΜνΉζ┤ Ήζ╝ΉΨ┤ΈΓαΈΞα
      `toml::to_string_pretty` Ά╕░Έ░α settings save Ά▓╜ΈκεΈξ╝
      `toml_edit::DocumentMut`Ήε╝Έκε surgical Ά░▒ΉΜιΊΧαΈΠΕΈκζ Ά╡ΡΉ▓┤ΊΧαΉΩυ
      Ήγ┤ΉαΒΉηΡ ΉηΣΉΕ▒ Ήμ╝ΉΕζΆ│╝ Έυ┤Ά┤Α ΉΕνΉιΧ ΉΕ╣ΉΖαΉζ┤ Έπν saveΈπΙΈΜν Έ│┤Ήκ┤ΈΡαΈΠΕΈκζ ΊΧεΈΜν.
    decision: >
      Add `toml_edit = "0.22"` to `Cargo.toml`. Add
      `FieldId::toml_path()` returning the dotted TOML path for each
      of the 28 overlay-managed fields. Refactor
      `SettingsOverlay::save()` to (a) read the existing file,
      (b) parse it as `DocumentMut`, (c) update each path whose
      `read_field` returns `Some` (no override έΗΤ leave the section
      default alone), and (d) write the document back. When the file
      does not exist, fall back to the legacy
      `toml::to_string_pretty` scaffold so a fresh operator setup
      keeps the same starting file.
    decision_ko: >
      `Cargo.toml`ΉΩΡ `toml_edit = "0.22"` Ή╢ΦΆ░Α. 28Ά░ε overlay Ά┤ΑΈου
      ΊΧΕΈΥεΈ│ΕΈκε ΉιΡ-Ά▓╜Έκε TOML pathΈξ╝ Έ░αΊβαΊΧαΈΛΦ `FieldId::toml_path()`
      ΈσΦΉΕεΈΥε Ή╢ΦΆ░Α. `SettingsOverlay::save()`Έξ╝ (a) Ά╕░Ήκ┤ ΊΝΝΉζ╝ Ήζ╜Ά│ι
      (b) `DocumentMut`Έκε ΊΝΝΉΜ▒ΊΧε ΈΤν (c) `read_field`Ά░Α `Some`ΉζΕ
      Έ░αΊβαΊΧαΈΛΦ pathΈπΝ Ά░▒ΉΜι(per-provider overrideΆ░Α ΉΩΗΉε╝Έσ┤ defaultΈξ╝
      overrideΈκε Ά▓σΉΔΒΉΜεΊΓνΉπΑ ΉΧΛΉζΝ)ΊΧαΆ│ι (d) Έυ╕ΉΕεΈξ╝ ΈΜνΉΜε ΉΥ░ΈΛΦ Έ░σΉΜζΉε╝Έκε
      ΉηυΉηΣΉΕ▒. ΊΝΝΉζ╝Ήζ┤ ΉΩΗΉε╝Έσ┤ Ά╕░Ήκ┤ `toml::to_string_pretty`Έκε fresh
      writeΈξ╝ ΉειΉπΑ.
    triggered_by: "Operator approved the proposed Phase E E2 plan after the v1.19.0 (D3 close) commit."
    issue_or_context: >
      The pre-v1.20.0 save path serialized the entire `QmonsterConfig`
      via `toml::to_string_pretty` and overwrote the file. That stripped
      every operator-authored comment in `qmonster.toml` (top-level
      explanations, inline rationales for threshold choices,
      `[security]` / `[tmux]` / `[idle]` notes) and rewrote key order
      alphabetically. Operators learned to avoid pressing `w` after
      hand-editing the file, which defeated the whole purpose of the
      v1.15.18 settings overlay.
    changes:
      added:
        - '`toml_edit = "0.22"` dependency in `Cargo.toml`'
        - "`FieldId::toml_path() -> Vec<&'static str>` method"
        - "`SettingsOverlay::merge_overlay_fields()` private helper"
        - "`set_nested_f64()` private helper for `DocumentMut` walk + insert"
        - "Four unit tests in `src/ui/settings.rs`: comment preservation, unrelated section preservation, target value update, fresh-write fallback"
      modified:
        - "`SettingsOverlay::save()` branches on file existence: existing έΗΤ toml_edit merge; missing έΗΤ legacy pretty serialize"
        - "`docs/ai/PROJECT_BRIEF.md`, `docs/ai/VALIDATION.md`, `README.md`, `VERSION.md`, `package.json`, `mission.yaml`, `mission-history.yaml` bumped to v1.20.0"
      removed: []
    changed_sections:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/ui/settings.rs"
      - "docs/ai/PROJECT_BRIEF.md"
      - "docs/ai/VALIDATION.md"
      - "README.md"
      - "VERSION.md"
      - "mission.yaml"
      - "mission-history.yaml"
      - "package.json"
    observable_effects:
      added:
        - "Operator-authored comments in `qmonster.toml` (top-level + section-level + inline) survive an overlay save"
        - "Unrelated sections (`[tmux]`, `[security]`, `[idle]`, ...) keep their key order and content untouched"
      modified:
        - "all-target test count rises to 655 (+4 from E2 comment/section/value/fresh tests; baseline before E2 was 651)"
      removed: []
    impact_scope:
      runtime: "Pure save-path refactor; no policy, tmux, adapter, or actuation behavior change. The on-disk file content is more conservative έΑΦ only the 28 overlay-managed values change per save instead of the whole document."
      tests: "655 total passed across lib + main + event_loop + false_positive + idle_state + qmonster_tmux_parity targets"
      ledger: "1 new timeline entry (sequence 146); meta bump; minor version bump v1.19.x έΗΤ v1.20.0 because Phase E opens"
      npm: "package.json version set to 1.20.0"
      review_gate: "cargo fmt --check, cargo test --all-targets, cargo clippy --all-targets -- -D warnings, cargo build --release, and scripts/verify-shared.sh all pass"
      follow_up_carryover: "Phase E E1 (Gemini memory column display) remains low-value per 3-model consensus and stays deferred until an operator explicitly requests it."
    breaking: false
    risk: "low έΑΦ fresh-write path unchanged; existing-file path is additive (only writes the 28 known threshold keys); validation gate still runs before any disk write. New `toml_edit` dependency is widely used in the Rust ecosystem (cargo-edit, dprint-toml) and ships at 0.22."
    related_commits: []
    follow_up:
      - "If operator requests inline-comment preservation INSIDE `[cost]` / `[context]` / `[quota]` blocks, current behavior already supports that έΑΦ toml_edit preserves comments adjacent to keys."
      - "E1 (Gemini memory column display) stays deferred until an operator explicitly asks for it."

  - change_id: "v1.21.0-gemini-memory-column"
    semantic_version: "1.21.0"
    change_sequence: 147
    date: "2026-04-28"
    author: "Claude (Opus 4.7)"
    contributors:
      - "Operator directive: take E1 even though 3-model consensus called it low-value"
    change_type: "feature"
    motivation_type: "operator-directed follow-up"
    persistence: "permanent"
    intent: >
      Surface Gemini's status-table `memory` column as a
      ProviderOfficial fact so operators can see CLI process memory
      usage on Gemini panes without leaving Qmonster.
    intent_ko: >
      Gemini status-tableΉζα `memory` Ή╗υΈθ╝ΉζΕ ProviderOfficial factΈκε
      surfaceΊΧ┤ΉΕε Ήγ┤ΉαΒΉηΡΆ░Α Qmonster ΊβΦΈσ┤ΉΩΡΉΕε Gemini CLI ΊΦΕΈκεΉΕ╕ΉΛν
      ΈσΦΈςρΈου ΉΓυΉγσΈθΚΉζΕ ΊβΧΉζ╕ΊΧι ΉΙα ΉηΙΆ▓Ν ΊΧεΈΜν.
    decision: >
      Add `SignalSet.process_memory_mb: Option<MetricValue<f64>>`
      with the unit canonicalized to MiB at parse time. Extend
      `GeminiStatus` and `gemini_status_from_columns` to capture the
      `memory` column, parsing both `<float> MB` and `<float> GB`
      cells via a new `parse_memory_mb` helper. Render the value as
      a `MEM` badge in the primary pane-card metric row (adapting to
      `MB` or `GB` at display time) and as `memory <value>` in the
      `--once` metrics row. Claude / Codex leave the field `None`
      because their status surfaces don't expose process memory έΑΦ
      absence is honesty.
    decision_ko: >
      `SignalSet.process_memory_mb: Option<MetricValue<f64>>`ΉζΕ Ή╢ΦΆ░Α
      (parse ΉΜεΉιΡΉΩΡ MiBΈκε ΉιΧΆ╖εΊβΦ). `GeminiStatus`ΉβΑ
      `gemini_status_from_columns`Έξ╝ ΊβΧΉηξΊΧαΉΩυ `memory` Ή╗υΈθ╝ΉζΕ Ή║κΉ▓αΊΧαΆ│ι
      ΉΜιΆ╖ε `parse_memory_mb` ΊΩυΊΞ╝Έκε `<float> MB` / `<float> GB` ΈΣΡ
      ΊαΧΉΜζ ΈςρΈΣΡ ΊΝΝΉΜ▒. pane-card primary metric rowΉΩΡ `MEM` Έ▒ΔΉπΑΈξ╝
      ΉιΒΉζΣΊαΧ ΈΜρΉεΕ(MB/GB)Έκε ΈιΝΈΞΦΈπΒΊΧαΆ│ι `--once` metrics rowΉΩΡΈΛΦ
      `memory <value>` ΊαΧΉΜζΉε╝Έκε Ή╢εΈιξ. Claude / CodexΈΛΦ status surface
      Ά░Α process memoryΈξ╝ ΈΖ╕Ή╢εΊΧαΉπΑ ΉΧΛΉε╝ΈψΑΈκε None ΉειΉπΑ έΑΦ Έ╢ΑΉηυΆ░Α honesty.
    triggered_by: "Operator selected `E1` after the v1.20.0 Phase E E2 commit, overriding the prior 3-model `low-value` consensus."
    issue_or_context: >
      Gemini's status table renders eight columns: branch / sandbox /
      /model / workspace (/directory) / quota / context / memory /
      session. Qmonster has been parsing every column except `memory`
      since v1.15.x. With this change the operator can see Gemini's
      process memory live, which matters when the CLI starts ballooning
      under long-running sessions or large context loads.
    changes:
      added:
        - "`SignalSet.process_memory_mb: Option<MetricValue<f64>>` field"
        - "`GeminiStatus.memory_mb: Option<f64>` field"
        - "`parse_memory_mb(cell) -> Option<f64>` helper in `src/adapters/gemini.rs` (handles `MB` and `GB` suffixes; returns None on unitless / unsupported suffixes)"
        - "Memory `MEM <value>` badge in the primary metric row (`src/ui/panels.rs::primary_metric_row`)"
        - "`memory <value> [<source>]` entry in the `--once` metrics row (`src/ui/panels.rs::metric_row`)"
        - "`format_memory_mb(mb)` adaptive-unit formatter (MB under 1024, GB at or above)"
        - "Four unit tests in `src/adapters/gemini.rs`: positive `parse_memory_mb` formats, negative unitless / unknown-suffix, end-to-end Gemini status-table extraction, absent-status honesty"
      modified:
        - "`gemini_status_from_columns` matches the `memory` header έΗΤ `parse_memory_mb`"
        - "`parse_gemini_status` returns `Some` when only the memory column populated"
        - "`README.md`, `VERSION.md`, `package.json`, `mission.yaml`, `mission-history.yaml`, `docs/ai/PROJECT_BRIEF.md`, `docs/ai/VALIDATION.md` bumped to v1.21.0"
      removed: []
    changed_sections:
      - "src/adapters/gemini.rs"
      - "src/adapters/common.rs"
      - "src/domain/signal.rs"
      - "src/ui/panels.rs"
      - "docs/ai/PROJECT_BRIEF.md"
      - "docs/ai/VALIDATION.md"
      - "README.md"
      - "VERSION.md"
      - "mission.yaml"
      - "mission-history.yaml"
      - "package.json"
    observable_effects:
      added:
        - "Gemini pane card now carries a `MEM 118.8 MB [Official]` (or `MEM 1.20 GB [Official]`) badge alongside CTX / QUOTA / TOKENS / MODEL"
        - "`--once` Gemini metric row includes `memory 192.9 MB [Official]` after path / branch"
      modified:
        - "all-target test count rises to 660 (+5 from E1 unit + integration tests; baseline before E1 was 655)"
      removed: []
    impact_scope:
      runtime: "Pure additive parser + render extension; no policy, tmux, storage, or actuation behavior change. Claude / Codex panes unaffected (the field stays None on those providers)."
      tests: "660 total passed across lib + main + event_loop + false_positive + idle_state + qmonster_tmux_parity targets"
      ledger: "1 new timeline entry (sequence 147); meta bump; minor version bump v1.20.x έΗΤ v1.21.0 because Phase E E1 closes"
      npm: "package.json version set to 1.21.0"
      review_gate: "cargo fmt --check, cargo test --all-targets, cargo clippy --all-targets -- -D warnings, cargo build --release, scripts/verify-shared.sh, and live --once smoke pass"
      follow_up_carryover: "Phase E is now fully shipped. No housekeeping items remain in the deferred ledger besides confirm-archive review (permanently closed) and any new operator-directed work."
    breaking: false
    risk: "low έΑΦ additive parser column; absence honest (Claude / Codex stay None); rendering only adds a badge / line, never reorders or removes existing fields."
    related_commits: []
    follow_up:
      - "If a future Gemini release exposes this in MiB or KiB units, extend `parse_memory_mb` accordingly. PB / TB suffixes stay unsupported unless a real fixture appears."
      - "If Claude or Codex ever surface a comparable counter, populate `process_memory_mb` from those adapters too έΑΦ the SignalSet field is provider-agnostic by design."

