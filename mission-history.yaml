  - change_id: "v1.16.59-claude-runtime-cycle"
    semantic_version: "1.16.59"
    change_sequence: 141
    date: "2026-04-28"
    author: "Codex (GPT-5.5)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "patch"
    motivation_type: "operator-live-regression"
    persistence: "permanent"
    intent: >
      Restore the operator-requested Claude `u` key contract: repeated
      presses rotate through the Claude runtime surfaces rather than
      collapsing active/uncertain panes to `/stats` only.
    intent_ko: >
      Claude `u` ΊΓνΉζα Ήγ┤ΉαΒΉηΡ ΉγΦΉ▓φ Ά│ΕΉΧ╜ΉζΕ Έ│╡Ά╡υΊΧεΈΜν. Έ░αΈ│╡ ΉηΖΈιξΉζΑ active/uncertain
      paneΉζΕ `/stats` ΊΧαΈΓαΈκε Ή╢ΧΉΗΝΊΧαΉπΑ ΉΧΛΆ│ι Claude runtime surfaceΈξ╝ ΉΙεΊβαΊΧεΈΜν.
    decision: >
      Claude runtime refresh now uses the same one-command cycle across
      active, stale, idle, wait, and limit states: `/status`, `/usage`,
      `/stats`. Qmonster does not send a pre-command Escape. For each
      Claude command, it submits the slash command, waits/captures a
      deeper runtime tail, stores the one-shot parser overlay, and then
      sends Escape to close the fullscreen provider surface so the next
      `u` press can run the next command.
    decision_ko: >
      Claude runtime refreshΈΛΦ active/stale/idle/wait/limit ΉΔΒΊΔε ΈςρΈΣΡΉΩΡΉΕε Ά░βΉζΑ
      one-command ΉΙεΊβα(`/status`, `/usage`, `/stats`)ΉζΕ ΉΓυΉγσΊΧεΈΜν. QmonsterΈΛΦ
      ΈςΖΈι╣ ΉιΕΉΩΡ `Escape`Έξ╝ Έ│┤ΈΓ┤ΉπΑ ΉΧΛΈΛΦΈΜν. Ά░Β Claude ΈςΖΈι╣ΈπΙΈΜν slash commandΈξ╝
      ΉιΕΉΗκΊΧαΆ│ι, Ά╣ΛΉζΑ runtime tailΉζΕ Ά╕░ΈΜνΈιν Ή║κΉ▓αΊΧε ΈΤν one-shot parser overlayΈκε
      ΉιΑΉηξΊΧαΆ│ι, Ά╖╕ ΈΜνΉζΝ `Escape`Έξ╝ Έ│┤ΈΓ┤ fullscreen provider surfaceΈξ╝ ΈΜτΉΧΕ ΈΜνΉζΝ
      `u` ΉηΖΈιξΉζ┤ Ήζ┤ΉΨ┤ΉΕε ΈΠβΉηΣΊΧαΆ▓Ν ΊΧεΈΜν.
    triggered_by: "operator clarified Claude `u` should alternate `/status`, `/usage`, `/stats`, capture enough screen output, then press Escape to close the surface"
    issue_or_context: >
      v1.16.58 restored a non-blocked active Claude path by sending only
      `/stats`, but the operator wanted the earlier rotating runtime
      surface behavior. The interrupting part was the pre-command Escape;
      the requested close step happens after Qmonster has captured the
      opened runtime surface.
    changes:
      added: []
      modified:
        - "src/app/runtime_refresh.rs"
        - "README.md"
        - "VERSION.md"
        - "docs/ai/ARCHITECTURE.md"
        - "docs/ai/PROJECT_BRIEF.md"
        - "docs/ai/UI_MANUAL.md"
        - "docs/ai/VALIDATION.md"
        - "mission.yaml"
        - "mission-history.yaml"
        - "package.json"
      removed: []
    changed_sections:
      - "Claude runtime refresh command cycle"
      - "Claude runtime refresh capture-and-close contract"
      - "operator docs and ledger"
    done_when_delta:
      added:
        - "Claude `u` cycles `/status`, `/usage`, `/stats` for active and idle states"
        - "Claude runtime refresh sends no pre-command Escape"
        - "Claude `/status`, `/usage`, and `/stats` are captured with the deeper Claude tail and then closed with Escape"
        - "Targeted runtime_refresh tests and full release validation pass"
      modified:
        - "README/VERSION/docs/mission ledger bumped to v1.16.59"
      removed:
        - "v1.16.58 active/uncertain Claude `/stats`-only runtime-refresh selection"
    observable_effects:
      added:
        - "Repeated `u` on Claude rotates `/status` -> `/usage` -> `/stats` -> `/status`"
        - "Each Claude runtime surface is closed after capture, so the next `u` can run immediately"
      modified:
        - "Claude active/uncertain panes now use the same runtime cycle as idle panes"
      removed:
        - "Claude `/context` remains outside the operator `u` cycle"
    impact_scope:
      runtime: "Claude runtime-refresh command dispatch and capture/close behavior only; Gemini v1.16.58 idle fix remains unchanged"
      tests: "627 total passed έΑΦ 565 lib + 38 event_loop + 18 false_positive + 6 idle_state"
      ledger: "1 new timeline entry (sequence 141); meta bump"
      npm: "package.json version set to 1.16.59"
