      helper already emits the side_effects section for any
      profile with a non-empty list.
      (5) Four new unit tests: shape (7 levers, 7 side_effects,
      derived counts in reason, authority split 6 PO + 1 PC,
      spot-checks on auto-compaction and sandbox trade-offs);
      gate-off when !quota_tight (codex-default sanity check);
      provider-gate suppression on Claude pane
