      `use qmonster::policy::gates::{PromptSendGate, check_send_gate}`로
      import.
      (2) #2 — tmux 인자 안전성: PollingSource::send_keys를 tmux
      2회 호출로 분리 — `tmux send-keys -t {pane} -l {text}`
      (literal 모드; `-l`로 페이로드가 tmux 키 이름(Up, C-c, -l 등)과
      충돌 시에도 텍스트로 해석) 후 `tmux send-keys -t {pane} Enter`
      (Enter는 별도 호출로 유지 — `-l` 뒤에 두면 literalise됨).
