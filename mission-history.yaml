  - change_id: "phase-5-p5-1-opening-safer-actuation-scaffolding"
    semantic_version: "1.9.0"
    change_sequence: 31
    date: "2026-04-22"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator έΑΦ approved scaffolding-first approach over a larger end-to-end P5-1 in the same slice)"
    change_type: "feature"
    motivation_type: "phase-opening"
    persistence: "permanent"
    intent: >
      Open Phase 5 (Safer Actuation) with a type-layer-only TDD
      scaffolding slice. Mirrors Phase-4 P4-1's v1.8.0 opening pattern:
      land the domain types + allow-list plumbing first, then grow the
      actual user-facing actuation and the first producing rule in
      later slices (P5-2+). This keeps the first Phase-5 commit
      auditable and reversible while establishing the data-shape
      contract reviewers can validate.
    intent_ko: >
      Phase 5 (Safer Actuation)Έξ╝ type-layer ΉιΕΉγσ TDD ΉΛνΉ║ΡΊΠ┤ΈΦσ ΉΛυΈζ╝Ήζ┤ΉΛνΈκε
      open. Phase-4 P4-1 v1.8.0 Ά░εΈ░σ ΊΝρΊΕ┤ΉζΕ ΈΦ░Έξ╕ΈΜν: ΈΠΕΈσΦΉζ╕ ΊΔΑΉηΖ + allow-
      list Έ░░ΉΕιΉζΕ Έρ╝ΉιΑ ΈΓ┤Έιν ΈΗΥΆ│ι, ΉΜνΉιε UI Έ░εΈΠβ Ά▓╜ΈκεΉβΑ Ή▓τ producing ruleΉζΑ
      Ήζ┤ΊδΕ ΉΛυΈζ╝Ήζ┤ΉΛν(P5-2+)Έκε Έ╢ΕΈου. Ή▓τ Phase-5 Ή╗νΈ░ΜΉζΕ Ά░ΡΉΓυΊΧαΆ╕░ ΉΚ╜Ά│ι
      ΈΡαΈΠΝΈουΆ╕░ ΉΚ╜Ά▓Ν ΉειΉπΑΊΧαΈσ┤ΉΕε ΈουΈ╖░ΉΨ┤Ά░Α Ά▓ΑΉοζΊΧι ΈΞ░Ήζ┤ΊΕ░-ΈςρΉΨΣ Ά│ΕΉΧ╜ΉζΕ Έρ╝ΉιΑ
      ΉηιΆ╖╝ΈΜν.
    decision: >
      Land four things and NOTHING else in this slice: (1) new
      `RequestedEffect::PromptSendProposed { target_pane_id: String,
      slash_command: String }` variant, which forced the enum to
      drop its derived `Copy + PartialOrd + Ord + Hash` έΑΦ the
      payload cannot cheaply participate in a total order. Authority
      ordering is now exposed via `RequestedEffect::authority_tier()
      -> u8` (Notify=0, ArchiveLocal=1, PromptSendProposed=2,
      SensitiveNotImplemented=3). (2) three new `AuditEventKind`s έΑΦ
      `PromptSendProposed`, `PromptSendAccepted`, `PromptSendRejected`
      έΑΦ wired through `src/store/audit.rs::kind_to_str` and
      `parse_kind` so SQLite round-trip cannot regress later even
      though `Accepted` / `Rejected` have no producing code path yet.
      (3) `EffectRunner::permit` signature change from
      `fn permit(&self, effect: RequestedEffect) -> bool` to
      `fn permit(&self, effect: &RequestedEffect) -> bool` (owned-
      to-borrowed, necessary for the payload-bearing variant).
      Behavior: `observe_only` blocks every variant including the
      proposal; `recommend_only` lets the proposal pass (display-
      layer effect, not actuation) regardless of
      `allow_auto_prompt_send` έΑΦ that flag continues to gate the
      *real* tmux send-keys call that P5-2+ layers on top. (4)
      `app/event_loop.rs::deliver_effects` gains a
      `RequestedEffect::PromptSendProposed { .. } => continue` arm
      so the proposal surfaces via `PaneReport.effects` without any
      runtime side-effect firing in P5-1. No new rule emits the
      proposal yet; no TUI accept/reject UX; no `tmux send-keys`
      call. VALIDATION Phase-5 checkboxes stay unticked because
      they cover end-to-end behavior that requires P5-2+ surface
      work before they can be honestly ticked.
    decision_ko: >
      Ήζ┤ ΉΛυΈζ╝Ήζ┤ΉΛνΉΩΡ ΉιΧΊβΧΊηΙ ΈΕν Ά░ΑΉπΑΈπΝ ΊΠυΊΧρ (Ά╖╕ Ήβ╕ΉΩΡΈΛΦ ΉΧΕΈυ┤Ά▓ΔΈΠΕ ΊΧαΉπΑ ΉΧΛΉζΝ):
      (1) `RequestedEffect::PromptSendProposed { target_pane_id: String,
      slash_command: String }` ΉΜιΆ╖ε variant. ΊΟαΉζ┤ΈκεΈΥεΆ░Α total orderΉΩΡ
      Ή░╕ΉΩυΊΧι ΉΙα ΉΩΗΉε╝ΈψΑΈκε enumΉΩΡΉΕε ΊΝΝΉΔζ `Copy + PartialOrd + Ord + Hash`Έξ╝
      ΉιεΆ▒░; allow-list Ήγ░ΉΕιΉΙεΉεΕΈΛΦ `RequestedEffect::authority_tier() ->
      u8` (Notify=0, ArchiveLocal=1, PromptSendProposed=2,
      SensitiveNotImplemented=3)Έκε Έ╢ΕΈου. (2) 3Ά░ε ΉΜιΆ╖ε `AuditEventKind`
      (`PromptSendProposed` / `PromptSendAccepted` / `PromptSendRejected`);
      `Accepted` / `Rejected`ΈΛΦ P5-1ΉΩΡ producing Ά▓╜Έκε ΉΩΗΉπΑΈπΝ SQLite
      round-trip ΈΝΑΉ╣φΉζΕ ΉπΑΆ╕Ι ΉηιΆ╖╕Ά╕░ ΉεΕΊΧ┤ `kind_to_str` /
      `parse_kind`ΉΩΡ ΉΨΣΉς╜ ΈΥ▒Έκζ. (3) `EffectRunner::permit`Ήζα ΉΜεΆ╖╕ΈΜΙΉ▓αΈξ╝
      `permit(effect: RequestedEffect)` έΗΤ `permit(effect:
      &RequestedEffect)`Έκε (ΊΟαΉζ┤ΈκεΈΥε variant ΈΧΝΈυ╕ΉΩΡ borrow ΊΧΕΉΙα). ΈΠβΉηΣ:
      `observe_only`ΈΛΦ proposal ΊΠυΊΧρ ΈςρΈΣΡ Ή░ρΈΜρ, `recommend_only`ΉΩΡΉΕεΈΛΦ
      proposalΉζΑ ΊΗ╡Ά│╝ (ΊΣεΉΜε-Ά│ΕΉ╕╡ effectΉζ┤ΉπΑ actuation ΉΧΕΈΜα); Ήζ┤ΈΧΝ
      `allow_auto_prompt_send` ΊΦΝΈηαΆ╖╕ΈΛΦ Ήζ┤ Ά│ΕΉ╕╡ΉζΕ Ά▓ΝΉζ┤ΊΝΖΊΧαΉπΑ ΉΧΛΆ│ι,
      P5-2+ΉΩΡΉΕε ΉΨ╣ΊηΙΈΛΦ ΉΜνΉιε `tmux send-keys` Ία╕Ή╢εΉζΕ Ά▓ΝΉζ┤ΊΝΖ. (4)
      `app/event_loop.rs::deliver_effects`ΉΩΡ
      `RequestedEffect::PromptSendProposed { .. } => continue` arm
      Ή╢ΦΆ░Α έΑΦ proposalΉζΑ `PaneReport.effects`Έκε UIΉΩΡ ΈΖ╕Ή╢εΈΡαΉπΑΈπΝ P5-1ΉΩΡΉΕε
      Έθ░ΊΔΑΉηΕ side-effectΈΛΦ Έ░εΉΔζΊΧαΉπΑ ΉΧΛΉζΝ. ΉΧΕΉπΒ Ήζ┤ proposalΉζΕ emitΊΧαΈΛΦ
      rule ΉΩΗΉζΝ; TUI accept/reject UX ΉΩΗΉζΝ; `tmux send-keys` Ία╕Ή╢ε ΉΩΗΉζΝ.
      VALIDATION Phase-5 Ή▓┤ΊΒυΈ░ΧΉΛνΈΛΦ P5-2+ ΊΣεΈσ┤ ΉηΣΉΩΖ ΉιΕΆ╣ΝΉπΑ ΉιΧΉπΒΊΧαΆ▓Ν
      tickedΈΡι ΉΙα ΉΩΗΉε╝ΈψΑΈκε Έ╣ΕΉδΝ ΈΣι.
    triggered_by: "v1.8.14 follow-up: 'Open Phase 5 (Safer Actuation έΑΦ manual prompt-send helper with user confirmation)'"
    issue_or_context: >
      Phase 4 closed fully gate-approved at v1.8.14 (Codex + Gemini
      both `approve` on v1.8.13 P4-8 wrap-up). VALIDATION.md Phase-5
      lists three checks: (a) manual prompt-send helper requires
