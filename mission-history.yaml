    change_type: "emergency-fix"
    motivation_type: "operational-noise-residual"
    persistence: "permanent"
    intent: >
      Close the residual ~82,000 daily false-positive alerts that v1.13.0
      left unaddressed. Audit-DB measurement at 2026-04-25 06:07 UTC
      (43-min v1.13.0 settled run vs full-day v1.12.2 baseline) showed
      AlertFired/min dropped only 64.4% (vs ‚â•95% target) because two
      noise sources unmasked when the four v1.13.0-targeted classes went
      to ~0: error_hint substring matching on bash hook output and
      operator prose, and parse_context_pressure substring matching on
      quoted Codex status lines and `Tip ... plan usage` welcome text.
    decision: >
