        - "src/app/config.rs::QuotaConfig (same shape as ContextConfig; today only Gemini populates the metric)"
        - "src/app/config.rs::PressureProviderConfig (warning_pct / critical_pct pair; shared between ContextConfig + QuotaConfig)"
        - "src/app/config.rs::ContextConfig::warning_for / critical_for / override_for resolution helpers"
        - "src/app/config.rs::QuotaConfig::warning_for / critical_for / override_for resolution helpers"
        - "src/app/config.rs::QmonsterConfig.context + .quota fields"
        - "src/policy/gates.rs::PolicyGates.context_warning_pct / context_critical_pct / quota_warning_pct / quota_critical_pct fields + Default impl + from_config_and_identity signature update (now takes &ContextConfig + &QuotaConfig)"
        - "config/qmonster.example.toml::[context] and [quota] sections with default + commented per-provider overrides + recommended-defaults rationale block"
        - "Tests: policy_gates_resolves_per_provider_context_and_quota_overrides (Gemini context override 0.60/0.75 + Claude quota override 0.80/0.90 + Codex falls through both) + context_pressure_thresholds_track_per_provider_overrides (advisory rule honors per-provider gates: tight gates promote 0.78 from warning to critical; loose gates suppress) + quota_pressure_thresholds_track_per_provider_overrides (same pattern for quota)"
      modified:
        - "src/policy/rules/advisories.rs::context_pressure_warning + context_pressure_critical now read gates.context_*_pct instead of hardcoded 0.75..0.85"
        - "src/policy/rules/advisories.rs::quota_pressure_warning + quota_pressure_critical now read gates.quota_*_pct instead of hardcoded 0.75..0.85"
        - "src/app/event_loop.rs::PolicyGates::from_config_and_identity caller now passes &ctx.config.context + &ctx.config.quota in addition to &ctx.config.cost"
        - "src/policy/gates.rs::policy_gates_from_config_and_identity_reads_both + policy_gates_resolves_per_provider_cost_overrides tests updated for new 6-arg signature"
        - "src/policy/{engine,gates,rules/{advisories,auto_memory,profiles}}.rs::PolicyGates {} construction sites updated for four new fields (default values 0.75 / 0.85 to preserve existing test behavior)"
        - "mission.yaml (meta: version 1.15.16 вЖТ 1.15.17; title; lineage.total_revisions 72 вЖТ 73)"
        - "mission-history.yaml (sequence 73; meta: latest_version 1.15.17, total_revisions 72 вЖТ 73)"
      removed: []
    changed_sections:
