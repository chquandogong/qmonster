      `parse_kind`Ïóê ÏñëÏ™Ω Îì±Î°ù. (3) `EffectRunner::permit`Ïùò ÏãúÍ∑∏ÎãàÏ≤òÎ•º
      `permit(effect: RequestedEffect)` ‚Üí `permit(effect:
      &RequestedEffect)`Î°ú (ÌéòÏù¥Î°úÎìú variant ÎïåÎ¨∏Ïóê borrow ÌïÑÏàò). ÎèôÏûë:
      `observe_only`Îäî proposal Ìè¨Ìï® Î™®Îëê Ï∞®Îã®, `recommend_only`ÏóêÏÑúÎäî
      proposalÏùÄ ÌÜµÍ≥º (ÌëúÏãú-Í≥ÑÏ∏µ effectÏù¥ÏßÄ actuation ÏïÑÎãò); Ïù¥Îïå
