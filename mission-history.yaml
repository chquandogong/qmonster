  - change_id: "phase-4-p4-1-provider-profile-foundation"
    semantic_version: "1.8.0"
    change_sequence: 16
    date: "2026-04-21"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "feature"
    motivation_type: "implementation"
    persistence: "permanent"
    intent: >
      Open Phase 4 (provider-profile recommender) with the smallest
      TDD-compatible first slice (P4-1): introduce the pure data
      model for provider profiles and ship the first rule so the
      end-to-end pipeline (policy::Engine::evaluate -> EffectRunner
      -> ViewModel) carries profile recommendations exactly like
      advisories do. Leave G-5 (auto-memory guide) and G-6
      (side_effects on high-compression profiles) for subsequent
      slices so each change is independently reviewable.
    intent_ko: >
      Phase 4(provider-profile recommender)Ήζα Ή▓τ TDD ΉΛυΈζ╝Ήζ┤ΉΛν(P4-1)
      Ή░σΉΙα: provider profileΉζΕ ΉεΕΊΧε ΉΙεΉΙα ΈΞ░Ήζ┤ΊΕ░ ΈςρΈΞ╕Ά│╝ Ή▓τ Ά╖εΉ╣βΉζΕ
      ΈΠΕΉηΖΊΧαΉΩυ end-to-end ΊΝΝΉζ┤ΊΦΕΈζ╝Ήζ╕(policy::Engine::evaluate έΗΤ
      EffectRunner έΗΤ ViewModel)Ήζ┤ advisoriesΉβΑ ΈΠβΉζ╝ΊΧε ΊζΡΈοΕΉε╝Έκε
      profile Ά╢ΝΆ│ιΈξ╝ ΉιΕΈΜυΊΧαΈΠΕΈκζ ΊΧεΈΜν. G-5(auto-memory guide)ΉβΑ
      G-6(side_effects on Ά│ιΉΧΧΉ╢Χ profiles)ΉζΑ ΈΜνΉζΝ ΉΛυΈζ╝Ήζ┤ΉΛνΉΩΡΉΕε Έ│ΕΈΠΕ
      Ή╗νΈ░ΜΉε╝Έκε Ή▓αΈουΊΧ┤ Ά░Β Έ│ΑΆ▓╜ΉζΕ ΈΠΖΈο╜ΉιΒΉε╝Έκε ΈουΈ╖░ Ά░ΑΈΛξΊΧαΆ▓Ν ΉειΉπΑΊΧεΈΜν.
    decision: >
      (1) src/domain/profile.rs (new): `ProfileLever` (key, value,
      citation, source_kind) and `ProviderProfile` (name, levers:
      Vec<ProfileLever>, side_effects: Vec<String>, source_kind)
      data types. Profile NAMES are `ProjectCanonical` (our
      abstraction); individual levers inside are typically
      `ProviderOfficial` with an explicit citation string.
      `side_effects` slot is present but empty at P4-1; G-6
      populates it on aggressive-variant profiles at P4-3. Two
      unit tests lock the shape (ProfileLever pairs value with
      non-empty citation; ProviderProfile carries ProjectCanonical
      name with ProviderOfficial levers inside, empty side_effects).
      (2) src/policy/rules/profiles.rs (new):
      `eval_profiles(id, signals, gates) -> Vec<Recommendation>`
      mirrors eval_advisories' shape. `recommend_claude_default` is
      the first rule έΑΦ fires only when provider == Claude, role ==
      Main, IdentityConfidence >= Medium, !quota_tight, no active
      alert signals (waiting_for_input, permission_prompt,
      log_storm, error_hint), and context_pressure < 0.75. Returns
      a `Severity::Good` recommendation (first use of Good on a
      rule output έΑΦ a positive advisory that does NOT trigger the
      Notify gate) with SourceKind::ProjectCanonical (the profile
      name is our abstraction) and a bundle of three levers: (a)
      `CLAUDE_CODE_FILE_READ_MAX_OUTPUT_TOKENS = 25000`, (b)
      `BASH_MAX_OUTPUT_LENGTH = 30000`, (c) `includeGitInstructions
      = false` έΑΦ each ProviderOfficial with a per-lever citation.
      `suggested_command` is None with an inline justification
      (applying a profile is multi-key settings editing, not a
      single runnable command); `side_effects` is empty (no
      expected side effects on the healthy-state baseline);
      `is_strong` is false (profile is advisory, not checkpoint-
      class). Two unit tests lock the behavior (fires on healthy
      Claude main with Good severity + ProjectCanonical source +
      reason cites "claude-default" and "ProviderOfficial";
      suppressed on non-Claude provider).
      (3) src/policy/rules/mod.rs: `pub mod profiles;` added.
      (4) src/domain/mod.rs: `pub mod profile;` + `pub use
      profile::{ProfileLever, ProviderProfile};`.
      (5) src/policy/engine.rs: `Engine::evaluate` extends the recs
      vec with `eval_profiles(id, signals, gates)` after advisories
      so profile recs flow through the existing PaneReport έΗΤ UI
      path without touching UI code. No new RequestedEffect; no
      effect-runner change.
    decision_ko: >
      (1) src/domain/profile.rs ΉΜιΆ╖ε: `ProfileLever`(key, value,
      citation, source_kind)ΉβΑ `ProviderProfile`(name, levers:
      Vec<ProfileLever>, side_effects: Vec<String>, source_kind)
      ΈΞ░Ήζ┤ΊΕ░ ΊΔΑΉηΖ. ΊΦΕΈκεΊΧΕ NAMEΉζΑ Ήγ░Έου abstractionΉζ┤Έζ╝
      `ProjectCanonical`; ΈΓ┤Έ╢Α leverΈΛΦ ΈΝΑΆ░ε `ProviderOfficial`(Ά░Β
      leverΈπΙΈΜν citation Έυ╕ΉηΡΉΩ┤ ΊΧΕΉΙα). `side_effects` ΉΛυΈκψΉζΑ P4-1
      ΉΜεΉιΡΉΩΡΉΕε Έ╣ΕΉΨ┤ΉηΙΆ│ι, G-6Ήζ┤ P4-3Ήζα aggressive Έ│ΑΊαΧ profileΉΩΡΉΕε
      Ή▒ΕΉγ┤ΈΜν. shapeΉζΕ Ά│ιΉιΧΊΧαΈΛΦ unit test 2Ά▒┤ Ή╢ΦΆ░Α.
      (2) src/policy/rules/profiles.rs ΉΜιΆ╖ε:
      `eval_profiles(id, signals, gates) -> Vec<Recommendation>`ΈΛΦ
      eval_advisoriesΉβΑ ΈΠβΉζ╝ΊΧε ΊαΧΊΔε. `recommend_claude_default`ΈΛΦ
      Ή▓τ Έ▓ΙΉπ╕ Ά╖εΉ╣β έΑΦ provider == Claude, role == Main,
      IdentityConfidence >= Medium, !quota_tight, ΊβεΉΕ▒ ΉΧΝΈο╝ ΉΜιΊα╕
      ΉΩΗΉζΝ(waiting_for_input, permission_prompt, log_storm,
      error_hint), context_pressure < 0.75Ήζ╝ ΈΧΝΈπΝ Έ░εΊβΦ. Έ░αΊβαΆ░ΤΉζΑ
      `Severity::Good`(Ά╖εΉ╣β Ή╢εΈιξΉΩΡΉΕε Good Ή▓τ ΉΓυΉγσ έΑΦ Notify Ά▓ΝΉζ┤ΊΛ╕
      ΊΗ╡Ά│╝ΊΧαΉπΑ ΉΧΛΈΛΦ Ά╕ΞΉιΧΉιΒ advisory) + SourceKind::ProjectCanonical
