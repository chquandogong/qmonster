  - change_id: "phase-4-p4-2-auto-memory-guide"
    semantic_version: "1.8.2"
    change_sequence: 18
    date: "2026-04-21"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "feature"
    motivation_type: "implementation"
    persistence: "permanent"
    intent: >
      Ship the second Phase-4 slice (P4-2): Gemini G-5 auto-memory
      guide. When adapter-inferred `task_type` indicates
      state-critical work (Review or SessionResume — both classes
      of work that produce handoff-grade state that gets lost in
      provider auto-memory), emit a passive advisory routing the
      operator toward the project ledger (`.mission/CURRENT_STATE.md`
      or a new `.mission/decisions/MDR-XXX.md`) via `next_step`.
      Closes Gemini G-5 per VALIDATION.md:154-156 and the
      "auto memory ... never the primary state store" mission.yaml
      constraint.
    intent_ko: >
      Phase 4의 두 번째 슬라이스(P4-2) 도입: Gemini G-5 auto-memory
      guide. adapter가 추론한 `task_type`이 state-critical 작업
      (Review 또는 SessionResume — 둘 다 provider auto-memory에만
      저장되면 유실되는 handoff-grade 상태를 생성하는 작업 유형)
      일 때, 프로젝트 레저(`.mission/CURRENT_STATE.md` 또는 신규
      `.mission/decisions/MDR-XXX.md`)로 operator를 안내하는 수동
      advisory를 `next_step`에 실어 발화. VALIDATION.md:154-156의
      Gemini G-5 및 mission.yaml의 "auto memory … never the primary
      state store" 제약을 닫는다.
    decision: >
      (1) src/policy/rules/auto_memory.rs (new):
      `pub fn eval_auto_memory(id, signals, gates) -> Vec<Recommendation>`
      mirrors the other rules/*.rs dispatchers. The single rule
      `recommend_mdr_over_auto_memory` fires a `Severity::Concern`
      rec with `source_kind: ProjectCanonical` (Qmonster
      architectural rule, not a provider-doc fact) when
      `signals.task_type ∈ {Review, SessionResume}`. Gate logic:
      (a) `allow_provider_specific(gates.identity_confidence)` —
      KD-007 gate, because task_type inference comes from the
      per-provider adapter and is unreliable at Low/Unknown
      confidence; (b) suppression when `waiting_for_input ||
      permission_prompt` — operator attention already routed to a
      more pressing signal; (c) narrow task-type scope — the other
      five TaskType variants (Unknown/CodeExploration/LogTriage/
      Summary/Automation) produce output that is NOT handoff-grade
      state. The rec carries `next_step: Some("record in
      `.mission/CURRENT_STATE.md` or create a new `.mission/
      decisions/MDR-XXX.md`; avoid provider save_memory / auto-
      memory for state-critical content")` with `suggested_command:
      None` (operator routing decision, not a runnable command).
      `is_strong: false`; `profile: None`; `side_effects: vec![]`.
      Five unit tests lock the contract: positive Review (full
      shape + ProjectCanonical + next_step content), positive
      SessionResume (action name present), narrow suppression
      (five non-state-critical TaskType variants), KD-007 gate
      (Low-confidence suppressed), attention-redirect suppression
      (waiting_for_input and permission_prompt each).
      (2) src/policy/rules/mod.rs: `pub mod auto_memory;`.
      (3) src/policy/engine.rs: `Engine::evaluate` extends recs
      with `eval_auto_memory(id, signals, gates)` after profiles
      so G-5 recs flow through the same PaneReport -> ViewModel
      path without touching UI code. No new `RequestedEffect`; no
      effect-runner change.
      Design decisions worth flagging to reviewers: (i) the rec is
      Concern (not Warning/Risk) because the guidance is operator
      routing, not an alert; (ii) `source_kind: ProjectCanonical`
      because the "route to MDR, not auto-memory" rule comes from
      our mission.yaml constraint ("auto memory ... never the
      primary state store"), not from any provider doc; (iii)
      there is no dedicated aggressive variant in P4-2 — the
      guidance is equally relevant inside and outside quota_tight
      mode.
    decision_ko: >
      (1) src/policy/rules/auto_memory.rs 신규:
      `pub fn eval_auto_memory(id, signals, gates) -> Vec<Recommendation>`
      는 다른 rules 파일과 동일한 dispatcher 형태. 단일 규칙
      `recommend_mdr_over_auto_memory`이 `signals.task_type`이
      {Review, SessionResume} 중 하나일 때 `Severity::Concern` +
      `source_kind: ProjectCanonical`(Qmonster 아키텍처 규칙, provider
      doc 사실 아님) 권고 발화. 게이트: (a) 제공자 특화 게이트
      (KD-007) — task_type은 adapter가 추론하므로 Low/Unknown 신뢰도
      에서는 불안정 → 억제; (b) `waiting_for_input ||
      permission_prompt`에서 억제 — operator 주의가 이미 더 긴급한
      신호에 잡혔음; (c) 좁은 task_type 범위 유지 — 나머지 5개
      변형(Unknown/CodeExploration/LogTriage/Summary/Automation)은
      handoff-grade 상태를 만들지 않음. `next_step`에 두 canonical
      쓰기 타겟(CURRENT_STATE.md + 신규 MDR-XXX.md)과 "provider
      save_memory 회피" 지시. `suggested_command: None`(operator
      라우팅 결정, 실행 명령 아님); `is_strong: false`;
      `profile: None`; `side_effects: vec![]`. Unit test 5건:
      positive Review(전체 shape 검증), positive SessionResume,
      narrow 억제(non-state-critical TaskType 5종), KD-007 게이트
      (Low-confidence 억제), 주의-리다이렉트 억제
      (waiting_for_input / permission_prompt 각각).
      (2) src/policy/rules/mod.rs: `pub mod auto_memory;`.
      (3) src/policy/engine.rs: `Engine::evaluate`가 profiles
      이후 `eval_auto_memory` 확장 — 기존 PaneReport 경로 재사용,
      UI 변경 없음. 신규 RequestedEffect 없음.
    triggered_by: "operator request to proceed with P4-2 after v1.8.1 fully approved baseline (Gemini v1.8.0 pass + Codex v1.8.1 confirm approve)"
    issue_or_context: >
      Phase 4 opened at v1.8.0 with the provider-profile recommender
