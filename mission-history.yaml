      (Review ΈαΡΈΛΦ SessionResume έΑΦ ΈΣα ΈΜν provider auto-memoryΉΩΡΈπΝ
      ΉιΑΉηξΈΡαΈσ┤ ΉειΉΜνΈΡαΈΛΦ handoff-grade ΉΔΒΊΔεΈξ╝ ΉΔζΉΕ▒ΊΧαΈΛΦ ΉηΣΉΩΖ ΉειΊαΧ)
      Ήζ╝ ΈΧΝ, ΊΦΕΈκεΉιζΊΛ╕ ΈιΙΉιΑ(`.mission/CURRENT_STATE.md` ΈαΡΈΛΦ ΉΜιΆ╖ε
      `.mission/decisions/MDR-XXX.md`)Έκε operatorΈξ╝ ΉΧΙΈΓ┤ΊΧαΈΛΦ ΉΙαΈΠβ
      advisoryΈξ╝ `next_step`ΉΩΡ ΉΜνΉΨ┤ Έ░εΊβΦ. VALIDATION.md:154-156Ήζα
      Gemini G-5 Έ░Π mission.yamlΉζα "auto memory έΑο never the primary
      state store" ΉιεΉΧ╜ΉζΕ ΈΜτΈΛΦΈΜν.
    decision: >
      (1) src/policy/rules/auto_memory.rs (new):
      `pub fn eval_auto_memory(id, signals, gates) -> Vec<Recommendation>`
      mirrors the other rules/*.rs dispatchers. The single rule
      `recommend_mdr_over_auto_memory` fires a `Severity::Concern`
      rec with `source_kind: ProjectCanonical` (Qmonster
      architectural rule, not a provider-doc fact) when
      `signals.task_type έΙΙ {Review, SessionResume}`. Gate logic:
      (a) `allow_provider_specific(gates.identity_confidence)` έΑΦ
      KD-007 gate, because task_type inference comes from the
      per-provider adapter and is unreliable at Low/Unknown
      confidence; (b) suppression when `waiting_for_input ||
      permission_prompt` έΑΦ operator attention already routed to a
      more pressing signal; (c) narrow task-type scope έΑΦ the other
      five TaskType variants (Unknown/CodeExploration/LogTriage/
      Summary/Automation) produce output that is NOT handoff-grade
      state. The rec carries `next_step: Some("record in
      `.mission/CURRENT_STATE.md` or create a new `.mission/
      decisions/MDR-XXX.md`; avoid provider save_memory / auto-
      memory for state-critical content")` with `suggested_command:
      None` (operator routing decision, not a runnable command).
      `is_strong: false`; `profile: None`; `side_effects: vec![]`.
      Five unit tests lock the contract: positive Review (full
      shape + ProjectCanonical + next_step content), positive
      SessionResume (action name present), narrow suppression
      (five non-state-critical TaskType variants), KD-007 gate
      (Low-confidence suppressed), attention-redirect suppression
      (waiting_for_input and permission_prompt each).
      (2) src/policy/rules/mod.rs: `pub mod auto_memory;`.
      (3) src/policy/engine.rs: `Engine::evaluate` extends recs
      with `eval_auto_memory(id, signals, gates)` after profiles
      so G-5 recs flow through the same PaneReport -> ViewModel
      path without touching UI code. No new `RequestedEffect`; no
      effect-runner change.
      Design decisions worth flagging to reviewers: (i) the rec is
      Concern (not Warning/Risk) because the guidance is operator
      routing, not an alert; (ii) `source_kind: ProjectCanonical`
      because the "route to MDR, not auto-memory" rule comes from
      our mission.yaml constraint ("auto memory ... never the
      primary state store"), not from any provider doc; (iii)
      there is no dedicated aggressive variant in P4-2 έΑΦ the
      guidance is equally relevant inside and outside quota_tight
      mode.
    decision_ko: >
