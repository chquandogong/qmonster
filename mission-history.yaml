  - change_id: "v1.13.0-emergency-suppression"
    semantic_version: "1.13.0"
    change_sequence: 52
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "Claude Code (main pane) — diagnosis, plan authoring, TDD execution"
    change_type: "emergency-fix"
    motivation_type: "operational-noise"
    persistence: "permanent"
    intent: >
      Eliminate the ~250,000/day false-positive RISK/Warning/Concern
      alerts that parse_common_signals had been emitting against the
      operator's running Claude Code v2.1.120 / Codex v0.122 / Gemini
      v0.39 panes, by capturing real-world tails as test fixtures and
      tightening four marker classes against them under TDD.
    decision: >
      Diagnostic phase (Phase 1 of systematic-debugging skill) revealed
      that PERMISSION_MARKERS, WAITING_MARKERS, log_storm fallback, and
      verbose_answer fallback all matched ordinary CLI UI text and prose
      content rather than the interactive prompts they were intended to
      detect. Audit DB measurement (2026-04-24..2026-04-25) showed:
      ~93K/day RISK permission-wait, ~33K/day Warning input-wait,
      ~55K/day Warning log_storm, ~127K/day Concern verbose-output —
      saturating the alert queue and rendering Qmonster's central
      observe-first surface useless. Decision: ship a single-version
      emergency release (v1.13.0) that captures real fixtures, adds a
      regression test asserting no false positives on idle/status views,
      and tightens the four markers minimally. Confirm-archive
      (Codex+Gemini cross-check) deferred to Slice 3 plan because
      audit-DB volume was actively saturating local storage; emergency
      release skips one round of cross-check by design and the deferral
      is documented inline.
    triggered_by: "Operator report (chquan@dogu.xyz, 2026-04-24): 'claude code pane에서 사용자 입력/판단을 대기하고 있는 것을 이벤트로 못 보여주는 것 같고, claude/codex/gemini 상태 정보들이 제대로 보여지는 것 같지는 않습니다.'"
    issue_or_context: >
      All 332 pre-existing tests passed against synthetic fixtures
      (e.g. 'Press ENTER to continue', 'this action requires approval
      (y/n)') that did not match the actual idle/status output of any
      shipping CLI as of 2026-04-25. Real Claude Code displays
      `⏵⏵ bypass permissions on (shift+tab to cycle)` as a passive
      keyboard hint; Codex v0.122 displays `│ permissions: YOLO mode`
      as a config row in its welcome box; Gemini v0.39 displays
      `45% used  0% used` in a sandbox/quota status line — none of
      these are interactive asks but all matched the bare-noun marker
      contract. Result: Qmonster's audit DB had grown to 374MB with
      1.5M event rows over four days, dominated by these false fires.
    changes:
      added:
        - "tests/fixtures/real/claude_status.txt (real Claude v2.1.120 conversation tail; emails+UUIDs redacted)"
        - "tests/fixtures/real/codex_welcome_v0_122.txt (real Codex v0.122 welcome box with permissions: YOLO mode row)"
        - "tests/fixtures/real/codex_bottom_status_v0_122.txt (real Codex v0.122 /status box)"
        - "tests/fixtures/real/gemini_idle_v0_39.txt (real Gemini v0.39 idle status line columns)"
        - "tests/false_positive_regression.rs (5 assertions: each fixture must not raise PERMISSION/WAITING/LOG_STORM/VERBOSE)"
        - ".docs/claude/Qmonster-v0.4.0-2026-04-25-claude-v1.13.0-emergency-suppression-plan.md (writing-plans skill output)"
        - ".docs/claude/Qmonster-v0.4.0-2026-04-25-claude-slice-3-backlog.md (S3-1..S3-6 deferred items)"
        - ".docs/claude/v1.13.0-baseline.txt (audit-DB volume baseline pre-patch; gitignored working note)"
      modified:
        - "src/adapters/common.rs: PERMISSION_MARKERS → PERMISSION_PROMPT_MARKERS (phrase-only); WAITING_MARKERS → WAITING_PROMPT_MARKERS (phrase-only); log_storm fallback dropped + is_log_like tightened to bracketed-level / level-prefix / ISO-timestamp shape; verbose_answer fallback dropped"
        - "mission.yaml (meta: version 1.12.2 → 1.13.0; title updated to v1.13.0 emergency suppression)"
        - "mission-history.yaml (sequence 52 added; meta: latest_version → 1.13.0, total_revisions 51 → 52)"
        - ".mission/CURRENT_STATE.md (v1.13.0 status header)"
      removed:
        - "BIG_OUTPUT_CHARS / LOG_STORM_LARGE_LINES constants (now-dead after fallback drop)"
    changed_sections:
      - "src/adapters/common.rs::PERMISSION_PROMPT_MARKERS — phrase-only contract"
      - "src/adapters/common.rs::WAITING_PROMPT_MARKERS — phrase-only contract"
      - "src/adapters/common.rs::is_log_like — structural-pattern contract (bracket level / level prefix / ISO timestamp)"
      - "src/adapters/common.rs::parse_common_signals — log_storm + verbose_answer fallback fields removed"
    done_when_delta:
      added: []
      modified: []
      removed: []
    impact_scope:
