        - "`docs/ai/ARCHITECTURE.md` deferred entry έΑΦ replaced 'Subagent token accounting (Phase 1 ships a detection-only warning)' with a D3-A/D3-C honesty note"
        - "`docs/ai/UI_MANUAL.md` token-breakdown note now cites Phase D D3-A detection refinement and the permanent token-attribution deferral"
        - "`docs/ai/VALIDATION.md` Phase 1 subagent checkbox now mentions the v1.19.0 marker addition + D3-C deferral"
        - "`README.md`, `VERSION.md`, `package.json`, `mission.yaml`, `mission-history.yaml`, `docs/ai/PROJECT_BRIEF.md` bumped to v1.19.0"
      removed: []
    changed_sections:
