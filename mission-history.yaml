  - change_id: "v1.18.0-identity-drift-detection"
    semantic_version: "1.18.0"
    change_sequence: 144
    date: "2026-04-28"
    author: "Claude (Opus 4.7)"
    contributors:
      - "Operator directive: continue Phase D after D1 / v1.17.1 with proposed defaults"
    change_type: "feature"
    motivation_type: "phase entry"
    persistence: "permanent"
    intent: >
      Close Phase D D2 by surfacing pane-level identity drift έΑΦ the
      operator-visible event of a pane silently swapping its CLI
      provider or worktree path between polls.
    intent_ko: >
      Phase D D2Έξ╝ ΈΜτΆ╕░ ΉεΕΊΧ┤, Ά░βΉζΑ pane ΉΧΙΉΩΡΉΕε CLI provider ΈαΡΈΛΦ
      worktree pathΆ░Α poll ΉΓυΉζ┤ΉΩΡ Έ░ΦΈΑΝΈΛΦ ΉΙεΆ░ΕΉζΕ Ήγ┤ΉαΒΉηΡΉΩΡΆ▓Ν surfaceΊΧεΈΜν.
    decision: >
      Add `policy::rules::identity_drift` as a pure rule returning
      `Vec<DriftFinding>` with stable dedup keys. The event loop owns
      `Context.identity_history` (last `IdentitySnapshot` per pane)
      and `Context.reported_drifts` (per-session dedup hashset);
      both are cleared on `PaneLifecycleEvent::{BecameDead,
      Reappeared}`. Rule is gated behind
      `PolicyGates.identity_drift_findings` (driven by
      `[security] identity_drift_findings`, default off). Findings
      are `Severity::Concern` so they stay below the desktop-notify
      gate. `Provider::Unknown έΗΤ known` and empty-path έΗΤ present-path
      transitions are treated as identity catch-up, not drift.
    decision_ko: >
      `policy::rules::identity_drift`ΉζΕ dedup keyΈξ╝ Ά░ΨΈΛΦ
      `Vec<DriftFinding>` Έ░αΊβαΉζα pure ruleΈκε Ή╢ΦΆ░ΑΊΧεΈΜν. event loopΆ░Α
      paneΈ│Ε ΈπΙΉπΑΈπΚ `IdentitySnapshot`ΉζΕ Έ│┤Ά┤ΑΊΧαΈΛΦ
      `Context.identity_history`ΉβΑ per-session dedup hashsetΉζ╕
      `Context.reported_drifts`Έξ╝ ΉΗΝΉειΊΧαΆ│ι, ΈΣΡ ΉηΡΈμΝΆ╡υΉκ░ ΈςρΈΣΡ
      `PaneLifecycleEvent::{BecameDead, Reappeared}`ΉΩΡΉΕε evictΊΧεΈΜν.
      `[security] identity_drift_findings = true` opt-in ΉΜεΉΩΡΈπΝ
      Έ░εΊβΦΊΧαΈσ░ defaultΈΛΦ off. `Severity::Concern`Ήζ┤Έζ╝ desktop notify
      gateΈξ╝ Ά▒┤ΈΥεΈουΉπΑ ΉΧΛΈΛΦΈΜν. `Provider::Unknown έΗΤ ΉΧΝΈινΉπΕ provider`,
      Έ╣Ι Ά▓╜Έκε έΗΤ Ή▒ΕΉδΝΉπΕ Ά▓╜ΈκεΈΛΦ identity catch-upΉε╝Έκε Έ│┤Ά│ι driftΈκε Έ│┤ΉπΑ
      ΉΧΛΈΛΦΈΜν.
    triggered_by: "Operator approved the proposed-default Phase D2 plan after the v1.17.0 (cross-window) and v1.17.1 (Claude statusline observability) commits."
    issue_or_context: >
      Until v1.18.0, the identity resolver produced a fresh
      `ResolvedIdentity` per poll and never compared it against the
      prior tick. ARCHITECTURE.md listed "Anomaly detection on pane
      identity drift (Phase 1 logs transitions)" in deferred work,
      but no surface ever logged the transitions either. An operator
      who quit Claude in a pane and started Codex would see no
      visible signal that the pane's authority had changed.
    changes:
      added:
        - "`policy/rules/identity_drift.rs` with `IdentitySnapshot`, `DriftFinding`, and `detect_identity_drift` (gated, dedup-keyed)"
        - "`Context.identity_history: HashMap<String, IdentitySnapshot>` and `Context.reported_drifts: HashSet<(String, String)>`"
        - "`SecurityConfig.identity_drift_findings: bool` (default false)"
        - "`PolicyGates.identity_drift_findings: bool` plumbed through `from_config_and_identity`"
        - "Seven unit tests in `policy/rules/identity_drift.rs` covering positive provider drift, positive worktree drift, simultaneous drift, gate-disabled silence, no-drift baseline, UnknownέΗΤknown catch-up, and emptyέΗΤpresent path catch-up"
        - "Two integration tests in `tests/event_loop_integration.rs` walking the full pipeline through three polls (baseline έΗΤ drift έΗΤ dedup) plus a default-config silence test"
        - "`is_provider_model_token`, `parse_reasoning_effort_token`, and `parse_codex_model_status_token` helper functions in `src/adapters/codex.rs` (BUNDLED scope-leak έΑΦ see `bundled_out_of_scope` below)"
      modified:
        - "`event_loop.rs` evicts `identity_history` + per-pane `reported_drifts` keys on `BecameDead`/`Reappeared`; computes drift findings before pushing the report"
        - "`policy/rules/mod.rs` exposes the new `identity_drift` module"
        - "`docs/ai/{ARCHITECTURE,PROJECT_BRIEF,VALIDATION}.md`, `README.md`, `VERSION.md`, `package.json`, `mission.yaml`, `mission-history.yaml`"
        - "`src/adapters/codex.rs` parse_codex_status_line + parse_codex_welcome_model now read reasoning_effort directly from the status-line model token via the new helpers, falling back to the existing `parse_codex_reasoning_effort` only when the status-line token does not carry the effort suffix (BUNDLED scope-leak έΑΦ see `bundled_out_of_scope` below)"
      removed:
        - "Anomaly detection on pane identity drift removed from `docs/ai/ARCHITECTURE.md` deferred list"
    bundled_out_of_scope:
      file: "src/adapters/codex.rs"
      summary: >
        `git add -A` on the v1.18.0 staging step picked up a Codex
        adapter helper-extraction refactor (`is_provider_model_token`,
        `parse_reasoning_effort_token`, `parse_codex_model_status_token`)
        that was already present in the working tree from earlier
        operator activity. The refactor is functionally an
        improvement έΑΦ it pulls reasoning_effort directly from the
        status-line model token instead of doing a second tail scan έΑΦ
        and the existing v1.17.x test suite continues to pass with
        the new code path. Per the operator's "option C" direction
        (2026-04-28), the refactor is documented here rather than
        split out into a separate commit so the tag history stays
        intact and no destructive `git reset` is required. Future
        slices that touch Codex parsing should treat v1.18.0 as the
        baseline that already contains these three helpers.
      verification: "All 646 tests pass with the bundled helpers in place; clippy + fmt + verify-shared all clean. Behavior change is limited to picking up reasoning_effort from one extra tail line that previously required a second `parse_codex_reasoning_effort` scan."
    changed_sections:
      - "src/policy/rules/identity_drift.rs"
      - "src/policy/rules/mod.rs"
      - "src/policy/gates.rs"
      - "src/policy/engine.rs"
      - "src/policy/rules/advisories.rs"
      - "src/policy/rules/auto_memory.rs"
      - "src/policy/rules/concurrent.rs"
      - "src/policy/rules/profiles.rs"
      - "src/adapters/codex.rs"
      - "src/app/bootstrap.rs"
      - "src/app/event_loop.rs"
      - "src/app/config.rs"
      - "tests/event_loop_integration.rs"
      - "docs/ai/ARCHITECTURE.md"
      - "docs/ai/PROJECT_BRIEF.md"
      - "docs/ai/VALIDATION.md"
      - "README.md"
      - "VERSION.md"
      - "mission.yaml"
      - "mission-history.yaml"
      - "package.json"
    observable_effects:
      added:
        - "Operators with `[security] identity_drift_findings = true` see one passive `Concern` recommendation when a pane's resolved provider or worktree path changes between polls; same drift only fires once per session per pane"
      modified:
        - "all-target test count rises to 646 (+11 from D2 plumbing + unit + integration; baseline before D2 was 635)"
      removed: []
    impact_scope:
      runtime: "Pure policy rule extension; per-session in-memory state for history + dedup. No tmux, adapter, storage, or actuation behavior change. Default configuration preserves the v1.17.1 alert volume exactly."
      tests: "646 total passed across lib + main + event_loop + false_positive + idle_state targets"
      ledger: "1 new timeline entry (sequence 144); meta bump; minor version bump v1.17.x έΗΤ v1.18.0 because Phase D advances by one slice"
      npm: "package.json version set to 1.18.0"
      review_gate: "cargo fmt --check, cargo test --all-targets, cargo clippy --all-targets -- -D warnings, cargo build --release, scripts/verify-shared.sh, and live --once smoke pass"
      follow_up_carryover: "Phase D D3 (precise subagent token accounting) remains deferred. Phase E housekeeping (Gemini memory column, comment-preserving toml_edit save) also unchanged."
    breaking: false
    risk: "low έΑΦ opt-in rule; default config silent. New finding is `Severity::Concern` so it stays below the desktop-notify gate; per-session dedup prevents re-firing on subsequent polls."
    related_commits: []
    follow_up:
