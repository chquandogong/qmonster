        - "Module doc-comment on `SUBAGENT_MARKERS` explaining the bullet+paren disambiguation"
        - "Four new unit tests in `src/adapters/common.rs`: positive Claude `έΩΠ Task(...)` fire, negative TODO-list `Task 1 έΑΦ ...` suppression, negative source-code `let task = ...` suppression, negative `έΩΠ Bash(...)` / `έΩΠ Read(...)` suppression"
        - "Codex statusline regression fixture for `Context 24% left ... gpt-5.5 xhigh`"
      modified:
