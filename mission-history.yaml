  - change_id: "v1.15.11-quota-pressure-gradient-advisories"
    semantic_version: "1.15.11"
    change_sequence: 67
    date: "2026-04-25"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator)"
    change_type: "feature"
    motivation_type: "operator-visibility"
    persistence: "permanent"
    intent: >
      Bridge the gap between v1.15.8's quota_pressure metric (silent
      gradient surface) and v1.15.10's binary 100% LimitHit detection.
      Operators need to see quota pressure approach the limit before
      they hit it; currently nothing fires between the visible CTX/QUOTA
      badges (display-only) and the IdleCause::LimitHit alert at 100%.
    decision: >
      Add `quota_pressure_warning` (0.75..0.85, Warning) and
      `quota_pressure_critical` (>=0.85, Risk, is_strong) advisory
      rules in `policy/rules/advisories.rs::eval_advisories`,
      mirroring the existing `context_pressure_*` rule pair. Both
      respect the `allow_provider_specific` IdentityConfidence gate
      (KD-007) and surface ProviderOfficial source (the metric
      itself is ProviderOfficial when it exists, since v1.15.8
      requires the column-parity-validated status table).
      Suggested_command stays None for both ‚ÄĒ rate-limited quotas
      reset on the provider's own schedule, not by a slash command,
      so operator must change behaviour (wait, pace prompts, or
      switch account/model). next_step carries the operator-facing
      wording; the critical variant is is_strong so the CHECKPOINT
      slot surfaces it. No aggressive variants because quota_tight
      mode is already an opt-in operator state where the operator
      knows the situation; piling on at quota-tight + quota-pressure
      adds noise without new information.
    triggered_by: "Operator-visibility gap between v1.15.8 quota_pressure metric (silent) and v1.15.10 LimitHit (binary 100%). Continuing autonomous Slice 3 follow-up work per operator delegation."
    issue_or_context: >
      v1.15.8 plumbed Gemini's `quota` column into a
      SignalSet.quota_pressure metric and a UI badge with severity
      coloring. v1.15.10 fixed `gemini_limit_hit` to key on the
      parsed quota column at 100%. Between display (passive) and
      LimitHit (binary at 100%), there was no explicit advisory the
      operator could see in the alert queue when quota crept toward
      the limit.
