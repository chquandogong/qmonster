  - change_id: "audit-vocab-compile-time-safety"
    semantic_version: "1.10.4"
    change_sequence: 39
    date: "2026-04-23"
    author: "Claude Code (claude:1:main, Opus 4.7 1M)"
    contributors:
      - "Codex (codex:1:review, v1.10.2 В§9 forward-watch TODO вҖ” `store/audit` string-contract test for kind_to_str vocabulary)"
      - "Gemini (gemini:1:research, v1.10.2 #10 forward-watch TODO вҖ” Display/AsRef<str> on AuditEventKind for compile-time safety)"
      - "CHENGHAO QUAN (chquan@dogu.xyz, operator вҖ” chose this cleanup over Phase 6 opening or a pause)"
    change_type: "refactor-cleanup"
    motivation_type: "reviewer-driven"
    persistence: "permanent"
    intent: >
      Close the compatible Codex v1.10.2 В§9 + Gemini v1.10.2 #10
      forward-watch TODOs in a single small domain-layer refactor.
      Both reviewers converged on the same concern (audit-kind
      vocabulary needs a compile-time source of truth) from
      different angles; this slice adopts both positions at once.
    intent_ko: >
      Codex v1.10.2 В§9мҷҖ Gemini v1.10.2 #10мқҳ нҳёнҷҳ TODOлҘј н•ң мһ‘мқҖ
      domain-layer лҰ¬нҢ©н„°лЎң лӢ«лҠ”лӢӨ. л‘җ лҰ¬л·°м–ҙк°Җ лҸҷмқјн•ң кҙҖмӢ¬мӮ¬(к°җмӮ¬
      kind м–ҙнңҳм—җ compile-time source of truth н•„мҡ”)лҘј м„ңлЎң лӢӨлҘё
      к°ҒлҸ„м—җм„ң м ңкё°н•ң мғҒнғңлЎң, мқҙ мҠ¬лқјмқҙмҠӨлҠ” л‘җ мһ…мһҘмқ„ н•ң лІҲм—җ мҲҳмҡ©.
    decision: >
      Touch only `src/domain/audit.rs` and `src/store/audit.rs`:
      (1) `AuditEventKind` gains `pub const fn as_str(&self) ->
      &'static str` with an exhaustive match over all 20 current
      variants. The `const` qualifier lets the method serve as a
      compile-time source of truth; the exhaustive match means
      adding a new variant without extending this function is a
      compile-time error.
      (2) `impl AsRef<str> for AuditEventKind` + `impl
      std::fmt::Display for AuditEventKind`, both delegating to
      `as_str`. Callers pick the ergonomic form they prefer with
      no drift possible.
      (3) `src/store/audit.rs::kind_to_str` collapses from a 20-
      arm match to `k.as_str()` вҖ” one-line delegate. `parse_kind`
      stays in store/audit.rs because it is the fallible inverse
      (returns `Option` for unknown strings).
      (4) New domain-layer contract test
      `audit_event_kind_as_str_contract_locks_every_variant_string`
      iterates a table of all 20 (AuditEventKind, &str) pairs and
      asserts `as_str`, `Display`, and `AsRef<str>` all agree with
      the expected canonical form. This is the Codex-requested
      string-contract test, co-located with the domain type
      rather than in store/audit.
      Scope boundary: `src/ui/dashboard.rs` is NOT touched. The
      existing help_overlay test already catches UI token drift,
      and rewriting the help prose to splice `as_str()` calls
      through `format!` would widen the cleanup beyond the
      audit-vocab concern. Left as future-watch.
    decision_ko: >
      `src/domain/audit.rs`мҷҖ `src/store/audit.rs` л‘җ нҢҢмқјл§Ң кұҙл“ңлҰј:
      (1) `AuditEventKind::as_str(&self) -> &'static str` м¶”к°Җ вҖ”
      20к°ң variant м „мҲҳ exhaustive match. `const` н•ңм •мһҗлЎң compile-
      time source of truth; мӢ к·ң variant м¶”к°Җ мӢң мқҙ н•ЁмҲҳлҘј нҷ•мһҘн•ҳм§Җ
      м•Ҡмңјл©ҙ м»ҙнҢҢмқј мӢӨнҢЁ.
      (2) `AsRef<str>` + `Display` trait кө¬нҳ„, л‘ҳ лӢӨ `as_str`м—җ
      мң„мһ„. нҳём¶ңмһҗк°Җ м„ нҳён•ҳлҠ” ergonomic form м„ нғқ к°ҖлҠҘ, л“ңлҰ¬н”„нҠё
      м—ҶмқҢ.
      (3) `src/store/audit.rs::kind_to_str`лҠ” 20-arm matchм—җм„ң
      `k.as_str()` н•ң мӨ„ delegateлЎң м¶•мҶҢ. `parse_kind`лҠ” fallible
      inverseмқҙлҜҖлЎң store/audit.rsм—җ мң м§Җ(unknown stringм—җ лҢҖн•ҙ
      `Option` л°ҳнҷҳ).
      (4) мғҲ domain-layer contract н…ҢмҠӨнҠё вҖ”
      `audit_event_kind_as_str_contract_locks_every_variant_string`
      мқҙ 20к°ң (variant, &str) pair н…Ңмқҙлё”лЎң as_str / Display /
      AsRef<str> м„ё кІҪлЎң лӘЁл‘җ лҸҷмқјн•ң canonical formм—җ лҸҷмқҳн•Ёмқ„
      кІҖмҰқ. Codexк°Җ мҡ”мІӯн•ң string-contract н…ҢмҠӨнҠёлҘј storeк°Җ м•„лӢҢ
      domainм—җ co-locate.
      лІ”мң„ кІҪкі„: `src/ui/dashboard.rs` лҜёмҲҳм •. кё°мЎҙ help overlay
      н…ҢмҠӨнҠёк°Җ мқҙлҜё UI нҶ нҒ° л“ңлҰ¬н”„нҠёлҘј мһЎмңјл©°, лҸ„мӣҖл§җ н”„лЎңмҰҲм—җ
      `format!`лЎң `as_str()` нҳём¶ңмқ„ spliceн•ҳлҠ” кІғмқҖ к°җмӮ¬ м–ҙнңҳ
      кҙҖмӢ¬мӮ¬лҘј лІ—м–ҙлӮң нҷ•мһҘ. future-watchлЎң мң ліҙ.
    triggered_by: "v1.10.3 follow-up list (change_sequence 38): 'Future-watch TODO (Codex v1.10.2 В§9 + Gemini v1.10.2 #10 вҖ” compatible pair): promote audit-kind vocabulary to a compile-time-safe source of truth. Operator to pick when a broader audit-vocab pass is worth doing.'"
    issue_or_context: >
