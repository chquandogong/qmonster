    intent: >
      Lift the v1.15.14 hardcoded `COST_PRESSURE_*_USD` constants into
      operator-configurable thresholds with optional per-provider
      overrides. Provider pricing tiers are not uniform (Claude Sonnet/Opus
      meaningfully more expensive per 1M tokens than gpt-5.4 or Gemini
      Pro), so a single pair of thresholds cannot serve every operator's
      budget bands.
    decision: >
      Add `[cost]` TOML section with top-level `warning_usd` /
      `critical_usd` plus optional `[cost.claude]` / `[cost.codex]` /
      `[cost.gemini]` per-provider overrides. PolicyGates gains
      `cost_warning_usd` / `cost_critical_usd` fields that
      `from_config_and_identity` resolves per-pane (provider override
      if set, else top-level default). Advisory rules read
      `gates.cost_warning_usd` / `gates.cost_critical_usd` instead of
      module-level constants. Recommended defaults track 2026-04-27
      pricing-tier expectations (operator can tune freely):
      default $5/$20 (Codex `gpt-5.4` baseline; matches the v1.15.14
      hardcoded values), Claude $10/$30 (higher tier), Gemini $3/$10
