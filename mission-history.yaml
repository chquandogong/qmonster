    persistence: "permanent"
    intent: >
      Close Phase 4 end-to-end by addressing the two items deferred
      when the 3x2 grid was declared complete at v1.8.11: (A) Codex's
      v1.8.8 P4-6 positive-form non-blocker (`--approval-mode =
      default` as an alternative to `--yolo = unset` for the
      gemini-default baseline second lever) and (B) the remaining
      Phase-4 VALIDATION.md checkbox (`token.thresholds` per-provider
      split decision). Layered on top of v1.8.12 shared-verification
      hardening вАФ does not disturb the portable done_when contract
      introduced at v1.8.12.
    intent_ko: >
      Phase 4л•Љ end-to-endл°Ь лІИк∞Р. v1.8.11мЧР 3x2 grid мЩДмД± мД†мЦЄ мЭінЫД
      мЬ†л≥ілРШмЧИлНШ лСР нХ≠л™©мЭД лЛЂлКФлЛ§. (A) Codex v1.8.8 P4-6 л¶ђлЈ∞мЭШ
      positive-form non-blocker (`--yolo = unset` лМАмЛ†
      `--approval-mode = default`), (B) лВ®мЭА Phase-4 VALIDATION.md
      м≤інБђл∞ХмК§(`token.thresholds` per-provider лґДнХ† к≤∞м†Х). v1.8.12
      shared-verification нХШлУЬлЛЭ к≥ДмХљ мЬДмЧР мЦємЦі мІДнЦЙ вАФ v1.8.12к∞А
      м†Хл¶ђнХЬ portable done_when к≥ДмХљмЭА кЈЄлМАл°Ь мЬ†мІА.
    decision: >
      (A) Swap the gemini-default second lever from `--yolo = unset`
      (ProjectCanonical вАФ "recommend NOT setting a flag") to
      `--approval-mode = default` (ProviderOfficial вАФ both the
      flag and the `default` value are documented in Gemini CLI
      docs). The bundle authority split graduates from 0 PO + 2 PC
      to 1 PO + 1 PC and mirrors codex-default's v1.8.6 dual-
      authority reason pattern (reason summary now contains both
      `ProviderOfficial` and `ProjectCanonical` tokens). The
      aggressive variant `gemini-script-low-token` keeps
      `--yolo = enabled` вАФ the pair now expresses a semantic
      inverse on the approval-surface axis rather than a value
      inverse on a shared key. Trade-off accepted for (1) a
      positive-form lever operators can scan without parsing
      "NOT set", (2) a 1-PO honesty upgrade honestly available
      from Gemini docs, (3) lever rows that map cleanly to an
      actual `gemini --approval-mode default` invocation.
      (B) Retain the `token.thresholds` single global block.
      Rationale (in-line in VALIDATION.md): (i) no `tests/
      fixtures/` directory exists, so Phase-1 has produced no
      measured per-provider threshold data; (ii) of the 5 keys
      in `[token.thresholds]` (context_warn, context_crit,
      big_output_chars, log_storm_lines, repeat_window), only
      `big_output_chars` is currently wired into Rust (`src/
      app/config.rs:131`, consumed by `ArchiveWriter`) вАФ a
      speculative per-provider split would add config burden
      without touching actual policy; (iii) provider asymmetry
      already lives in the profile-rule layer (`src/policy/
      rules/profiles.rs`) + identity-confidence gates, not in
      raw token thresholds. Future Phase-1 fixture data can
      still justify a split without today's global block
      locking us in.
    decision_ko: >
      (A) gemini-default лСР л≤ИмІЄ л†Ил≤Дл•Љ `--yolo = unset` (PC)мЧРмДЬ
      `--approval-mode = default` (PO)л°Ь кµРм≤і. authority splitмЭА
      0 PO + 2 PC вЖТ 1 PO + 1 PCмЭі лРШк≥†, codex-default v1.8.6мЭШ
      dual-authority reason нМ®нДімЭД лФ∞л•ЄлЛ§. aggressive л≥АнШХмЭА
      `--yolo = enabled`л•Љ мЬ†мІА вАФ к≥µмЬ† нВ§ мЬДмЭШ к∞Т л∞Шм†ДмЭі мХДлЛМ
      approval-surface мґХ мЬДмЭШ мЭШлѓЄм†Б л∞Шм†Д.
      (B) `token.thresholds` лЛ®мЭЉ global block мЬ†мІА. кЈЉк±∞(VALIDATION.md
      мЭЄлЭЉмЭЄ): (i) `tests/fixtures/` лґАмЮђл°Ь Phase-1 мЄ°м†Х лН∞мЭінД∞ мЧЖмЭМ,
      (ii) `[token.thresholds]` 5к∞Ь нВ§ м§С RustмЧР мЛ§м†Ьл°Ь л∞∞мД†лРЬ нВ§лКФ
      `big_output_chars` нХШлВШ(`src/app/config.rs:131`, `ArchiveWriter`
      мЖМлєД)лњР вАФ мґФмЄ°мД± лґДнХ†мЭА мД§м†Х лґАлЛілІМ мґФк∞А, (iii) provider
      лєДлМАмє≠мД±мЭА мЭілѓЄ profile-rule к≥ДмЄµ + identity-confidence к≤МмЭінКЄмЧР
      м°імЮђ. нЫДмЖН Phase-1 fixture лН∞мЭінД∞к∞А мЛ§м†Ь лґДнХ†мЭД мЪФкµђнХШл©і
      мІАкЄИмЭШ global blockмЭі мЭіл•Љ к∞Ал°ЬлІЙмІА мХКмЭМ(к∞АмЧ≠).
