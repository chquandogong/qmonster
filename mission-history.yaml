evolution_summary:
  current_phase: "Audit-vocab compile-time safety shipped (v1.10.4) вҖ” AuditEventKind now carries its canonical string form as a `pub const fn as_str` with exhaustive-match compile-time safety, and `impl AsRef<str>` + `impl Display` delegate to it. store::audit::kind_to_str collapses to a one-line `k.as_str()` delegate; the 20-arm match no longer duplicates the vocabulary. New domain-layer 20-pair contract test locks every variant's string across as_str / Display / AsRef<str>. Closes the compatible Codex v1.10.2 В§9 + Gemini v1.10.2 #10 forward-watch TODOs in a single refactor. 245 lib + 6 drift + 22 integration = 273 tests green (+1 net vs v1.10.3); clippy + fmt clean. Refactor-only вҖ” SQLite row values identical to v1.10.3; audit log continuity preserved; no runtime / VALIDATION / actuation / gate surface touched. Phase 5 remains fully gate-approved (Codex + Gemini both `approve` across P5-1 вҶ’ P5-2 вҶ’ P5-3 вҶ’ P5-4) and structurally complete. Layered on v1.10.3; v1.10.2 and everything below untouched."
  next_phase: "Phase 5 closed + audit-vocab cleanup shipped; operator to choose Phase 6 scope, an optional v1.10.4 confirm review, or a pause"
  guiding_principles:
    - "Observe-first / Alert-first / Recommendation-first"
    - "Token optimization as an architectural pillar"
    - "docs/ai canonical, .docs working, mission-spec contract+ledger"
    - "Auto memory is local convenience, not primary state"
    - "No destructive automation by default; manual refresh only; balanced logging"
    - "SourceKind taxonomy = ProviderOfficial | ProjectCanonical | Heuristic | Estimated (r2)"
    - "Identity-before-adapters pipeline; policy/ is pure; runtime writes only in ~/.qmonster/ (r2)"
    - "Safety-precedence asymmetry: env/CLI may only move actions.mode / allow_auto_prompt_send / allow_destructive_actions / refresh.policy toward safer (r2)"
    - ".mission/CURRENT_STATE.md = day-end handoff, never runtime checkpoint sink (r2)"

key_decisions:
  - id: "KD-001"
    title: "Pane identity = {provider, instance, role, pane_id}"
    rationale: "Allows same-provider repetition within one project window (claude:1:main + claude:2:review + claude:3:research)."
    source: ".docs/init/Qmonster_мў…н•©_кё°нҡҚ_ліҙкі м„ң_v0.4.0_2026-04-20.md В§1.1, В§4.2"
  - id: "KD-002"
    title: "Day-end state goes to .mission/CURRENT_STATE.md, not memory"
    rationale: "Auto memory is machine-local, non-deterministic, not sharable across models; CURRENT_STATE.md is the canonical day-end ledger."
    source: ".docs/init/cli_memory_comparison_report_ko_v2.md В§0, В§4.5"
  - id: "KD-003"
    title: "recommend_only by default; no destructive automation"
    rationale: "Failure modes in the comprehensive plan В§18 include 'too much automation up front'. Recommendation-first keeps us on the safe side until cross-checks confirm the surface."
    source: ".docs/init/Qmonster_мў…н•©_кё°нҡҚ_ліҙкі м„ң_v0.4.0_2026-04-20.md В§18, В§20"
  - id: "KD-004"
    title: "Manual refresh only; Qmonster surfaces but never silently upgrades"
    rationale: "Avoid version drift and provider-side behavioral surprises in a TUI that the operator relies on for observability."
    source: ".docs/init/Qmonster_мў…н•©_кё°нҡҚ_ліҙкі м„ң_v0.4.0_2026-04-20.md В§1.5"
  - id: "KD-005"
    title: "Official vs heuristic vs estimated labeling is non-negotiable"
    rationale: "The operator needs to trust numbers at a glance; mixing authoritative provider levers with community heuristics silently erodes that trust."
    source: ".docs/init/Qmonster_нҶ нҒ°_мөңм Ғнҷ”_мЎ°мӮ¬_л°Ҹ_кө¬нҳ„_ліҙкі м„ң_2026-04-19 2.md В§7.5 (official levers) vs В§3 (community tools as heuristics)"
  - id: "KD-006"
    title: "SourceKind taxonomy = ProviderOfficial | ProjectCanonical | Heuristic | Estimated"
    rationale: "Codex r1 (C-5) and Gemini r1 (G-13) both flagged that (official) was conflating three distinct authorities. Splitting into four named kinds lets the UI, policy, and docs surface authority honestly."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md must-fix #5; .docs/gemini/Qmonster-v0.4.0-2026-04-20-gemini-research-r1.md TODO #5; final synthesis r2 В§1"
  - id: "KD-007"
    title: "Identity-before-adapters pipeline"
    rationale: "Identity cannot be inferred after provider dispatch вҖ” the adapter needs to know which provider it is. Fixing this now avoids a shape change once code exists."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md must-fix #3; final synthesis r2 В§5.1"
  - id: "KD-008"
    title: "Phase 1 narrowed: no SQLite, no archive persistence, no profile recommender"
    rationale: "Codex's scope reductions (CS-1..CS-4) keep Phase 1 honest to its 'observe-first' name and avoid Phase-2/4 creep. Storage/policy/profile layers still exist but as traits and interfaces only."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md scope reductions; final synthesis r2 В§В§6.2-6.3"
  - id: "KD-009"
    title: "Safety precedence is asymmetric"
    rationale: "env/CLI may move actions.mode, allow_auto_prompt_send, allow_destructive_actions, refresh.policy toward safer only. Resolves r1's contradiction between standard precedence and the rule that runtime cannot elevate dangerous modes."
    source: ".docs/codex/Qmonster-v0.4.0-2026-04-20-codex-crosscheck-r1.md must-fix #6; final synthesis r2 В§4"
