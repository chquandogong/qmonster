# qmonster.example.toml
# Version: v1.16.54
# Date: 2026-04-27
# Runtime-consumed example config for the current binary. The standard
# operator path is `~/.qmonster/config/qmonster.toml`; `scripts/run-qmonster.sh`
# creates it from this template when missing, and the in-TUI settings overlay
# writes threshold edits back there unless `--config PATH` points elsewhere.
#
# Parsed today by `src/app/config.rs`:
# - [tmux]    source, poll_interval_ms, capture_lines
# - [logging] sensitivity, retention_days, big_output_chars
# - [token]   quota_tight
# - [actions] mode, allow_auto_*
# - [refresh] policy
# - [storage] root
# - [idle]    stillness_polls
# - [security] posture_advisories
# - [cost]    warning_usd, critical_usd, [.claude|.codex|.gemini]
# - [context] warning_pct, critical_pct, [.claude|.codex|.gemini]
# - [quota]   warning_pct, critical_pct, [.claude_5h|.claude_weekly|.codex_5h|.codex_weekly|.gemini]
#
# Everything else belongs in docs/ai/* or tmux launcher conventions,
# not in runtime TOML.

[tmux]
# auto (default) tries control_mode first and falls back to polling if tmux
# control-mode cannot attach at startup. Set polling or control_mode to force
# one transport; explicit control_mode attach failures stay visible.
source = "auto"                    # auto | polling | control_mode
poll_interval_ms = 2000
capture_lines = 24

[logging]
sensitivity = "balanced"         # minimal | balanced | forensic
retention_days = 14
big_output_chars = 2200

[token]
quota_tight = false
# Reference only: context/log/repeat thresholds are still code defaults.
# `logging.big_output_chars` above is the only threshold wired from TOML.

[idle]
# Consecutive identical tail snapshots before stillness fallback marks a
# pane idle/stale. Runtime clamps out-of-range values to [2, 12].
stillness_polls = 4

[security]
# Default false: permissive runtime posture remains visible as badges only.
# Set true to also emit Concern advisories when provider runtime facts expose
# YOLO / bypass permissions / Full Access / danger-full-access / no sandbox.
posture_advisories = false

# v1.15.16 — per-provider USD thresholds for the cost_pressure_warning /
# cost_pressure_critical advisory rules (see src/policy/rules/advisories.rs).
# `cost_usd` is currently populated only on Codex panes (Claude/Gemini
# leave it None today); when a future provider populates cost_usd, the
# advisory rules consume the same thresholds from this table.
#
# `warning_usd` / `critical_usd` apply to any provider that does not have
# a `[cost.<provider>]` override below. Per-provider tables (when present)
# replace BOTH thresholds for that provider only.
#
# Recommended defaults (track empirical 2026-04-27 pricing-tier
# expectations; tune freely):
#   - default → \$5 / \$20  (Codex `gpt-5.4` baseline; matches the
#     v1.15.14 hardcoded constants this section replaces)
#   - claude  → \$10 / \$30 (Claude Sonnet/Opus pricing is meaningfully
#     higher per 1M tokens; bands shift up so the same operator workload
#     does not raise advisories on every session)
#   - codex   → unset       (Codex uses the top-level defaults)
#   - gemini  → \$3 / \$10  (Gemini Pro pricing tends lower; raise the
#     advisory earlier in absolute USD terms)
#
# Behaviour invariants:
#   - cost_pressure_warning fires when warning_usd <= cost_usd < critical_usd.
#   - cost_pressure_critical fires when cost_usd >= critical_usd.
#   - Both rules respect the IdentityConfidence gate (KD-007); both
#     leave `suggested_command: None` (no slash command resolves an
#     accumulated session cost — operator picks pace / model-switch /
#     end-session). Source label is `Estimated` because the threshold
#     is a Qmonster pick, not a provider-documented limit.
[cost]
warning_usd = 5.0
critical_usd = 20.0

[cost.claude]
warning_usd = 10.0
critical_usd = 30.0

# [cost.codex]                    # uncomment to pin Codex thresholds
# warning_usd = 5.0
# critical_usd = 20.0

[cost.gemini]
warning_usd = 3.0
critical_usd = 10.0

# v1.15.17 — per-provider context_pressure thresholds for the
# context_pressure_warning / context_pressure_critical advisory rules
# (see src/policy/rules/advisories.rs). `context_pressure` is populated
# by Claude `/context`, Codex bottom status, and Gemini status table, so
# all three providers honour these thresholds when that provider surface
# is visible or has just been captured through `u` runtime refresh.
#
# `warning_pct` / `critical_pct` are fractions in 0..=1.0 (not %). They
# apply to any provider that does not have a `[context.<provider>]`
# override below. Per-provider tables (when present) replace BOTH
# thresholds for that provider only.
#
# Recommended defaults: 0.75 / 0.85 for every provider — the workflow
# advice ("/compact + checkpoint") is uniform across CLIs and the
# absolute pressure value already accounts for context-window size
# differences. Override only if a specific provider's pressure metric
# is consistently noisy at one end of the band.
#
# Behaviour invariants:
#   - context_pressure_warning  fires when warning_pct <= context_pressure < critical_pct.
#   - context_pressure_critical fires when context_pressure >= critical_pct.
#   - Both rules respect the IdentityConfidence gate (KD-007); both
#     suggest `/compact` and emit a strong (CHECKPOINT-slot) rec so the
#     advisory rises above non-strong signals.
[context]
warning_pct = 0.75
critical_pct = 0.85

# [context.claude]                  # uncomment to pin Claude thresholds
# warning_pct = 0.75
# critical_pct = 0.85

# [context.codex]                   # uncomment to pin Codex thresholds
# warning_pct = 0.75
# critical_pct = 0.85

# [context.gemini]                  # uncomment to pin Gemini thresholds
# warning_pct = 0.75
# critical_pct = 0.85

# v1.16.51 — quota_pressure thresholds. Gemini exposes one quota column;
# Claude and Codex expose two quota windows. For Codex, bottom status
# `5h N%` is the rolling 5-hour limit and `weekly N%` is the weekly
# limit. For Claude, `/usage` "Current session" is the rolling 5-hour
# limit and "Current week (all models)" is the weekly limit.
#
# Behaviour invariants:
#   - quota_pressure_warning  fires when warning_pct <= quota < critical_pct.
#   - quota_pressure_critical fires when quota >= critical_pct.
#   - Both rules respect the IdentityConfidence gate (KD-007). Neither
#     emits a `suggested_command`: rate-limited quotas reset on the
#     provider's schedule, not via a slash command — the operator picks
#     between pacing, switching account/model, or pausing the pane.
[quota]
warning_pct = 0.75
critical_pct = 0.85

# [quota.claude_5h]                 # Claude /usage Current session
# warning_pct = 0.75
# critical_pct = 0.85

# [quota.claude_weekly]             # Claude /usage Current week (all models)
# warning_pct = 0.75
# critical_pct = 0.85

# [quota.codex_5h]                  # Codex bottom status `5h N%`
# warning_pct = 0.75
# critical_pct = 0.85

# [quota.codex_weekly]              # Codex bottom status `weekly N%`
# warning_pct = 0.75
# critical_pct = 0.85

# [quota.gemini]                    # uncomment to pin Gemini thresholds
# warning_pct = 0.75
# critical_pct = 0.85

[actions]
mode = "recommend_only"          # observe_only | recommend_only | safe_auto
allow_auto_notifications = true
allow_auto_archive = true
allow_auto_prompt_send = false
allow_destructive_actions = false

[refresh]
policy = "manual_only"

[storage]
# Optional absolute path override. Leave unset to use the default
# `~/.qmonster/` root. `~` is not expanded inside TOML values here.
# root = "/abs/path/to/qmonster-root"

# Runtime-derived paths under `storage.root`:
# - qmonster.db
# - archive/
# - snapshots/
# - versions.json
#
# Pane title convention used by the resolver and tmux launcher:
#   {provider}:{instance}:{role}
# Recommended default layout:
#   claude:1:main
#   codex:1:review
#   gemini:1:research
#   qmonster:1:monitor
